 # CULTURAL REDOUBT MODIFIERS
 BTWK_cultural_redoubt_modifier: "Highland Redoubt"
 BTWK_cultural_redoubt_modifier_desc: "$BTWK_cultural_redoubt_modifier_desc_loc_1$\n\nThis modifier will give severe penalties to [county_opinion|E], [county_control|E], and [revolt|E] strength if controlled by a realm that is not a $celtic_heritage_group$ or $romanized_culture$ [culture|E], making the [county|E] highly rebellious and provide few [taxes|E] or [levies|E]. Redoubts can be pacified at a considerable [gold|E] and time investment if the ruler is not [tribal|E] or [pre_feudal|E]."
 BTWK_cultural_redoubt_modifier_desc_loc_1: "The rugged terrain of this [county|E] makes it difficult to exert authority over this area from outside, while the parochialism of the local population makes them suspicious of any they see as outsiders. Any potential overlord that local elites view as foreign occupiers will find it difficult to establish stable control over this area."
 BTWK_cultural_redoubt_negative_1_modifier: "$BTWK_cultural_redoubt_modifier$"
 BTWK_cultural_redoubt_negative_1_modifier_desc: ""
 BTWK_cultural_redoubt_negative_2_modifier: "$BTWK_cultural_redoubt_modifier$"
 BTWK_cultural_redoubt_negative_2_modifier_desc: ""
 BTWK_cultural_redoubt_negative_modifier_desc: "$BTWK_cultural_redoubt_modifier_desc_loc_1$\n\nAs long as the redoubt remains unpacified, this county [county|E] will continue to be highly rebellious and provide few [taxes|E] or [levies|E] if controlled by a realm that is not a $celtic_heritage_group$ or $romanized_culture$ [culture|E]. A redoubt can be pacified at a considerable [gold|E] and time investment if the ruler is not [tribal|E] or [pre_feudal|E], which will eventually remove the modifier."
 BTWK_cultural_redoubt_negative_modifier_not_pacifying_desc: "$BTWK_cultural_redoubt_negative_modifier_desc$\n\nThis [county|E] is #N not#! currently being pacified.\n\n"
 BTWK_cultural_redoubt_negative_modifier_pacifying_desc: "$BTWK_cultural_redoubt_negative_modifier_desc$\n\nThis [county|E] will be fully pacified in #high [SCOPE.sTitle('current_county').MakeScope.ScriptValue('BTWK_cultural_redoubt_pacification_years_remaining')|0]#! [SelectLocalization(EqualTo_CFixedPoint(SCOPE.sTitle('current_county').MakeScope.ScriptValue('BTWK_cultural_redoubt_pacification_years_remaining'), '(CFixedPoint)1'), 'year', 'years')].\n\n"
 BTWK_cultural_redoubt_pacified_modifier: "Pacified $BTWK_cultural_redoubt_modifier$"
 BTWK_cultural_redoubt_pacified_modifier_desc: "$BTWK_cultural_redoubt_modifier_desc_loc_1$\n\nThis redoubt has been pacified and integrated into the realm, and no longer gives any penalties. However, it can be reverted to its unpacified state if the [county|E] comes back under the control of a realm of the same [heritage|E]."
 msg_BTWK_cultural_redoubt_pacification_finished.t: "[current_county.GetName|U] Pacified"
 msg_BTWK_cultural_redoubt_pacification_finished.desc: "The $BTWK_cultural_redoubt_modifier$ in [current_county.GetName] has been Pacified"
 msg_BTWK_cultural_redoubt_pacification_rebel_siege.t: "Pacification Progress Lost"
 msg_BTWK_cultural_redoubt_pacification_rebel_siege.desc: "The Pacification of the $BTWK_cultural_redoubt_modifier$ in [current_county.GetName] has lost progress"

 # SPREADING OF CHRISTIANITY SITUATION
 BTWK_soc_proselytization_modifier: "Missionary Activity"
 BTWK_soc_proselytization_modifier_desc_loc: "Missionaries are actively spreading the [GetReligionByKey('christianity_religion').GetAdjectiveNoTooltip] faith in this [county|E] as part of the greater [spreading_of_christianity|E] [situation|E].$BTWK_soc_proselytization_modifier_desc_loc_2$"
 BTWK_soc_proselytization_modifier_desc_loc_2: "\n\nCurrent Proselytization Progress: #high [SCOPE.sTitle('current_proselytization_county').MakeScope.Var('soc_proselytization_progress').GetValue|2]#! (#high [SCOPE.sTitle('current_proselytization_county').MakeScope.ScriptValue('soc_proselytization_monthly_progress_value')|=2]#!)/100[SCOPE.sTitle('current_proselytization_county').Custom('spreading_of_christianity_county_conversion_time_loc')]\n\n#bold Progress Change Breakdown:#!\n[SCOPE.sTitle('current_proselytization_county').MakeScope.GetScriptValueDesc('soc_proselytization_monthly_progress_value')]"
 BTWK_soc_proselytization_modifier_desc_loc_conversion_time_years: "\nAt the current rate, [ROOT.Title.GetNameNoTierNoTooltip] will convert to [ROOT.Var('soc_proselytization_target_faith').Faith.GetName] in around #high [ROOT.Var('soc_proselytization_years_remaining').GetValue|1]#! years."
