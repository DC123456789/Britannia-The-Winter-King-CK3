 BTWK_recent_adventurer_conquest_modifier_desc: "This character was formerly an adventurer who seized their current lands by right of conquest. Their claims to the land are weak and still largely unrecognized by local notables and nearby rulers.\n\n#weak While active, this modifier allows neighbouring rulers of a different [heritage|E] to use the Conquest [casus_belli|E] against them, and vice versa.#!\n\n"

 # HIGH KINGSHIP (BRITANNIA) MODIFIERS
 BTWK_recently_claimed_high_kingship_modifier: "Recently Claimed High Kingship"
 BTWK_recently_claimed_high_kingship_modifier_desc: "This character recently attempted to claim the [high_kingship|E] of [GetTitleByKey('e_britannia').GetNameNoTier], but was forced to back down by the opposition of the other kings. It will be some time before another attempt to claim the title will be taken seriously."
 BTWK_was_recently_high_king_modifier: "Previous High King"
 BTWK_was_recently_high_king_modifier_desc: "This character was previously [high_king|E] of [GetTitleByKey('e_britannia').GetNameNoTier], but is no longer recognized as such. It will be some time before an attempt to reclaim the title will be taken seriously."
 BTWK_britannia_high_king_reform_blocked_modifier: "Recently Failed to Pass High Kingship Reform"
 BTWK_britannia_high_king_reform_blocked_modifier_desc: "This character's attempts to pass a [high_king_britannia_reform|E] were recently frustrated, and it will be some time before they can regather the authority needed for another attempt."
 BTWK_britannia_high_king_central_mint_established_modifier: "Britannic Mint Coinage"
 BTWK_britannia_high_king_central_mint_established_modifier_desc: "The Royal Mints of Britannia strikes coins for circulation in this character's realm, providing a general economic and trade boost."
 btwk_world_britannia_development_growth_factor: "$MOD_MONTHLY_DEVELOPMENT_GROWTH_FACTOR$ in the [GetGeographicalRegion('btwk_world_britannia').GetName] [region|E]"
 BTWK_britannia_high_king_state_church_seat_christian_modifier: "Primate See of Britannia"
 BTWK_britannia_high_king_state_church_seat_nonchristian_modifier: "Seat of the Britannic Church"
 BTWK_britannia_high_king_state_church_seat_christian_modifier_desc: "The restored Primate See of Britannia and head of the Christian church in Britannia sits here in the old Roman capital of Londinium, conferring significant religious influence to any High Kings who control it.\n\nAny ruling [high_king_britannia|E] that controls this [county|E] will get the [GetModifier('BTWK_britannia_high_king_state_church_seat_christian_character_modifier').GetNameWithTooltip] modifier."
 BTWK_britannia_high_king_state_church_seat_nonchristian_modifier_desc: "This [county|E] holds the seat of the official state church of Britannia, conferring significant religious influence to any High Kings who control it.\n\nAny ruling [high_king_britannia|E] that controls this [county|E] will get the [GetModifier('BTWK_britannia_high_king_state_church_seat_nonchristian_character_modifier').GetNameWithTooltip] modifier."
 BTWK_britannia_high_king_state_church_seat_christian_character_modifier: "Influence over the Primate See of Britannia"
 BTWK_britannia_high_king_state_church_seat_nonchristian_character_modifier: "Influence over the Britannic State Church"
 BTWK_britannia_high_king_state_church_seat_christian_character_modifier_desc: "This High King controls the seat of the Primate See of Britannia, giving them considerable influence over the religious affairs of the island."
 BTWK_britannia_high_king_state_church_seat_nonchristian_character_modifier_desc: "This High King controls the seat of the Britannic State Church, giving them considerable influence over the religious affairs of the island."
 BTWK_HK_britannia_establish_centralize_the_church_tt: "[SCOPE.sCharacter('high_king').Custom('BTWK_britannia_high_king_state_church_seat_modifier_name')]"
 BTWK_britannia_high_king_reclaim_caratacus_legacy_modifier: "True Heirs of Macsen Wledig"
 BTWK_britannia_high_king_reclaim_caratacus_legacy_modifier_desc: "This dynasty led the reunification of Britannia as the High Kings of the Britons."
 BTWK_britannia_high_king_restore_imperial_dignity_modifier: "Restorers of the Empire in Britannia"
 BTWK_britannia_high_king_restore_imperial_dignity_modifier_desc: "This dynasty led the glorious restoration of the Roman Empire in Britannia."

