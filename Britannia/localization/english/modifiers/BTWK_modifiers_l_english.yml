 # TRIBAL FAME
 tribal_fame_positive: "Respected Ruler"
 tribal_fame_positive_desc: "This character is sufficiently skilled and prestigious to command the [tribal_respect|E] of their vassals and tribesmen, granting them significant authority over their realm and subjects. [tribal_respect|E] is increased by [prestige_level|E], [prestige|E], [martial|E] skill, and [prowess|E], but decreased by [realm_size|E], whose effects can be reduced by higher authority [laws|E] and more centralized [governments|E].\n\n#bold Current Tribal Fame: [SCOPE.sCharacter('current_character').MakeScope.ScriptValue('tribal_fame_value')|2+]#!\n[SCOPE.sCharacter('current_character').MakeScope.GetScriptValueDesc('tribal_fame_value')]\n\n#bold Effective Realm Size: [SCOPE.sCharacter('current_character').MakeScope.ScriptValue('BTWK_tribal_fame_effective_realm_size')|2V]#!\n[SCOPE.sCharacter('current_character').MakeScope.GetScriptValueDesc('BTWK_tribal_fame_effective_realm_size')|-]\n"
 tribal_fame_negative: "Disrespected Ruler"
 tribal_fame_negative_desc: "This character is insufficiently skilled and prestigious to command the [tribal_respect|E] of their vassals and tribesmen, reducing their authority over their realm and subjects. [tribal_respect|E] is increased by [prestige_level|E], [prestige|E], [martial|E] skill, and [prowess|E], but decreased by [realm_size|E], whose effects can be reduced by higher authority [laws|E] and more centralized [governments|E].\n\n#bold Current Tribal Fame: [SCOPE.sCharacter('current_character').MakeScope.ScriptValue('tribal_fame_value')|2+]#!\n[SCOPE.sCharacter('current_character').MakeScope.GetScriptValueDesc('tribal_fame_value')]\n\n#bold Effective Realm Size: [SCOPE.sCharacter('current_character').MakeScope.ScriptValue('BTWK_tribal_fame_effective_realm_size')|2V]#!\n[SCOPE.sCharacter('current_character').MakeScope.GetScriptValueDesc('BTWK_tribal_fame_effective_realm_size')|-]\n"
