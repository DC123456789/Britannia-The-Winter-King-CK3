 fp1_other_decisions.0101.desc: "Every [ROOT.Char.Custom('GetSteleStoneRunestone')] tells a message of some significant event in the life of the commissioner. From the smallest peasant to a [ROOT.Char.GetTitleAsNameNoTooltip] like myself, the stone records all.\n\nWhat shall this monument speak of?"
 fp1_other_decisions.0111.desc.intro: "Now that I have decided what to put on my [ROOT.Char.Custom('GetSteleStoneRunestone')], the question remains: where to place it?\n\n"
 
 ############# GOVERNMENT #############
 convert_pre_feudal_to_feudalism_decision: "Adopt [GetGovernment('feudal_government').GetNameNoTooltip] Ways"
 convert_pre_feudal_to_feudalism_decision_desc: "While it has served as well for a long time, the traditional [GetGovernment('pre_feudal_government').GetNameNoTooltip] system still fundamentally limits the reach of our authority and holds [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] back from its full potential. If we are to reach true greatness, we must reform our goverment to properly define our vassals' obligations and more firmly integrate them as part of our realm."
 convert_pre_feudal_to_feudalism_decision_confirm: "Adopt [GetGovernment('feudal_government').GetNameNoTooltip] Ways"
 convert_pre_feudal_to_feudalism_decision_tooltip: "Change [government|E] type by adopting a [feudal_government|E]"
 capital_has_building_requirements_for_feudal: "Your [capital|E] has a [GetBuilding('castle_02').GetName] and at least #V 15#! combined [building|E] levels"
 has_75_pc_of_era_2_innovations: "Has #V 75%#! of all General Military & Civic $culture_era_early_medieval$ [innovations|E]"
 has_tribal_obligations_condition_for_feudal: "At least #V 67%#! of your [count|E]-tier or higher vassals are not [tribal|E] and do not have the #high [GetSubjectContractType( 'tribal_obligations' ).GetName]#! [vassal_contract|E]"
 
 convert_pre_feudal_to_feudalism_through_liege_decision: "Adopt [GetGovernment('feudal_government').GetNameNoTooltip] Ways through liege"
 convert_pre_feudal_to_feudalism_through_liege_decision_desc: "As time goes by, the limits of the [GetGovernment('pre_feudal_government').GetNameNoTooltip] system becomes more apparent. The more sophisticated [ROOT.Char.GetLiege.GetGovernment.GetNameNoTooltip] system of my liege, with its defined obligations and stronger authority, offers an attractive alternative; I could ask [ROOT.Char.GetLiege.GetHerHis] help in reforming my own realm."
 convert_pre_feudal_to_feudalism_through_liege_decision_confirm: "Adopt [GetGovernment('feudal_government').GetNameNoTooltip] Ways"
 convert_pre_feudal_to_feudalism_through_liege_decision_tooltip: "Change [government|E] type by adopting a [feudal_government|E]"
 capital_has_building_requirements_for_feudal_through_liege: "Your [capital|E] has at least #V 10#! combined [building|E] levels"

