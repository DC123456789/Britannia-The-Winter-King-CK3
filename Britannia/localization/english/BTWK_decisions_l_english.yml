 found_romanized_germanic_empire_britannia_decision: "Claim the Imperial Crown"
 found_romanized_germanic_empire_britannia_decision_desc: "The Empire of the West in Rome is no more. While some pretentious Romans still scoff at our "barbarian" origins, it cannot be denied that our kingdom remains a bastion of Roman civilization in this new era. If we were to unify enough of Britannia under our rule, we would perhaps have the prestige and legitimacy to crown ourselves as the new and restored Imperator..."
 found_romanized_germanic_empire_britannia_decision_confirm: "The Empire is reborn!"
