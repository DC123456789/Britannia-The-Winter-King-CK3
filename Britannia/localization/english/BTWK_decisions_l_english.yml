 BTWK_rise_of_anglo_saxon_kingdom_decision: "Establish a New Kingdom in [ROOT.Char.Custom('BTWK_get_rise_of_anglo_saxon_kingdom_name')]"
 BTWK_rise_of_anglo_saxon_kingdom_decision_desc: "While we have been well established in [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] for some time now, our reach remains limited and much of the area remains dominated by Briton kings. However, recent instability has weakened the Britons and their hold on the region has never seemed more fragile - let us seize this opportunity to take power for ourselves and found a new kingdom of #V [ROOT.Char.Custom('BTWK_get_rise_of_anglo_saxon_kingdom_name')]#!!"
 BTWK_rise_of_anglo_saxon_kingdom_decision_d_laamp_scyldings_desc: "As the legitimate heirs to old Angle kingdom on the continent, our lineage is still held in great esteem among our people, but without a kingdom to call our own our glory will surely one day fade. While we have had not much opportunity to establish ourselves previously, recent instability has weakened the Britons and their hold on the midlands of central Britain has never seemed more fragile - let us seize this opportunity to take this land for ourselves and found a new kingdom of #V [ROOT.Char.Custom('BTWK_get_rise_of_anglo_saxon_kingdom_name')]#!!"
 BTWK_rise_of_anglo_saxon_kingdom_decision_confirm: "[ROOT.Char.Custom('BTWK_get_rise_of_anglo_saxon_kingdom_name')] shall be ours!"
