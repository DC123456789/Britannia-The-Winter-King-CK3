 ############# OTHER MAJOR DECISIONS ##############
 # Briton
 claim_britannia_high_kingship_decision: "Claim the High Kingship"
 claim_britannia_high_kingship_decision_desc: "Britannia may be divided into warring kingdoms, but the memory of a united province endures. A powerful enough king who holds one of the traditional kingdoms of Britain can claim the vacant [GetTitleByKey('e_britannia').GetName] for himself and attempt to unite the other kings under his banner. Other kings may not be willing to give their independence so easily, however..."
 claim_britannia_high_kingship_decision_tooltip: "Stake your claim as the first of the Britons"
 claim_britannia_high_kingship_decision_confirm: "We will lead the Britons to victory!"
 OPEN_BRITANNIA_HIGH_KING_WINDOW: "Open High King Window"
 
 BTWK_HK_britannia_formalize_high_kingship_decision: "Formalize the High Kingship"
 BTWK_HK_britannia_formalize_high_kingship_decision_desc: "The High Kingship is a great honour to those deemed worthy of the title, but is still largely an informal distinction subject to the whims and goodwill of the other kings. However, now that our dynasty has become somewhat entrenched on the High Kingship, many are coming to see the existence of a High King as an expected feature of the political landscape, and it might be possible to convene a council to formalize the title and the process of election. Perhaps this will only be the first step in unifying the many kingdoms of Britannia together..."
 BTWK_HK_britannia_formalize_high_kingship_decision_tooltip: "Secure the High King's burgeoning authority"
 BTWK_HK_britannia_formalize_high_kingship_decision_confirm: "Gather the Kings!"
 BTWK_HK_britannia_formalize_high_kingship_tt_1: "$BTWK_britannia_high_king.0100.a.tt.1$"
 BTWK_HK_britannia_formalize_high_kingship_tt_2: "$BTWK_britannia_high_king.0100.a.tt.2$"
 
 BTWK_HK_britannia_establish_coregency_decision: "Establish the Right of Coregency"
 BTWK_HK_britannia_establish_coregency_decision_desc: "The authority of the High Kingship is ultimately highly limited by the need for any potential successors to prove themselves as king before they will even be considered for elevation to the High Kingship, ensuring long gaps and considerable infighting between reigns. To bridge this gap without interfering with the traditional rights of the other kings to choose the next High King, we could arrange for the formal election and investment of our heir and successor during our reign, ensuring that they will be accepted as High King as soon as they succeed to the throne."
 BTWK_HK_britannia_establish_coregency_decision_tooltip: "Make the High Kingship an inheritable title"
 BTWK_HK_britannia_establish_coregency_decision_confirm: "Let our dynasty be entrenched!"
 BTWK_HK_britannia_establish_coregency_tt: "$BTWK_britannia_high_king.0105.a.tt$"
 
 BTWK_HK_britannia_establish_central_mint_decision: "Reintroduce Britannic Coinage"
 BTWK_HK_britannia_establish_central_mint_decision_desc: "Britannia has had no reliable source of coinage since the collapse of the Roman administration, but if we were to establish a mint in our capital, we could use the land's rich mineral reserves to strike our own coinage. Bearing the High King's name and image, of course, this would do much to revive withered trade and economic links across the island - and remind both peasant and subject king of their ultimate suzerain."
 BTWK_HK_britannia_establish_central_mint_decision_tooltip: "Strike new coins and reintroduce Britannic currency"
 BTWK_HK_britannia_establish_central_mint_decision_confirm: "Strike the coins!"
 BTWK_HK_britannia_establish_central_mint_tt: "$BTWK_britannia_high_king.0110.a.tt$"
 
 BTWK_HK_britannia_empower_high_council_decision: "Empower the High Council" 
 BTWK_HK_britannia_empower_high_council_decision_desc: "As the High King we are nominally recognized as suzerain over all of Britannia but in reality we have little power beyond the borders of our realm. While an informal council of kings does exist it is currently little more than a talking shop with little real authority. If we could convince the council to make its decisions legally binding across all of the Briton kingdoms - with the military force to back it up - this could give us the legal leverage to assert our authority more strongly, though many of our Subject Kings are likely to rebel against this infringement of their independence."
 BTWK_HK_britannia_empower_high_council_decision_tooltip: "Assert your authority over your [britannia_subject_kings|E]"
 BTWK_HK_britannia_empower_high_council_decision_confirm: "Summon the Council!"
 
 BTWK_HK_britannia_centralize_the_church_decision_christian: "Restore the Primacy of Londinium"
 BTWK_HK_britannia_centralize_the_church_decision_desc_christian: "The church in Britannia has been largely disorganized since the fall of the primate see of Londinium to the Saxons and the collapse of the episcopal hierarchy. Now that the city is back in proper British hands, we are in a position to revive the see and restore the archbishopric to its traditional place at the head of the Britannic church - under the control and patronage of the High King, of course."
 BTWK_HK_britannia_centralize_the_church_decision_tooltip_christian: "Rebuild the Britannic Church under our patronage"
 BTWK_HK_britannia_centralize_the_church_decision_confirm_christian: "Restore the See!"
 BTWK_HK_britannia_centralize_the_church_decision_nonchristian: "Establish a State Church"
 BTWK_HK_britannia_centralize_the_church_decision_desc_nonchristian: "The Christ-worshippers and their incessant insistence on proselytization pose a great danger to the old ways, but it cannot be denied that their strong church organization and hierarchy has been immensely useful for Christian monarchs to exert their control over their realm. If we could replicate this sort of structure among our own priests - with the top of the hierarchy reporting to the High King - this could go a long way towards further centralizing power away from that of the individual kings into our own hands."
 BTWK_HK_britannia_centralize_the_church_decision_tooltip_nonchristian: "Centralize the priesthood under our control"
 BTWK_HK_britannia_centralize_the_church_decision_confirm_nonchristian: "Summon the [ROOT.Char.GetFaith.PriestNeuterPlural|U]!"
 BTWK_HK_britannia_establish_centralize_the_church_tt_1: "$BTWK_britannia_high_king.0140.a.tt.1$"
 BTWK_HK_britannia_establish_centralize_the_church_tt_2.nonchristian: "The [GetModifier('BTWK_britannia_high_king_state_church_seat_nonchristian_modifier').GetNameWithTooltip] will be established in a [holy_site|E] in the realm"
 BTWK_HK_britannia_establish_centralize_the_church_tt_3.christian: "$BTWK_britannia_high_king.0140.a.tt.2.christian$"
 BTWK_HK_britannia_establish_centralize_the_church_tt_3.nonchristian: "$BTWK_britannia_high_king.0140.a.tt.2.nonchristian$"
 
 BTWK_HK_britannia_formalize_succession_decision: "Codify the Succession" 
 BTWK_HK_britannia_formalize_succession_decision_desc: "While the High Kingship has in practice been hereditary the title has always been and is still officially elected from among all of the British kings, and the right of any sufficiently powerful king to contest the throne is still generally recognized. With the support of the church for our dynasty's continued rule and the approval of our vassal kings, we can abolish these antiquated rules and formalize the rights of the High King's heirs to the throne, ensuring a stable and predictable line of succession."
 BTWK_HK_britannia_formalize_succession_decision_tooltip: "Formalize your dynasty's rights to the High Kingship"
 BTWK_HK_britannia_formalize_succession_decision_confirm: "Let the succession be secure!"
 BTWK_HK_britannia_formalize_succession_tt_1: "$BTWK_britannia_high_king.0150.a.tt.1$"
 BTWK_HK_britannia_formalize_succession_tt_2: "$BTWK_britannia_high_king.0150.a.tt.2$"
 
 BTWK_HK_britannia_unify_legal_codes_decision: "Unify the Legal Codes"
 BTWK_HK_britannia_unify_legal_codes_decision_desc: "The courts and assemblies of the land are covered by a wide variety of local traditions, ranging from an adherence to Celtic laws to the continued usage of provincial Roman codes and every variant and combination in between. Following the example of other post-Roman kingdoms on the continent we should make a formal compilation of our laws and customs and standardize them into a single legal code, the Lex Britannorum, for all to read and follow."
 BTWK_HK_britannia_unify_legal_codes_decision_tooltip: "Issue a standardized legal code for all Britons"
 BTWK_HK_britannia_unify_legal_codes_decision_confirm: "Compile the laws!"
 BTWK_HK_britannia_unify_legal_codes_tt: "$BTWK_britannia_high_king.0160.a.tt$"
 
 BTWK_HK_britannia_reclaim_caratacus_legacy_decision: "Claim the Inheritance of Macsen Wledig"
 BTWK_HK_britannia_reclaim_caratacus_legacy_decision_desc: "When $BTWK_macsen_wledig$ crossed the channel with the flower of our youth to claim the Imperial throne centuries ago, he entrusted us Britons, his heirs and followers, with the protection of our island and the promise of sovereignty. The emperors are gone now, but we, the native Britons, have proved our worthiness in the face of challenges both within and without by persevering against the endless barbarian invasions to rebuild and reunite our lands and kingdoms. With the dream of a reunified Britannia finally complete, it is time to seize our rightful inheritance as the true heirs of Macsen Wledig and unite all of the Britannic Isles under our banner!"
 BTWK_HK_britannia_reclaim_caratacus_legacy_decision_tooltip: "Let Britannia reclaim its rightful place"
 BTWK_HK_britannia_reclaim_caratacus_legacy_decision_confirm: "An equal and successor to Rome itself!"
 BTWK_macsen_wledig: "#game_link #ONCLICK:CHARACTER,[GetTitleByKey('e_britannia').MakeScope.Var('macsen_wledig_char').Char.GetID] #TOOLTIP:CHARACTER,[GetTitleByKey('e_britannia').MakeScope.Var('macsen_wledig_char').Char.GetID] Macsen Wledig#!#!#!"
 BTWK_HK_britannia_reclaim_caratacus_legacy_tt: "The [britannia_struggle|E] will end with the #color_green;bold Reunification of Britannia#!"
 
 BTWK_HK_britannia_reclaim_caratacus_legacy_decision_struggle: "Heirs of Macsen Wledig"
 BTWK_HK_britannia_reclaim_caratacus_legacy_decision_struggle_desc: "$BTWK_HK_britannia_reclaim_caratacus_legacy_decision_desc$"
 BTWK_HK_britannia_reclaim_caratacus_legacy_decision_struggle_tooltip: "$BTWK_HK_britannia_reclaim_caratacus_legacy_decision_tooltip$"
 BTWK_HK_britannia_reclaim_caratacus_legacy_decision_struggle_confirm: "$BTWK_HK_britannia_reclaim_caratacus_legacy_decision_confirm$"
 
 BTWK_HK_britannia_restore_imperial_dignity_decision: "Restore Imperial Dignity"
 BTWK_HK_britannia_restore_imperial_dignity_decision_desc: "One by one the provinces of the West were lost, until even Italy itself came under the rule of barbarian kings - all except Britannia. While we faced grave challenges from the Irish, Picts, and above all the Saxons, we alone were able to stand our ground and ensure that our corner of the empire never truly fell. But if we are to truly restore Roman rule our system of vassal kings, holding to strong and entrenched authority over their kingdoms, cannot stand - either the kings will willingly give up their privileges, or we will take them away by force of arms. Only then will we be ready to be recognized as a true heir to the empire - no longer will Britannia be regarded as a distant backwater, but rather the place where the Empire in the West survived and was reborn anew!"
 BTWK_HK_britannia_restore_imperial_dignity_decision_tooltip: "Rome's most distant son will reclaim its mantle"
 BTWK_HK_britannia_restore_imperial_dignity_decision_confirm: "Roman rule, restored at last!"
 BTWK_HK_britannia_restore_imperial_dignity_tt: "The [britannia_struggle|E] will end in a #color_purple;bold Roman Restoration#!"
 
 BTWK_HK_britannia_restore_imperial_dignity_decision_struggle: "$BTWK_HK_britannia_restore_imperial_dignity_decision$
 BTWK_HK_britannia_restore_imperial_dignity_decision_struggle_desc: "$BTWK_HK_britannia_restore_imperial_dignity_decision_desc$"
 BTWK_HK_britannia_restore_imperial_dignity_decision_struggle_tooltip: "$BTWK_HK_britannia_restore_imperial_dignity_decision_tooltip$"
 BTWK_HK_britannia_restore_imperial_dignity_decision_struggle_confirm: "$BTWK_HK_britannia_restore_imperial_dignity_decision_confirm$"
 
 # Anglo-Saxon
 BTWK_HK_aengland_declare_supremacy_decision: "Declare the [GetTitleByKey('e_aengland').MakeScope.Var('aengland_primary_kingdom').Title.GetAdjectiveNoTooltip] Supremacy"
 BTWK_HK_aengland_declare_supremacy_decision_desc: "[GetTitleByKey('e_aengland').MakeScope.Var('aengland_primary_kingdom').Title.GetNameNoTierNoTooltip] has been comfortably at the centre of the Anglo-Saxon world for many decades now. Other kings rise and fall at our hands, and there is no place across all of [GetTitleByKey('e_aengland').GetNameNoTierNoTooltip] where our influence is not felt in some way. Increasingly many people see our domination over the Anglo-Saxons as the natural order of things in [GetTitleByKey('e_aengland').GetNameNoTierNoTooltip], the ascension of our kings as Bretwalda inevitable - let us seize this opportunity to establish the [GetTitleByKey('e_aengland').MakeScope.Var('aengland_primary_kingdom').Title.GetAdjectiveNoTooltip] Supremacy once and for all!"
 BTWK_HK_aengland_declare_supremacy_decision_confirm: "Let our might be unchallenged!"
 BTWK_HK_aengland_declare_supremacy_decision_tooltip: "Cement our rule over [GetTitleByKey('e_aengland').GetNameNoTierNoTooltip]"
 BTWK_HK_aengland_declare_supremacy_decision_hegemony_score_tt: "Your [aengland_hegemony_score|E] is at least #value 500#! #weak (Currently: [THIS.Var('hegemony_score').GetValue|0])#!"
