 # General
 BTWK_britannia_struggle_outsider_ending_decision: "Supremacy over Britannia"
 BTWK_britannia_struggle_outsider_ending_decision_desc: "The End of Roman Britannia was a great blow to the province, but it also opened up great opportunities for those willing and able to take advantage of the disorder. Both Britons and Saxons had hoped to reunite the province on their terms, but they had not reckoned on us taking this opening to defy them both. There will be no need for High Kings or Bretwaldas once we claim Britannia for ourselves!"
 BTWK_britannia_struggle_outsider_ending_decision_confirm: "Britannia shall be ours!"
 BTWK_britannia_struggle_outsider_ending_decision_tooltip: "Proclaim our dominion over Britannia"
 BTWK_britannia_struggle_outsider_ending_decision_struggle_effect_tt: "The [britannia_struggle|E] will end with [WordA_An(THIS.Char.GetCulture.GetNameNoTooltip)] #color_yellow;bold [THIS.Char.GetCulture.GetNameNoTooltip] Conquest#!!"
 
 ############# FRONTIER DECISIONS ############## 
 begin_construction_offas_dyke_decision: "The Welsh Frontier"
 begin_construction_offas_dyke_decision_desc: "The westernmost lands of Britain are far removed from the fertile grounds of the East our people now inhabit. They are dominated by a harsh, mountainous terrain, home to the likewise rugged #italic Wealas#!. While laying claim to the region may not be in our best interests, neither is it tolerable that its men within have free reign to launch raids into our own lands. \n\nIf we could establish a proper border to the west, perhaps we could divide them, building a great dyke between the Severn and the Dee?"
 begin_construction_offas_dyke_decision_tooltip: "Construct a great dyke to defend against the Britons"
 begin_construction_offas_dyke_decision_confirm: "Begin construction"

 begin_restoration_antonine_wall_decision: "Rebuild the Antonine Wall"
 begin_restoration_antonine_wall_decision_desc: "The Antonine Wall existed, albeit for a short time, as the northernmost Roman frontier. After around 20 years of occupation, the legions stationed there had retreated back to Hadrian's Wall, unable to handle excursions from the Caledonians north of the Antonine Wall, and rebellions by Britons to its south. \n\nIf a strong Roman presence were to be established in the area, it stands to reason that we could seek its reconstruction."
 begin_restoration_antonine_wall_decision_tooltip: "Rebuild and improve upon the old Antonine Wall"
 begin_restoration_antonine_wall_decision_confirm: "For the Empire!"  # Unsure on this. Put some fancy Latin in it?
 
 restore_hadrians_wall_decision: "Restore Hadrian's Wall"
 restore_hadrians_wall_decision_desc: "Hadrian's Wall is one of the many marvels of engineering left behind by the Romans after their departure from Britannia. It generally marked the northernmost border of the Roman Empire, beyond which lay various Brythonic client kingdoms, and even further the Pictish tribes of #italic Caledonia#!. \n\nAfter the collapse of Roman Britannia, the wall no longer served any defensive purpose and was gradually abandoned to its fate. Most of the forts and stonework remain intact, however, and it would be possible - albeit expensive - to restore the wall to its former glory."
 restore_hadrians_wall_decision_tooltip: "Rebuild the northern wall"
 restore_hadrians_wall_decision_confirm: "Let the restoration begin!"
 is_restoring_hadrians_wall_tt: "Hadrian's Wall is being restored"

 ruin_hadrians_wall_decision: "Tear Down Hadrian's Wall"
 ruin_hadrians_wall_decision_desc: "Once the northern frontier of Roman Britannia, Hadrian's Wall was largely abandoned with the withdrawal of the Roman legions and since then has served little defensive or political purpose. Most of the construction remains, however, and locals have begun to use the abandoned walls as a convenient source of stone for new buildings. Perhaps it would be beneficial to follow suit, and make this into our official policy?"
 ruin_hadrians_wall_decision_tooltip: "Tear down the old Roman wall for resources"
 ruin_hadrians_wall_decision_confirm: "Send for the engineers"
 
 ############# REVOLT DECISIONS ############## 
 BTWK_pacify_cultural_redoubt_decision: "Pacify Redoubts"
 BTWK_pacify_cultural_redoubt_decision_desc: "The highland redoubts that we have brought under our rule are proving difficult to control and highly prone to revolt. If we are to increase our authority over the area and properly pacify these provinces, we must invest in building fortresses and reigning in the local nobility in order to properly bring the local population to heel."
 BTWK_pacify_cultural_redoubt_decision_tooltip: "Bring the $BTWK_cultural_redoubt_modifier$s under our control"
 BTWK_pacify_cultural_redoubt_decision_confirm: "Pacify Redoubts"
 BTWK_pacify_cultural_redoubt_decision_government_tt: "Your [government|E] is #bold not#! [tribal_i|E] [tribal|E] or [pre_feudal_i|E] [pre_feudal|E]"
 BTWK_pacify_cultural_redoubt_decision_effect_tt: "You start pacifying as many [counties|E] as you can afford #weak ([THIS.Char.Custom('BTWKPacifyCulturalRedoubtCount')])#!"
 BTWK_pacify_cultural_redoubt_decision_1_redoubt: "#bold 1#! Redoubt"
 BTWK_pacify_cultural_redoubt_decision_x_redoubts: "#bold [ROOT.ScriptValue('BTWK_cultural_redoubt_num_can_pacify_min_1')]#! Redoubts"
 BTWK_pacify_cultural_redoubt_decision_all_redoubts: "All #bold [ROOT.ScriptValue('BTWK_cultural_redoubt_num_can_pacify_min_1')]#! Redoubts"
 BTWK_start_pacify_cultural_redoubt_tt: "The pacification process will take #high [EmptyScope.ScriptValue('BTWK_cultural_redoubt_pacification_stage_2_years')|0]#! years to fully finish. Progress can be interrupted if holdings in the province are occupied and set back if taken by revolts, and will be lost completely if the [county|E] is retaken by native rulers. Once the process is finished, all negative effects of the $BTWK_cultural_redoubt_modifier$ modifier will be removed."