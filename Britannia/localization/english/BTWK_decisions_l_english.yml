 ############# TITLES #############
 ############# DE JURE SHIFT DECISIONS ##############
 no_title_shown_string: "#help Formable titles will appear once you control a [county|E]\n in or neighbouring their potential [de_jure|e] territory #!"
 
 # GENERIC
 integrate_kingdom_region_decision: "Regional Integration"
 integrate_kingdom_region_decision_desc: "A conquest is not complete as long it refuses to recognize our legitimate suzerainty. As we expand our borders, we can integrate relevant regions into our growing [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] and secure our claim over these lands."
 integrate_kingdom_region_decision_tooltip: "Integrate new [kingdoms|E] into our [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]"
 integrate_kingdom_region_decision_confirm: "Integrate All"
 integrate_kingdom_region_decision_any_integratable_tt: "Must have at least one integratable region"
 integrate_kingdom_region_button_title_name: "[Title.MakeScope.Var('kingdom_geographical_region_var').GeographicalRegion.GetName]"
 
 # ANGLO-SAXON
 claim_aengland_bretwalda_decision: "Claim the Title of Bretwalda"
 claim_aengland_bretwalda_decision_desc: "There are many kings among the Anglo-Saxons, but only one can be so powerful as to be called [bretwalda|E]. Only the greatest of kings who have proved their undisputed dominance among all the other Anglo-Saxon kingdoms of the isles are afforded this honour, formalizing their claim to imperium over all of [GetTitleByKey('e_aengland').GetNameNoTierNoTooltip] and their place as the greatest among the Kings of the Anglo-Saxons."
 claim_aengland_bretwalda_decision_tooltip: "Proclaim your hegemony over [GetTitleByKey('e_aengland').GetNameNoTierNoTooltip]"
 claim_aengland_bretwalda_decision_confirm: "Let our might be recognized"
 claim_aengland_bretwalda_culture_requirement_tt: "Your [culture|E] is in the $germanic_group$ [heritage_group|E], and does not have [GetCulturePillar('heritage_romanized_germanic').GetName] [heritage|E]"
 claim_aengland_bretwalda_kingdom_requirement_tt: "You hold at least one [kingdom|E] title that is a [de_jure|E] vassal of the [GetTitleByKey('e_aengland').GetName] with its [capital|E] in the [GetGeographicalRegion('btwk_world_britannia').GetName] region"
 claim_aengland_bretwalda_military_requirement_tt: "Your military strength is at least #value 1000#!"
 claim_aengland_bretwalda_king_ruled_years_requirement_tt: "You have held a [kingdom|E] tier or higher title for at least #value 10#! years"
 claim_aengland_bretwalda_king_hegemony_score_tt: "Your [aengland_hegemony_score|E] is at least #value 180#! #weak (Currently: [THIS.Var('hegemony_score').GetValue|0])#!"
 claim_aengland_bretwalda_decision_effect_tt: "While as [bretwalda|E] our influence over our client kings is limited, if we can secure our hegemony over the Anglo-Saxon kingdoms for long enough to #V Declare Supremacy#! we will eventually be able to usurp their authority and #high $BTWK_enforce_vassalage_client_kingdom_interaction$#! on their kingdoms."
 OPEN_AENGLAND_BRETWALDA_WINDOW: "Open Bretwalda Window"
 
 create_anglo_saxon_de_jure_duchies_decision: "Expand the Anglo-Saxon Lands"
 create_anglo_saxon_de_jure_duchies_decision_desc: "The age of the Saxons is here! As we complete our conquest of Britannia, we can create new titles to replace the obsolete and decaying kingdoms of the Britons and solidify our claims over these lands."
 create_anglo_saxon_de_jure_duchies_decision_tooltip: "Forge new kingdoms and redraw the map of Britannia"
 create_anglo_saxon_de_jure_duchies_decision_confirm: "Create All"
 create_anglo_saxon_de_jure_duchies_decision_any_formable_tt: "Must have at least one creatable title"
 create_anglo_saxon_de_jure_duchies_decision_button_tooltip: "[THIS.Title.GetName] is created"
 
 destroy_anglo_saxon_de_jure_duchies_decision: "Reclaim the Lost Lands"
 destroy_anglo_saxon_de_jure_duchies_decision_desc: "The age of the Saxons is over! As we complete our reconquest of Britannia, we can destroy the artificial kingdoms of the usurping Saxons and restore the old kingdoms that once existed there."
 destroy_anglo_saxon_de_jure_duchies_decision_tooltip: "Destroy the Anglo-Saxon kingdoms and restore the old order in Britannia"
 destroy_anglo_saxon_de_jure_duchies_decision_confirm: "Destroy All"
 destroy_anglo_saxon_de_jure_duchies_decision_any_destroyable_tt: "Must have at least one destroyable title"
 destroy_anglo_saxon_de_jure_duchies_decision_no_title_shown_string: "#help Destroyable titles will appear once you control a [county|E]\n in or neighbouring their current [de_jure|e] territory #!"
 destroy_anglo_saxon_de_jure_duchies_decision_button_tooltip: "[THIS.Title.GetName] is destroyed"
 
 integrate_duchy_anglo_saxon_decision: "Integrate Border Regions"
 integrate_duchy_anglo_saxon_decision_desc: "It is not enough to merely conquer lands from our neighbours - localist sentiment is always strong and we constantly face revolts from those who resent our 'foreign' rule. However, some of the border areas appear to be more amenable to our rule and it should be possible to convince the local elites to accept our overlordship as a proper part of our kingdom."
 integrate_duchy_anglo_saxon_decision_tooltip: "Integrate new regions into our Kingdom"
 integrate_duchy_anglo_saxon_decision_confirm: "Integrate Regions"
 integrate_duchy_anglo_saxon_any_integratable_tt: "Must have at least one integratable title"
 integrate_duchy_anglo_saxon_decision_button_tooltip: "[scoped_title.MakeScope.Var('duchy').Title.GetName] is integrated into [scoped_title.MakeScope.Var('new_liege').Title.GetName]"
 
 mercia_annex_north_bank_decision: "Annex the North Bank"
 mercia_annex_north_bank_decision_desc: "TODO"
 mercia_annex_north_bank_decision_tooltip: "Annex the north bank of the Thames"
 mercia_annex_north_bank_decision_confirm: "Secure the southern border"
 mercia_annex_north_bank_decision_effect_tt: "Other [counties|U] in the [GetTitleByKey('d_berkshire').GetName] north of the Thames will be annexed into the [GetTitleByKey('k_mercia').GetName] once the relevant Ealdormanries are formed"
 mercia_annex_north_bank_decision_effect_tt2: "[counties|U] in the [GetTitleByKey('d_berkshire').GetName] north of the Thames will be annexed into the [GetTitleByKey('k_mercia').GetName] once the relevant Ealdormanries are formed"
 
 create_berkshire_decision: "Create $BERKSHIRE$"
 create_berkshire_decision_desc: "TODO"
 create_berkshire_decision_tooltip: "Reorganize [GetTitleByKey('d_berkshire').GetNameNoTier] into a new [GetTitleByKey('d_berkshire').GetTierAsNameNoTooltip] of $BERKSHIRE$"
 create_berkshire_decision_confirm: "Reorganize the south bank"
 create_berkshire_decision_integration_allowed_effect_tt: "The new [GetTitleByKey('d_berkshire').GetTierAsNameNoTooltip] of $BERKSHIRE$ can be integrated into the [GetTitleByKey('k_mercia').GetName] using the $integrate_duchy_anglo_saxon_decision$ decision"

 expand_surrey_decision: "Expand [GetTitleByKey('d_surrey').GetNameNoTierNoTooltip]"
 expand_surrey_decision_desc: "TODO"
 expand_surrey_decision_tooltip: "Expand the borders of [GetTitleByKey('d_surrey').GetNameNoTierNoTooltip]"
 expand_surrey_decision_confirm: "Revise the eastern border"
 
 form_northumbria_decision: "Form $k_northumbria$"
 form_northumbria_decision_desc: "While never before formally united, the Angles north of the Humber have always felt a kinship that went well beyond any bonds shared with the other Anglo-Saxons to the south. The division between Bernicians and Deirans has always seemed temporary and unimportant and it has been the ambition of every northern king to bring our two peoples back together. Now that the Angles of the North have been firmly reunited, let our kingdoms be united as well, so that there will only be one king North of the Humber!"
 form_northumbria_decision_tooltip: "Unite the twin kingdoms north of the Humber"
 form_northumbria_decision_confirm: "Unite the North"
 form_northumbria_decision_bernicia_20_counties_tt: "You control at least #value 20#! [counties|E] in the [GetTitleByKey('k_bernicia').GetName]"
 form_northumbria_decision_deira_20_counties_tt: "You control at least #value 20#! [counties|E] in the [GetTitleByKey('k_deira').GetName]"
 northumbria_de_jure_shift_tt: "The [GetTitleByKey('k_northumbria').GetName] becomes [de_jure|E] liege of all de jure [duchies|E] of the [GetTitleByKey('k_bernicia').GetName] and the [GetTitleByKey('k_deira').GetName]"
 
 elevate_lindsey_decision: "Elevate the Kingdom of $k_lindsey$"
 elevate_lindsey_decision_desc: "Despite its wealth and historical importance, Lindsey has always been seen as one of the minor Anglo-Saxon kingdoms, weaker and less important than the larger kingdoms of the Heptarchy. If we could change this by establishing Lindsey's preemenince among the Anglo-Saxons of the Trent, the other kings would have no choice but to recognize Lindsey as one of the great kingdoms of [GetTitleByKey('e_aengland').GetNameNoTierNoTooltip]."
 elevate_lindsey_decision_tooltip: "Raise Lindsey to its proper place among the Anglo-Saxon kingdoms"
 elevate_lindsey_decision_confirm: "No longer will we be overlooked"
 
 # ROMAN
 create_roman_de_jure_duchies_decision: "Restore the Roman Administration"
 create_roman_de_jure_duchies_decision_desc: "The Empire endures! As we complete our reconquest of Britannia, we can wipe away the petty warlord and barbarian kingdoms to restore the old Roman administration over these lands."
 create_roman_de_jure_duchies_decision_tooltip: "Reorganize the civitates and restore the old Roman order over Britannia"
 create_roman_de_jure_duchies_decision_confirm: "Reorganize All"
 create_roman_de_jure_duchies_decision_any_formable_tt: "Must have at least one title to reorganize"
 create_roman_de_jure_duchies_decision_button_title_name: "[Title.Custom('duchy_roman_name')]"
 create_roman_de_jure_duchies_decision_button_tooltip: "[THIS.Title.GetName] is reorganized [SelectLocalization(EqualTo_string(Localize(THIS.Title.GetNameNoTooltip), Localize(THIS.Title.Custom('duchy_roman_name_no_tooltip'))), 'under Roman administration', Concatenate(Concatenate('into #high ', Localize(THIS.Title.Custom('duchy_roman_name_no_tooltip'))), '#!'))]"
 
 destroy_roman_de_jure_duchies_decision: "End Imperial Authority"
 destroy_roman_de_jure_duchies_decision_desc: "The era of imperial rule is over! As central authority falters once more, we can wrest back control over the Roman administration and return the British provinces to local rule."
 destroy_roman_de_jure_duchies_decision_tooltip: "Dismantle the Imperial provinces and restore the local kingdoms"
 destroy_roman_de_jure_duchies_decision_confirm: "Reorganize All"
 destroy_roman_de_jure_duchies_decision_any_destroyable_tt: "Must have at least one title to reorganize"
 destroy_roman_de_jure_duchies_decision_no_title_shown_string: "#help Destroyable titles will appear once you control a [county|E]\n in or neighbouring their current [de_jure|e] territory #!"
 destroy_roman_de_jure_duchies_decision_button_tooltip: "[THIS.Title.GetName] is reorganized"
 
 # BRITON 
 create_deheubarth_decision: "Form $k_deheubarth$"
 create_deheubarth_decision_desc: "We have expanded beyond the traditional borders of [GetTitleByKey('k_demetia').GetNameNoTier] to control much of the south of the Cymric mountains. Our previous titles no longer properly describe the true extent of our rule - let us be known as the Kings of the South!"
 create_deheubarth_decision_confirm: "Unite the South"
 create_deheubarth_decision_tooltip: "The Kingdom of $k_deheubarth$ will be founded"
 
 reunite_dumnonia_decision: "Reunite $k_dumnonia$"
 reunite_dumnonia_decision_desc: "The ancient lands of the Dumnonii are divided between Dumnonia in the east and Kernow in the west. Now that we have reunited the two crowns in our person, we can end this artificial division to form a strong British bulwark in the southwest."
 reunite_dumnonia_decision_confirm: "Onen hag oll!"
 reunite_dumnonia_decision_tooltip: "$k_dumnonia$ will be reunited"
 controls_half_of_dumnonia_tt: "You [completely_control|E] more than #value 50%#! of [GetGeographicalRegion('btwk_custom_dumnonia').GetName]"
 controls_half_of_cornwall_tt: "You [completely_control|E] more than #value 50%#! of [GetGeographicalRegion('btwk_custom_cornwall').GetName]"
 
 form_strathclyde_decision: "King of the Cumbrians"
 form_strathclyde_decision_desc: "One by one the other kings of the Old North have fallen, but the men of Alt Clut stand firm. With the expansion of our kingdom into a formidable power in the region, it is time for us to take our place as the true protectors of Cumbria."
 form_strathclyde_decision_confirm: "The north endures!"
 form_strathclyde_decision_tooltip: "The last of the Cumbrians will be united"
 last_cumbrian_king_tt: "There are no other [rulers|e] of [GetCulturePillar('heritage_brythonic').GetName] [heritage|e] that hold a [kingdom|e] title in [GetGeographicalRegion('btwk_world_britannia_hen_ogledd').GetName]"
 FIRST_IF_CONTROLS_C_LUGUVALIUM_EFFECT: "If the [GetTitleByKey('c_luguvalium').GetName] is [completely_controlled]:"
 FIRST_IF_CONTROLS_C_DIN_EIDYN_EFFECT: "If the [GetTitleByKey('c_din_eidyn').GetName] is [completely_controlled]:"
 FIRST_IF_CONTROLS_C_DESNES_MOR_EFFECT: "If the [GetTitleByKey('c_desnes_mor').GetName] is [completely_controlled]:"
 
 rheged_annex_novant_decision: "Annex [GetTitleByKey('d_galloway').GetNameNoTierNoTooltip]"
 rheged_annex_novant_decision_desc: "The Kings at [GetTitleByKey('k_ynys_man').GetPreferredCapital.GetCountyData.GetCapital.GetBaronyNameExplicitly] have long been a thorn on our side, yet their strongholds sit vulnerable and close to our border. Let us drive them from the mainland and claim the lands of [GetTitleByKey('d_galloway').GetNameNoTier] for ourselves!"
 rheged_annex_novant_decision_confirm: "Lay claim to [GetTitleByKey('d_galloway').GetNameNoTierNoTooltip]"
 rheged_annex_novant_decision_tooltip: "Expand the [GetTitleByKey('k_rheged').GetName] into [GetTitleByKey('d_galloway').GetNameNoTier]"
 
 strathclyde_annex_aeron_decision: "Annex $d_aeron$"
 strathclyde_annex_aeron_decision_desc: "TODO"
 strathclyde_annex_aeron_decision_confirm: "Claim the western coast"
 strathclyde_annex_aeron_decision_tooltip: "TODO"
 
 create_hen_ogledd_decision: "Claim the Old North"
 create_hen_ogledd_decision_desc: "A powerful enough Cumbrian king can reclaim the vacant title of #high High King of [GetTitleByKey('e_hen_ogledd').GetNameNoTier]#!, 'The Old North', for himself. The true Kings of the North were prophesied to regain their dominion and expand their rule over all of Britannia. Will a unified Cumbrian North be able to repel the Germanic invaders from Britain once and for all?"
 create_hen_ogledd_decision_confirm: "Unite the North!"
 create_hen_ogledd_decision_tooltip: "$e_hen_ogledd$ will be reunited!"
 has_controlled_hen_ogledd_for_20_years: "You have controlled or held [tributary|E] #high 70%#! of [GetGeographicalRegion('btwk_world_britannia_hen_ogledd').GetName] for #high 20#! years #weak (currently: [THIS.Var('hen_ogledd_control_years').GetValue|0])#!"
 vassalize_all_hen_ogledd_tributaries: "All [GetCulturePillar('heritage_brythonic').GetName] or [GetCulturePillar('heritage_latin').GetName] [heritage|e] [tributaries|E] in [GetGeographicalRegion('btwk_world_britannia_hen_ogledd').GetName] will be vassalized"
 hen_ogledd_de_jure_shift_tt: "The [GetTitleByKey('e_hen_ogledd').GetName] becomes [de_jure|E] liege of all Brythonic kingdoms in the region of [GetGeographicalRegion('btwk_world_britannia_hen_ogledd').GetName]"
 
 reunite_the_britons_decision: "Reunite the Britons"
 reunite_the_britons_decision_desc: "The last few centuries have dealt us defeat upon defeat, forcing us to retreat to isolated redoubts while invaders enjoy the fruits of our former heartlands. But not all hope is lost. In these lands where Britons still reign, people speak of #V 'Y Mab Darogan'#! - the prophesied child - a second Arthur destined to drive the Saxons back into the sea and reclaim Britannia for its rightful heirs. Will that be us?"
 reunite_the_britons_decision_confirm: "Prydain am byth!"
 reunite_the_britons_decision_tooltip: "Britannia will be restored!"
 reunite_the_britons_decision_kingdom_tt: "You hold a Brythonic kingdom in the region of [GetGeographicalRegion('btwk_world_britannia').GetName]"
 reunite_the_britons_decision_end_struggle_tt: "The [britannia_struggle|E] will end with the #color_green;bold Reunification of Britannia#!"
 britannia_de_jure_shift_tt: "The [GetTitleByKey('e_britannia').GetName] becomes [de_jure|E] liege of all Brythonic kingdoms in the region of [GetGeographicalRegion('btwk_world_britannia').GetName]"
 FIRST_IF_HAS_E_HEN_OGLEDD_AS_PRIMARY_TITLE_EFFECT: "If [GetTitleByKey('e_hen_ogledd').GetName] is your [primary_title|E]:"
 
 britannia_claim_imperial_title_decision: "Claim the Imperial Crown"
 britannia_claim_imperial_title_decision_tt: "You claim the title of #color_porple #bold Emperor#!#!"
 britannia_claim_imperial_title_decision_desc: "TODO"
 britannia_claim_imperial_title_decision_confirm: "The Empire is reborn!"
 britannia_claim_imperial_title_decision_tooltip: "TODO"
 
 # IRISH/GAELIC
 create_lleyn_decision: "Form $k_lleyn$"
 create_lleyn_decision_desc: "The weakness of the Britons have allowed many of our countrymen to settle here on the Lleyn pennisula and the island of Ynys Mon. While kings across Cymru fear our raids even in our current divided state, we could be stronger yet if united together under a single king."
 create_lleyn_decision_confirm: "Found a new kingdom across the sea!"
 create_lleyn_decision_tooltip: "The Kingdom of $k_lleyn$ will be founded"
 
 destroy_lleyn_decision: "Reclaim $k_lleyn$"
 destroy_lleyn_decision_desc: "The ancient city of Segontium and the holy island of Ynys Mon sit occupied by the Irish invaders who dared to claim our land for their own, using its rich harvests to fund devastating raids against our lands and people. This unacceptable state of affairs must end, and this corner of Britannia reclaimed!"
 destroy_lleyn_decision_confirm: "Expel the Irish!"
 destroy_lleyn_decision_tooltip: "The Kingdom of $k_lleyn$ will be destroyed"
 lleyn_controlled_by_non_gaelic_tt: "No province in [GetGeographicalRegion('btwk_custom_lleyn').GetName] is controlled by a ruler with [GetCulturePillar('heritage_goidelic').GetName] [heritage|e]"
 
 create_irish_cymru_decision: "Unite $cn_cymru_gaelic$"
 create_irish_cymru_decision_desc: "While they may still look at us Gaels as foreign invaders despite our increasingly long history here, it is clear that the Britons are in need of a strong ruler to restore order over their shattered island. If we can bring enough of the region under our rule one way or another, we may able to force them to recognize us as High King over all of $cn_cymru_gaelic$!" 
 create_irish_cymru_decision_confirm: "Claim the High Kingship"
 create_irish_cymru_decision_tooltip: "Become High King of an Irish $cn_cymru_gaelic$"
 
 # ROMANIZED GERMANIC 
 found_romanized_germanic_kingdom_britannia_decision: "Unite the [ROOT.Char.GetCulture.MakeScope.Var('ancestral_non_roman_culture').Culture.GetCollectiveNounNoTooltip]"
 found_romanized_germanic_kingdom_britannia_decision_desc: "The [ROOT.Char.GetCulture.MakeScope.Var('ancestral_non_roman_culture').Culture.GetCollectiveNounNoTooltip] have been settled in Britannia for some time now, though none of our number have ever grown powerful enough to form a kingdom of our own. That is changing now, however, and perhaps it is time that we make our mark on the island and found a new Kingdom of the [ROOT.Char.GetCulture.MakeScope.Var('ancestral_non_roman_culture').Culture.GetCollectiveNounNoTooltip] to mark our new homeland in Britannia."
