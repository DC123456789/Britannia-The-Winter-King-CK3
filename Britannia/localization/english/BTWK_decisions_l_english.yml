 BTWK_HK_aengland_declare_supremacy_decision_effect_tt.2: "$BTWK_aengland_bretwalda.0002.a.tt.2$"
 
 BTWK_HK_aengland_unite_aengland_decision: "King of the English"
 BTWK_HK_aengland_unite_aengland_decision_desc: "[GetTitleByKey('e_aengland').GetNameNoTier] will never be able to function as a truly united kingdom as long as the loyalties of the people and the lords continue to be that of Mercia, Wessex or any of the other petty kingdoms of the Heptarchy. Now that all the lands of the Anglo-Saxons have been finally and firmly brought under our rule, it is time to be not merely recognized as overlord over the Anglo-Saxon kingdoms, but properly crowned King of the English!"
 BTWK_HK_aengland_unite_aengland_decision_confirm: "Let [GetTitleByKey('e_aengland').GetNameNoTierNoTooltip] be united!"
 BTWK_HK_aengland_unite_aengland_decision_tooltip: "Unite the kingdoms of the Anglo-Saxons once and for all"
 BTWK_HK_aengland_unite_aengland_decision_has_declared_supremacy_tt: "You have #V Declared Supremacy#! over [GetTitleByKey('e_aengland').GetNameNoTier]"
