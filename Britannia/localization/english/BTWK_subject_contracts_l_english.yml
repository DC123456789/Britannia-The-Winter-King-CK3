l_english:

 pre_feudal_vassal: "$game_concept_pre_feudal$"
 pre_feudal_vassal_desc: "$game_concept_pre_feudal_desc$"
 
 tribal_obligations: "Customary Dues"
 tribal_obligations_none: "No $tribal_obligations$"
 tribal_obligations_none_short: "None"
 tribal_obligations_granted: "$tribal_obligations$ Granted"
 tribal_obligations_granted_desc: "#emphasis #bold [vassal|E]:#!#!\n$EFFECT_LIST_BULLET$ The [vassal|E]'s #high [GetSubjectContractType( 'feudal_government_levies' ).GetName]#! Contract is fixed to #high [GetSubjectContractType( 'feudal_government_levies' ).GetObligationName( 'feudal_levies_normal' )]#!\n$EFFECT_LIST_BULLET$ The [vassal|E]'s #high [GetSubjectContractType( 'feudal_government_taxes' ).GetName]#! Contract is fixed to #high [GetSubjectContractType( 'feudal_government_taxes' ).GetObligationName( 'feudal_tax_normal' )]#!\n$EFFECT_LIST_BULLET$ The [vassal|E]'s obligations get a baseline modifier of #high [EmptyScope.ScriptValue('tribal_obligations_levies_baseline')|1%]#! [levies|E] and #high [EmptyScope.ScriptValue('tribal_obligations_taxes_baseline')|1%]#! [tax|E]\n$EFFECT_LIST_BULLET$ The [vassal|E]'s obligations are increased by #high [EmptyScope.ScriptValue('tribal_obligations_levies_per_prestige_level')|1%]#! [levies|E] and #high [EmptyScope.ScriptValue('tribal_obligations_taxes_per_prestige_level')|1%]#! [tax|E] per [prestige_level|E] of the [liege|E]\n\n#flavor The vassal does not have fixed obligations but instead provides a variable amount of [levies|E] and [tax|E] depending on the [prestige_level|E] of the [liege|E], analagously to [tribal_government|E] vassals.#!"
 tribal_obligations_granted_short: "Granted"
 pre_feudal_government_vassal_contribution_prestige_level: "[liege|E] is [GetPrestigeLevelName(liege.GetPrestigeLevel)|L]"
 
 exempt_subjugated_tribute_levies: "$tributary_contract_starts_with_common$ [GetSubjectContractType( 'default_tributary_levies' ).GetObligationName( 'tributary_levies_exempt' )]"
 low_subjugated_tribute_levies: "$tributary_contract_starts_with_common$ [GetSubjectContractType( 'default_tributary_levies' ).GetObligationName( 'tributary_levies_low' )]"
 
 britannia_subject_king_guarantee_always: "The [high_king|E] must always defend their [britannia_subject_kings|E]"
 
 tributary_foederatus: "Foederatus"
 tributary_foederatus_desc: "$game_concept_foederati_desc$"
 
 foederatus_subsidies: "Foederati Subsidies"
 foederatus_no_subsidies: "No Foederati Subsidies"
 foederatus_no_subsidies_short: "None"
 foederatus_no_subsidies_desc: "The [foederati|E] will not be paid for their service. This will cost the [suzerain|E] no income, but the Foederati will deliver less levies and be heavily angered."
 foederatus_small_subsidies: "Low Foederati Subsidies"
 foederatus_small_subsidies_short: "Low"
 foederatus_small_subsidies_desc: "The [foederati|E] will get a little financial compensation for their service. The [suzerain|E] will spend a small part of their income, and the Foederati will deliver more levies."
 foederatus_large_subsidies: "High Foederati Subsidies"
 foederatus_large_subsidies_short: "High"
 foederatus_large_subsidies_desc: "The [foederati|E] will be paid a high amount of gold in return for their service. Although it costs the employer a significant amount of their income, the Foederati will provide a much higher amount of levies to their [suzerain|E]."
 
 tributary_foederatus_contract_foederatus: "Foederati Status"
 tributary_foederatus_contract_none_foederatus: "Revoked Foederati Status"
 tributary_foederatus_contract_none_foederatus_short: "Revoked"
 tributary_foederatus_contract_none_foederatus_desc: "The [foederati|E] status is revoked from this [tributary|E]. This can only be done via a decision or character interaction and may result in a revolt."
 tributary_foederatus_contract_available_foederatus: "Granted Foederati Status"
 tributary_foederatus_contract_available_foederatus_short: "Granted"
 tributary_foederatus_contract_available_foederatus_desc: "The [foederati|E] are currently active serving their [suzerain|E] with levies and war support. In return, the Foederati are granted substantial financial compensation on top of land to settle on.\n\n#warning [foederati|E] status only be revoked by decision or character interaction and may result in a revolt.#!"
 revoke_foederatus_interaction_only: "Foederati status may only be revoked via decision or character interaction."
 
 tributary_foederatus_contract_non_foederatus: "$tributary_foederatus_contract_foederatus$"
 tributary_foederatus_contract_none_non_foederatus: "$tributary_foederatus_contract_none_foederatus$"
 tributary_foederatus_contract_none_non_foederatus_short: "$tributary_foederatus_contract_none_foederatus_short$"
 tributary_foederatus_contract_none_non_foederatus_desc: "This [tributary|E] is not considered to be a [foederati|E]."
 tributary_foederatus_contract_available_non_foederatus: "$tributary_foederatus_contract_available_foederatus$"
 tributary_foederatus_contract_available_non_foederatus_short: "$tributary_foederatus_contract_available_foederatus_short$"
 tributary_foederatus_contract_available_non_foederatus_desc: "This tributary will be granted [foederati|E] status, serving their [suzerain|E] with levies and war support in return for substantial financial compensation and land to settle on."
 foederatus_interaction_only: "Foederati status may only be granted via decision or character interaction."
 
 foederatus_war_subsidies: "War Subsidies"
 foederatus_full_war_subsidies: "Foederati War Subsidies"
 foederatus_full_war_subsidies_short: "Subsidized"
 foederatus_full_war_subsidies_desc: "The [suzerain|E] will transfer a little extra income to the [foederati|E] during wartime. In return, the Foederati will send more levies to their employer."
 foederatus_no_war_subsidies: "No Foederati War Subsidies"
 foederatus_no_war_subsidies_short: "Unsubsidized"
 foederatus_no_war_subsidies_desc: "The [foederati|E] will not be provided extra income from their employer during wartime. This has no further effects."
 
 tributary_britannia_subject_king: "Subject King"
 tributary_britannia_subject_king_desc: "Subject Kings are kings that have submitted to the authority of the [high_king_britannia|E] and are represented as [tributaries|E]. They provide [levies|E] and may provide [prestige|E] to their [suzerain|E], but in exchange the [high_king|E] is obligated to come to their defense when needed.\n\nIf the High King can accumulate enough [britannia_authority|E], they will eventually be able to pass [britannia_reforms|E] to increase their hold over their subject kings and transform them into direct [vassals|E]."
 tributary_britannia_subject_king_permanent: "$tributary_britannia_subject_king$"
 tributary_britannia_subject_king_permanent_desc: "$tributary_britannia_subject_king_desc$"
 
 special_contract_subject_kingdom: "Subject Kingdom"
 special_contract_subject_kingdom_desc: "\n#emphasis #bold [vassal|E] Privilege:#!#!\n$EFFECT_LIST_BULLET$ The [liege|E] cannot revoke the [vassals_possessive|E] [titles|E]\n\n#flavor $special_contract_subject_kingdom$s are formerly independent kingdoms that have been brought under the formal suzerainty of the [high_king|E], but retain substantial autonomy over their realms. Their [titles] cannot be revoked, even if the [liege|E] has a [revoke_title_reason], and they pay #V 33%#! less [tax|E] than what their obligations would otherwise indicate. This Contract cannot be revoked before the #V $BTWK_HK_reform_unify_legal_codes$#! [britannia_reform|E] has been passed.#!"
 special_contract_subject_kingdom_short: "Subject King"