l_english:
 excalibur_name:0 "Excalibur"
 excalibur_description:0 "Excalibur, or Caledfwylch, the legendary sword of Arthur Pendragon, Prince of Dumnonia, is one of the [thirteen_treasures_of_the_island_of_britain|E]. It is said whoever wields this sword will be met with great success in battle and holds a rightful claim to the sovereignty of all of Britannia."