l_english:
 epidemic_events.5900.t: "The Plague Arrives"
 epidemic_events.5900.desc: "Pestilence stalks the land.\n\nGrisly, bubbling buboes grow upon the victims, whose pitiful calls for help are slowly stifled as they gutter and drown in their own pus-filled throats.\n\nFrom the lowliest urchin to the most fêted emperor, all dread the indiscriminate scythe of the merciless plague. Those that survive must watch helplessly as all around them perish.\n\nThe devoted look to the divine for a savior, and the powerful their riches, but none can truly be safe. Dreadful tendrils spread across the land, constricting it until it no longer breathes.\n\nThe Great Plague is upon us. [ROOT.Char.GetFaith.HighGodName] save us all."
 epidemic_events.5900.desc_asia: "Pestilence walks among us.\n\nThe afflicted bloat with sores, their cries fading to gurgles as breath fails. In death, even the loudest are made quiet.\n\nNo one is spared. From the barefoot laborer to the cloistered prince, the wheel of suffering turns for all. The living are left to sweep ash from thresholds and count the empty mats.\n\nSome chant sutras, others cling to ritual and rank — but no decree halts decay, no merit offsets the toll. Like mist in a valley, the plague spreads unseen, yet felt in every still morning.\n\nThe Great Plague is here. Heaven avert its gaze."