l_english:

 # Claiming the High Kingship
 BTWK_britannia_high_king.0001.t: "Assessing Support"
 BTWK_britannia_high_king.0001.desc: "A claim to the High Kingship means nothing without the support - or at least acquiescence - of all the other British kings. Emissaries have been sent to the other kings and I am sure of a positive response from my friends and allies, but it may be harder to convince my rivals and some of the stronger kings that this is the proper way forward. If they do not agree peacefully, they may need some convincing at the point of a sword..."
 BTWK_britannia_high_king.0001.a: "One way or another, they will recognize my claim."
 BTWK_britannia_high_king.0001.a.tt.1: "The other kings' responses to your claim to the High Kingship are expected in a few days."
 BTWK_britannia_high_king.0001.a.tt.2: "You are expected to have #P [THIS.ScriptValue('BTWK_britannia_high_king_num_potential_supporters')]#! $BTWK_britannia_high_king.0001.a.supporters$ and #N [THIS.ScriptValue('BTWK_britannia_high_king_num_potential_opponents')]#! $BTWK_britannia_high_king.0001.a.opponents$, with the other #high [THIS.ScriptValue('BTWK_britannia_high_king_num_potential_neutrals')]#! $BTWK_britannia_high_king.0001.a.neutral_kings$ expected to not get involved."
 BTWK_britannia_high_king.0001.a.supporters: "[SelectLocalization(EqualTo_CFixedPoint(THIS.ScriptValue('BTWK_britannia_high_king_num_potential_supporters'), '(CFixedPoint)1'), 'supporter', 'supporters')]"
 BTWK_britannia_high_king.0001.a.opponents: "[SelectLocalization(EqualTo_CFixedPoint(THIS.ScriptValue('BTWK_britannia_high_king_num_potential_opponents'), '(CFixedPoint)1'), 'opponent', 'opponents')]"
 BTWK_britannia_high_king.0001.a.neutral_kings: "[SelectLocalization(EqualTo_CFixedPoint(THIS.ScriptValue('BTWK_britannia_high_king_num_potential_neutrals'), '(CFixedPoint)1'), 'king', 'kings')]"
 BTWK_britannia_high_king.0002.t: "A New High King?"
 BTWK_britannia_high_king.0002.desc: "I have received word that [claimant.GetName] has proclaimed [claimant.GetHerselfHimself] worthy of the title of High King of the Britons. A High King with all the armies of Britannia under [claimant.GetHerHis] command would be a formidable force indeed, but [claimant.GetHerHis] legitimacy depends on the consensus of the other Kings, and if [claimant.GetSheHe] is to unite the Britons under a single banner [claimant.GetSheHe] will first have to gain their approval - whether by diplomacy or force."
 BTWK_britannia_high_king.0002.a.other_king: "[claimant.GetSheHe] will need my consent to move forwards..."
 BTWK_britannia_high_king.0002.a.briton_roman: "Will [claimant.GetSheHe] finally bring unity to the land?"
 BTWK_britannia_high_king.0002.a.anglo_saxon: "United or not, we will still crush them..."
 BTWK_britannia_high_king.0002.a.other: "This is interesting news..."
 BTWK_britannia_high_king.0002.a.tt: "[claimant.GetName] has officially laid claim to the [high_kingship|E] and is now seeking the support of the other British kings. Any kings that oppose [claimant.GetHerHis] claim will attempt to challenge [claimant.GetHerHim] on the battlefield, while any supporters will join [claimant.GetHerHis] side as allies. If [claimant.GetName] is successful at defeating [claimant.GetHerHis] opponents, [claimant.GetSheHe] will be recognized as [high_king|E] with all supporters and defeated opponents becoming [britannia_subject_kings|E]."
 BTWK_britannia_high_king.0002.a.tt.other_king: "An official emissary from [claimant.GetName] is expected in the next few days. We will soon have to decide our own stance on [claimant.GetHerHis] claim to the [high_kingship|E], and whether it is worth going to war over."
 BTWK_britannia_high_king.0004.opening: "[claimant.Custom2('GreetingToForeignRulerPositive', ROOT.Char)]"
 BTWK_britannia_high_king.0004.desc: "I have claimed the title of High King with the aim of uniting the Britons against our many enemies. If you support my claim to the throne and recognize me as the rightful High King of Britannia, I vow that I will protect you and your kingdom against any that would seek to threaten it."
 BTWK_britannia_high_king.0004.a: "You are a great leader. I will support your cause."
 BTWK_britannia_high_king.0004.a.tt.common: "You declare that you will #P support#! [claimant.GetName]'s claim to the [high_kingship|E]. If other kings oppose [claimant.GetHerHis] claim to the throne, you will join the war as [claimant.GetTitledFirstName]'s ally alongside any other supporters,"
 BTWK_britannia_high_king.0004.a.tt: "$BTWK_britannia_high_king.0004.a.tt.common$ and you will swear fealty to [claimant.GetTitledFirstName] as a [britannia_subject_king|E] if [claimant.GetSheHe] is successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0004.a.tt.briton_tributary: "$BTWK_britannia_high_king.0004.a.tt.common$ but as you are already a [tributary|E] you will only swear fealty to [claimant.GetTitledFirstName] as a [britannia_subject_king|E] if your [suzerain|E] swears or is forced to swear fealty to [claimant.GetHerHim] when [claimant.GetSheHe] is successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0004.a.tt.other_tributary: "$BTWK_britannia_high_king.0004.a.tt.common$ but as you are already a [tributary|E] you will not swear fealty to [claimant.GetTitledFirstName] as a [britannia_subject_king|E] if [claimant.GetSheHe] is successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0004.a.tt.suzerain_warning: "#warning Your [duke|E] tier or higher [GetCulturePillar('heritage_brythonic').GetName] and [GetCulturePillar('heritage_latin').GetName] [heritage|E] tributaries will also become [britannia_subject_kings|E] of [claimant.GetName] if we submit.#!"
 BTWK_britannia_high_king.0004.b: "I will bow to no King. Not even to you."
 BTWK_britannia_high_king.0004.b.tt.common: "You declare that you will #N oppose#! [claimant.GetName]'s claim to the [high_kingship|E]. Unless [claimant.GetSheHe] voluntarily backs down, you will go to war against [claimant.GetTitledFirstName] alongside any other opponents to try to force [claimant.GetHerHim] to give up [claimant.GetHerHis] claim. If you are defeated, you will be forced to recognized [claimant.GetTitledFirstName] as [high_king|E]"
 BTWK_britannia_high_king.0004.b.tt: "$BTWK_britannia_high_king.0004.b.tt.common$ and swear fealty to [claimant.GetHerHim] as a [britannia_subject_king|E]."
 BTWK_britannia_high_king.0004.b.tt.briton_tributary: "$BTWK_britannia_high_king.0004.b.tt.common$ but as you are already a [tributary|E] you will only become a [britannia_subject_king|E] if your [suzerain|E] swears or is forced to swear fealty to [claimant.GetHerHim]."
 BTWK_britannia_high_king.0004.b.tt.other_tributary: "$BTWK_britannia_high_king.0004.b.tt.common$ but as you are already a [tributary|E] you will not be forced to swear fealty to [claimant.GetHerHim] as a [britannia_subject_king|E]."
 BTWK_britannia_high_king.0004.b.tt.suzerain_warning: "#warning Your [duke|E] tier or higher [GetCulturePillar('heritage_brythonic').GetName] and [GetCulturePillar('heritage_latin').GetName] [heritage|E] tributaries will also become [britannia_subject_kings|E] of [claimant.GetName] if we are forced to submit.#!"
 BTWK_britannia_high_king.0004.c: "I will recognize your claim, but I will not be your vassal."
 BTWK_britannia_high_king.0004.c.tt.common: "You declare that you will #high nominally support#! [claimant.GetName]'s claim to the [high_kingship|E], but will otherwise not get involved. You will not join in any wars between [claimant.GetTitledFirstName] and any opponents of [claimant.GetHerHis] claim,"
 BTWK_britannia_high_king.0004.c.tt: "$BTWK_britannia_high_king.0004.c.tt.common$ and you will not swear fealty to [claimant.GetTitledFirstName] if [claimant.GetSheHe] is successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0004.c.tt.claimant_tributary: "$BTWK_britannia_high_king.0004.c.tt.common$ but as you are already a [tributary|E] of [claimant.GetTitledFirstName] you will become a [britannia_subject_king|E] if [claimant.GetSheHe] is successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0004.c.tt.briton_tributary: "$BTWK_britannia_high_king.0004.c.tt.common$ but as you are a [tributary|E] you will still become a [britannia_subject_king|E] of [claimant.GetTitledFirstName] if [claimant.GetSheHe] is successfully recognized as [high_king|E] and your [suzerain|E] swears or is forced to swear fealty to [claimant.GetHerHim]."
 BTWK_britannia_high_king.0004.c.tt.other_tributary: "$BTWK_britannia_high_king.0004.c.tt$"
 BTWK_britannia_high_king.0005.opening.supporter: "[claimant.Custom2('GreetingToForeignRulerPositive', ROOT.Char)]"
 BTWK_britannia_high_king.0005.opening.opponent: "[claimant.Custom2('GreetingToForeignRuler', ROOT.Char)]"
 BTWK_britannia_high_king.0005.opening.neutral: "[claimant.Custom2('GreetingToForeignRuler', ROOT.Char)]"
 BTWK_britannia_high_king.0005.desc.tributary_supporter: "I have taken your claim into consideration and decided to grant you my support and recognition as High King of Britannia. I am ready to fight by your side to ensure that your claim comes to fruition. May your rule be a long and prosperous one."
 BTWK_britannia_high_king.0005.desc.supporter: "I have taken your claim into consideration and decided to grant you my support and recognition as High King of Britannia. I am ready to swear fealty to you and become your loyal vassal. May your rule be a long and prosperous one."
 BTWK_britannia_high_king.0005.desc.opponent: "I have taken your request into consideration, and I respectfully inform you that I will not support your claim to the High Kingdom of Britannia.\nYou lack the skills and wisdom necessary to hold such a prestigious throne. Please renounce all your claims."
 BTWK_britannia_high_king.0005.desc.tributary_neutral: "I have considered your claim and decided to grant you my recognition as High King. However, I am not in a position to offer you my full support. While I wish you luck, the [other_king.GetPrimaryTitle.GetNameNoTooltip] will not be further involved at this time."
 BTWK_britannia_high_king.0005.desc.neutral: "I have considered your claim and decided to grant you my recognition as High King. However, I refuse to swear fealty to you and to become de facto one of your vassal kings. The [other_king.GetPrimaryTitle.GetNameNoTooltip] will retain its independence."
 BTWK_britannia_high_king.0005.a: "Very good. You have made the right choice."
 BTWK_britannia_high_king.0005.a.tt.common: "[other_king.GetName] has declared [other_king.GetHerHis] #P support#! for your claim to the [high_kingship|E]."
 BTWK_britannia_high_king.0005.a.tt: "$BTWK_britannia_high_king.0005.a.tt.common$ [other_king.GetSheHe|U] will join your war against the opponents of your claim and will swear fealty as a [britannia_subject_king|E] if you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.a.tt.briton_tributary: "$BTWK_britannia_high_king.0005.a.tt.common$ [other_king.GetSheHe|U] will join your war against the opponents of your claim but as [other_king.GetSheHe] is already a [tributary|E] [other_king.GetSheHe] will only become your [britannia_subject_king|E] if [other_king.GetHerHis] [suzerain|E] swears or is forced to swear fealty to you once you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.a.tt.other_tributary: "$BTWK_britannia_high_king.0005.a.tt.common$ [other_king.GetSheHe|U] will join your war against the opponents of your claim, but as [other_king.GetSheHe] is already a [tributary|E] [other_king.GetSheHe] will not swear fealty as a [britannia_subject_king|E] if you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.b: "Perhaps some steel will convince you..."
 BTWK_britannia_high_king.0005.b.tt.common: "[other_king.GetName] has declared [other_king.GetHerHis] #N opposition#! to your claim to the [high_kingship|E], and will join other opponents in going to war against you to force you to renounce your claim."
 BTWK_britannia_high_king.0005.b.tt: "$BTWK_britannia_high_king.0005.b.tt.common$ If you defeat [other_king.GetHerHim] on the battlefield, [other_king.GetName] will be forced to recognized you as [high_king|E] and swear fealty as a [britannia_subject_king|E]."
 BTWK_britannia_high_king.0005.b.tt.briton_tributary: "$BTWK_britannia_high_king.0005.b.tt.common$ If you defeat [other_king.GetHerHim] on the battlefield, [other_king.GetName] will be forced to recognized you as [high_king|E] but as [other_king.GetSheHe] is already a [tributary|E] [other_king.GetSheHe] will only become your [britannia_subject_king|E] if [other_king.GetHerHis] [suzerain|E] swears or is forced to swear fealty to you."
 BTWK_britannia_high_king.0005.b.tt.other_tributary: "$BTWK_britannia_high_king.0005.b.tt.common$ If you defeat [other_king.GetHerHim] on the battlefield, [other_king.GetName] will be forced to recognized you as [high_king|E] but will not swear fealty as a [britannia_subject_king|E] as [other_king.GetSheHe] is already [tributary|E] to another ruler."
 BTWK_britannia_high_king.0005.c: "Good enough. Formal recognition is all I really need."
 BTWK_britannia_high_king.0005.c.tt.common: "[other_king.GetName] has declared [other_king.GetHerHis] #high nominal support#! for your claim to the [high_kingship|E], but will otherwise not get involved."
 BTWK_britannia_high_king.0005.c.tt: "$BTWK_britannia_high_king.0005.c.tt.common$ [other_king.GetSheHe|U] will remain independent and not become your [britannia_subject_king|E] if you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.c.tt.claimant_tributary: "$BTWK_britannia_high_king.0005.c.tt.common$ As [other_king.GetSheHe] is already your tributary, will [other_king.GetName] will still become your [britannia_subject_king|E] if you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.c.tt.briton_tributary: "$BTWK_britannia_high_king.0005.c.tt.common$ As [other_king.GetSheHe] is already a [tributary|E], [other_king.GetName] may still become your [britannia_subject_king|E] if [other_king.GetHerHis] [suzerain|E] swears or is forced to swear fealty to you once you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.c.tt.other_tributary: "$BTWK_britannia_high_king.0005.c.tt.common$ [other_king.GetSheHe|U] will not become your [britannia_subject_king|E] if you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.c.tt.2: "#V [Subtract_CFixedPoint(GetPlayer.MakeScope.ScriptValue('BTWK_britannia_high_king_num_potential_neutrals'), '(CFixedPoint)1')]#! other kings have also chosen this stance."
 BTWK_britannia_high_king.0006.t: "At an Impasse"
 BTWK_britannia_high_king.0006.t.no_opponents: "A Triumph of Diplomacy"
 BTWK_britannia_high_king.0006.t.second_try: "Continuing the War"
 BTWK_britannia_high_king.0006.t.second_try_no_opponents: "An Unexpected Victory"
 BTWK_britannia_high_king.0006.desc: "Not all of the other kings have accepted my claim to the High Kingship. An alliance of other princes opposed to my claim has gathered under the leadership of [HK_britannia_opponent_leader.GetName] and has declared that nothing short of war will make them recognize my 'pretentions' to the High Kingship. Such a challenge cannot possibly go unanswered, or the loss of face will be so great that I may as well give up on my claim entirely."
 BTWK_britannia_high_king.0006.desc.second_try: "While ongoing developments have brought the war to a pause, there are still several kings in the opposing alliance who continue to oppose my claim to the High Kingship, gathering now under the leadership of [HK_britannia_opponent_leader.GetName]. They remain obstinate and nothing short of a contiuation of the campaign will make them submit - though this could also be a good opportunity for a truce while I attend to other affairs."
 BTWK_britannia_high_king.0006.desc.no_opponents: "Claims to the high kingship are usually accompanied by an outbreak of war to settle old scores or knock a rival off their perch, but it does not always have to be so violent. Through deft use of diplomacy and intimidation, I have managed to convince all the other kings to support - or at least, not oppose - my acclamation to the High Kingship, which is now all but assured. Sometimes the quill really is mightier than the sword."
 BTWK_britannia_high_king.0006.desc.second_try_no_opponents: "In a surprising but not unwelcome development, it seems there are no longer any other kings opposing my claim to the High Kingship. It may not exactly have been my sword that made them all acquiesce, but my acclamation to the High Kingship is in any case now all but assured."
 BTWK_britannia_high_king.0006.a: "Then war it is!"
 BTWK_britannia_high_king.0006.a.tt.1: "All #P supporters#! of your claim will join the war on your side, and all #N opponents#! on the opposing side."
 BTWK_britannia_high_king.0006.a.tt.2: "If you are victorious in the war, you will be recognized as [high_king_britannia|E] and gain all supporters and defeated opponents as [britannia_subject_kings|E]. Kings that did not directly oppose your claim but are called into the war on the opposing side will also be treated as defeated opponents and forced to swear fealty if eligible."
 BTWK_britannia_high_king.0006.a.tt.3: "If you are defeated, you will lose #N 1#! [prestige_level|E], be forced to renounce any right to the [high_kingship|E], and will not be able to make another attempt to claim the title for #N 15#! years."
 BTWK_britannia_high_king.0006.b: "I will renounce my claim. For now."
 BTWK_britannia_high_king_abandon_claim_claimant.tt: "You abandon your claim to the [high_kingship|E], and will not be able to make another attempt to claim the title for #N 5#! years."
 BTWK_britannia_high_king.0006.c: "Let us save our swords for the Saxons."
 BTWK_britannia_high_king.0006.c.tt: "Without any opposition to your claim, you can now be proclaimed [high_king|E]!"
 BTWK_britannia_high_king.0007.t.war: "War for the High Kingship"
 BTWK_britannia_high_king.0007.t.backed_down: "Not Quite Worthy"
 BTWK_britannia_high_king.0007.desc.war: "[claimant.GetName] has not taken lightly to the refusals of some of the other kings to accept [claimant.GetHerHis] claim. Gathering together [claimant.GetHerHis] supporters, [claimant.GetTitledFirstName] now leads an alliance prepared to enforce [claimant.GetHerHis] claim by force while [claimant.GetHerHis] opponents have banded together around the leadership of [HK_britannia_opponent_leader.GetName].\n\nWith neither side willing to back down, [claimant.GetTitledFirstName] has declared war on all of the opposing kings, proclaiming that this dispute will be settled on the field of battle."
 BTWK_britannia_high_king.0007.desc.war_second_try: "While ongoing developments have brought [claimant.GetNamePossessive] war for the high kingship to a pause, many opponents of [claimant.GetHerHis] claim remain. Gathering now around the leadership of [HK_britannia_opponent_leader.GetName], they continue to rebuff [claimant.GetHerHis] demands for recognition, and now [claimant.GetTitledFirstName] has declared that [claimant.GetHerHis] campaign to secure the submission of all the other kings will continue unabated."
 BTWK_britannia_high_king.0007.desc.backed_down: "It seems that [claimant.GetName] did not have the support [claimant.GetSheHe] thought [claimant.GetSheHe] had when claiming the High Kinship. Unwilling to challenge the alliance of opposing kings on the field of battle, [claimant.GetTitledFirstName] has quietly dropped [claimant.GetHerHis] claim for the High Kingship for the time being."
 BTWK_britannia_high_king.0007.desc.backed_down_second_try: "Ongoing developments have brought [claimant.GetNamePossessive] war for the high kingship to a pause, allowing [claimant.GetHerHim] to reconsider [claimant.GetHerHis] current position. With [claimant.GetHerHis] opponents now gathered around the leadership of [HK_britannia_opponent_leader.GetName], [claimant.GetTitledFirstName] has decided to agree on a truce rather than continue [claimant.GetHerHis] campaign and has quietly dropped [claimant.GetHerHis] claim to the High Kingship for the time being."
 BTWK_britannia_high_king.0007.a.supporter: "And I will fight by [claimant.GetHerHis] side!"
 BTWK_britannia_high_king.0007.a.opponent: "Then let [claimant.GetHerHim] come!"
 BTWK_britannia_high_king.0007.a.briton_roman: "What does this mean for Britannia?"
 BTWK_britannia_high_king.0007.a.anglo_saxon: "The Britons never pass up an opportunity to fight."
 BTWK_britannia_high_king.0007.a.other: "This is interesting news..."
 BTWK_britannia_high_king.0007.a.tt.1: "[claimant.GetName] and [claimant.GetHerHis] supporters have declared war on the alliance of opposing kings under [HK_britannia_opponent_leader.GetUINamePossessive] leadership."
 BTWK_britannia_high_king.0007.a.tt.1.a: "As one of [claimant.GetNamePossessive] supporters, you have joined the war against [HK_britannia_opponent_leader.GetUIName]!"
 BTWK_britannia_high_king.0007.a.tt.2: "If victorious, [claimant.GetName] will be proclaimed [high_king_britannia|E], with all supporters and defeated opponents becoming [britannia_subject_kings|E]. If defeated, [claimant.GetTitledFirstName] will be renounce [claimant.GetHerHis] his claims, and will not be able make another attempt to claim the title for #N 15#! years."
 BTWK_britannia_high_king.0007.b.supporter: "A true shame..."
 BTWK_britannia_high_king.0007.b.opponent: "[claimant.GetSheHe] has come to [claimant.GetHerHis] senses, then."
 BTWK_britannia_high_king.0007.b.briton_roman: "Only the worthy can become High King."
 BTWK_britannia_high_king.0007.b.anglo_saxon: "And divided they remain."
 BTWK_britannia_high_king.0007.b.other: "This is interesting news..."
 BTWK_britannia_high_king_abandon_claim.tt: "[claimant.GetName] has abandoned [claimant.GetHerHis] claim to the [high_kingship|E], and will not be able to make another attempt to claim the title for #N 5#! years."
 BTWK_britannia_high_king.0009.t: "High Kingdom of Britannia"
 BTWK_britannia_high_king.0009.desc: "The kings of Britain have declared their unanimous support for my claim to the [GetTitleByKey('e_britannia').GetName], and I have now been proclaimed High King in the Great Hall of [new_high_king_capital_barony.GetNameNoTierNoTooltip].\n\nSome of the other kings have formally sworn fealty and will now rule their homelands as subject kings under my rule. Others, despite their support for my acclamation, have not agreed to become de facto subjects of another king and will maintain their independence - for now.\n\nAs High King, it is my duty and obligation to lead Britannia against its enemies, whether they be Saxon, Irish, or even Briton. Only strong leadership will be able to bring Britannia's foes to heel."
 BTWK_britannia_high_king.0009.a: "And defend Britannia I shall!"
 BTWK_britannia_high_king.0009.a.tt.1: "As [high_king|E], you will passively accumulate [britannia_authority|E] depending on how much of Britannia is under the control of you and your [britannia_subject_kings|E]. Once you have enough [britannia_authority|E], you will be able to pass [britannia_reforms|E] to solidify your hold on the [high_kingship|E], strengthen your control over your [britannia_subject_kings|E], and eventually move towards uniting the petty kingdoms of Britannia back into a single realm."
 BTWK_britannia_high_king.0009.a.tt.1a: "You have inherited #P [claimant.GetDynasty.MakeScope.Var('britannia_high_kingship_authority').GetValue|2]#! [britannia_authority|E] from previous [claimant.GetDynasty.GetName] High Kings"
 BTWK_britannia_high_king.0009.a.tt.2: "Until the #V $BTWK_HK_reform_establish_coregency$#! [britannia_reform|E] is passed, a [high_king|E] only holds [claimant.GetHerHis] position in a personal capacity, and the title will not be inherited on death or abdication. In addition, the other kings will only continue to support your rule as long as they believe you can and will continue to defend their kingdoms. If you become [GetTrait('incapable').GetName(GetNullCharacter)], adopt a non-[GetCulturePillar('heritage_brythonic').GetName], [GetCulturePillar('heritage_latin').GetName], or $britannic_romance_culture$ [culture|E], or let your [martial|E], [diplomacy|E], [realm_size|E], or [prestige_level|E] decline too far, you will be considered #N Unfit to Rule#! and forced to abdicate the [high_kingship|E]."
 BTWK_britannia_high_king.0009.a.tt.3: "In addition, as a largely informal title, the [high_king|E] cannot have any [king|E]-tier vassals or press any of [GetTitleByKey('e_britannia').GetNameNoTier]'s [de_jure|E] claims until the #V $BTWK_HK_reform_empower_high_council$#! [britannia_reform|E] has been passed. Until then, any [king|E]-tier vassals will be converted into [britannia_subject_kingdoms|E]."
 BTWK_britannia_high_king.0009.a.tt.4: "You can force other independent rulers of a $celtic_heritage_group$ or $romanized_culture$ [culture|E] to become [britannia_subject_kings|E] using the [GetCasusBelliType('make_tributary_cb').GetName] [casus_belli|E], and the impact of [tributary|E] [realm_size|E] on your [tribal_respect|E] will be reduced."
 BTWK_britannia_high_king.0010.t: "High Kingdom of Britannia"
 BTWK_britannia_high_king.0010.desc: "The kings of Britain have declared their unanimous support for [Select_CString(new_high_king.IsFemale, 'Queen', 'King')] [new_high_king.GetFirstName] of [new_high_king_primary_title.GetNameNoTier]'s claim to the [GetTitleByKey('e_britannia').GetName], and have now proclaimed [new_high_king.GetHerHim] High King in the Great Hall of [new_high_king_capital_barony.GetNameNoTierNoTooltip]. Some of the other kings have formally sworn fealty and will now rule as subject kings under [new_high_king.GetHerHim]. Others, despite their support for [new_high_king.GetHerHis] acclamation, have not agreed to become de facto subjects of another king and will maintain their independence.\n\nAs High King, [new_high_king.GetFirstName] has sworn to lead and defend Britannia against its enemies, whether they be Saxon, Irish, or even Briton. All across Britannia, kings are giving pause to consider the new High King, wondering how this will change the balance of power on the isle."
 BTWK_britannia_high_king.0010.a.was_supporter: "Hail to the High King!"
 BTWK_britannia_high_king.0010.a.was_opponent: "Let us hope our fears were not founded."
 BTWK_britannia_high_king.0010.a.briton_roman: "Will [new_high_king.GetSheHe] live up to [new_high_king.GetHerHis] promise?"
 BTWK_britannia_high_king.0010.a.anglo_saxon: "Perhaps [new_high_king.GetSheHe] may prove to be a formidable opponent."
 BTWK_britannia_high_king.0010.a.other: "This is interesting news..."
 BTWK_britannia_high_king.0010.a.tt.1: "All supporters and defeated opponents of [new_high_king.GetNamePossessive] claim to the [high_kingship|E] have become [new_high_king.GetHerHis] [britannia_subject_kings|E]."
 BTWK_britannia_high_king.0010.a.tt.2: "While a powerful title, the position of [high_king|E] is ultimately a personal honour and will not be inherited upon the death or abdication of [new_high_king.GetName] - unless [new_high_king.GetSheHe] manages to accumulate enough [britannia_authority|E] to pass [britannia_reforms|E]. In addition, [new_high_king.GetTitledFirstName] will also be forced to abdicate the [high_kingship|E] if [new_high_king.GetSheHe] ever comes to be considered #N Unfit to Rule#!."
 BTWK_britannia_high_king.0011.t: "Not Quite Worthy"
 BTWK_britannia_high_king.0011.desc.claimant: "It seems that my grand ambition of becoming High King of all the Britons is not quite yet to be. What I had hoped would be a quick and decisive campaign to cow my opponents did not quite turn out as I had hoped, but at least I was not humiliated and forced to renounce my claim to the High Kingship entirely. I will just have to bide my time and make sure I am better prepared for the next round..."
 BTWK_britannia_high_king.0011.desc.supporter: "It seems that [claimant.GetNamePossessive] grand ambition of becoming High King of all the Britons is not quite yet to be. What we had hoped would be a quick and decisive campaign to cow our opponents did not quite turn out as we had hoped, and now both sides have agreed to a truce to avoid wasting more men on the interminable stalemate. [claimant.GetTitledFirstName], however, has not fully renounced [claimant.GetHerHis] claim to the High Kingship, and hopefully I will have the opportunity to support [claimant.GetHerHis] claim again under more favourable conditions."
 BTWK_britannia_high_king.0011.desc.opponent: "The upstart [claimant.GetName] has been stopped in [claimant.GetHerHis] tracks, but we have been unable to force the decisive victories we would need to force [claimant.GetHerHim] to renounce [claimant.GetHerHis] claim to the High Kingship. The truce we have agreed to may have only bought a few years of peace before [claimant.GetTitledFirstName] tries to subjugate us once again, but perhaps that will be enough to gather our strength and put a stop to [claimant.GetHerHis] ambitions once and for all."
 BTWK_britannia_high_king.0011.desc.other: "The war between [claimant.GetName] and the alliance of opposing kings lead by [HK_britannia_opponent_leader.GetName] has ended in a stalemate, with neither side able to gain a decisive advantage over the other. While [claimant.GetTitledFirstName] has not renounced [claimant.GetHerHis] ambition to be proclaimed High King of Britannia, [claimant.GetSheHe] has also agreed to put aside the question of the opposing kings' assent for the time being, leaving the question of [claimant.GetHerHis] claim unresolved. For now, however, it seems that the Kings of the Britons will remain independent and divided."
 BTWK_britannia_high_king.0011.a.claimant: "I will not make the same mistakes again."
 BTWK_britannia_high_king.0011.a.supporter: "Deferred but still alive."
 BTWK_britannia_high_king.0011.a.opponent: "We will be ready."
 BTWK_britannia_high_king.0011.a.briton_roman: "Just kicking the jar down the road..."
 BTWK_britannia_high_king.0011.a.anglo_saxon: "So they'll be fighting each other again soon?"
 BTWK_britannia_high_king.0011.a.other: "This is interesting news..."
 BTWK_britannia_high_king.0012.t: "An Unworthy [claimant.GetTitleTierName]"
 BTWK_britannia_high_king.0012.desc.claimant: "It seems that my grand ambition of becoming High King of all the Britons was not to be. Humiliated and defeated on the battlefield, any credibility I may have had in claiming supremacy over the other kings now lies in pieces, and as the price for my freedom I have been forced to take a vow never to try to claim the High Kingship ever again. Eventually I may be able to weasel out of this vow, but this indignity will follow me for a long time..."
 BTWK_britannia_high_king.0012.desc.supporter: "It seems that [claimant.GetNamePossessive] grand ambition of becoming High King of all the Britons was not to be. Despite our best efforts, our alliance was throughly defeated on the battlefield, and any credibility [claimant.GetSheHe] may have had in claiming supremacy over the other kings now lies in pieces. As the price for [claimant.GetHerHis] freedom, [claimant.GetTitledFirstName] has been forced to take a vow never to try to claim the High Kingship ever again, and while with enough support [claimant.GetSheHe] may one day be able to move past all of this, the humliation will surely follow [claimant.GetHerHim] for a long time."
 BTWK_britannia_high_king.0012.desc.opponent: "The upstart [claimant.GetName] has been defeated, [claimant.GetHerHis] dream of becoming High King lying in tatters before us. As the price for [claimant.GetHerHis] freedom, [claimant.GetTitledFirstName] has humbly vowed to forever give up [claimant.GetHerHis] claim to the High Kingship and never again challenge my independence. Nobody is foolish enough to believe that this vow will truly bind [claimant.GetHerHim] forever, but this humiliation will surely not be soon forgotten."
 BTWK_britannia_high_king.0012.desc.other: "[claimant.GetName] has been defeated on the battlefield by [HK_britannia_opponent_leader.GetName] and [HK_britannia_opponent_leader.GetHerHis] coalition of opposing kings, forcing [claimant.GetTitledFirstName] to renounce [claimant.GetHerHis] ambition to be proclaimed High King of Britannia. With [claimant.GetTitledFirstNamePossessive] dreams of supremacy now dashed at the swords of [claimant.GetHerHis] opponents, it seems that the Kings of the Britons will remain independent and divided, for now."
 BTWK_britannia_high_king.0012.a.claimant: "I have failed..."
 BTWK_britannia_high_king.0012.a.supporter: "We have failed..."
 BTWK_britannia_high_king.0012.a.opponent: "[claimant.GetSheHe|U] is not worthy."
 BTWK_britannia_high_king.0012.a.briton_roman: "[ROOT.Char.GetFaith.HighGodName] did not deem [claimant.GetHerHim] worthy."
 BTWK_britannia_high_king.0012.a.briton_roman_pagan: "The Gods did not deem [claimant.GetHerHim] worthy."
 BTWK_britannia_high_king.0012.a.anglo_saxon: "[claimant.GetSheHe] would not have been a real threat anyways."
 BTWK_britannia_high_king.0012.a.other: "This is interesting news..."
 BTWK_britannia_high_king_renounce_claim_claimant.tt: "You have been forced to renounce your claim to the [high_kingship|E], and will not be able to make another attempt to claim the title for #N 15#! years."
 BTWK_britannia_high_king_renounce_claim.tt: "[claimant.GetName] been forced to renounce [claimant.GetHerHis] claim to the [high_kingship|E], and will not be able to make another attempt to claim the title for #N 15#! years."
 BTWK_britannia_high_king.0013.t: "A Dream Cut Short"
 BTWK_britannia_high_king.0013.desc.death: "[claimant.GetName] is dead! [claimant.GetHerHis|U] dream of claiming the High Kingship has been cut short, now never to be fulfilled. As [claimant.GetTitledFirstNamePossessive] opponents breathe a sigh of relief while [claimant.GetHerHis] supporters mourn what could have been, the Britons settle back down into their divided petty kingdoms, with no High King to lead - or dominate - them."
 BTWK_britannia_high_king.0013.desc.deposed_claimant: "The loss of my throne has dealt a fatal blow to my dreams of claiming the High Kingship. Without a true power base of my own, I would not possibly be able to exert the authority expected of a High King, and even my most committed supporters have advised that I have no choice but to abandon my claim to the title. My opponents are gloating at my downfall, but can they not see how vulnerable we all will be without a strong High King to lead Britannia?"
 BTWK_britannia_high_king.0013.desc.deposed: "[claimant.GetName] has been deposed from [claimant.GetHerHis] throne! Without a power base of [claimant.GetHerHis] own, [claimant.GetTitledFirstName] could not possibly exert the authority expected of a High King, and so has been forced to abandon [claimant.GetHerHis] claim to the title. The Britons are now settling back down into their divided petty kingdoms, with no High King to lead - or dominate - them."
 BTWK_britannia_high_king.0013.desc.ineligible_claimant: "Changing circumstances have caused the other British kings to consider me ineligible for the High Kingship. With my support rapidly melting away, even my most committed supporters have advised that I have no choice but to abandon my claim to the title. It seems that my dream was simply not to be."
 BTWK_britannia_high_king.0013.desc.ineligible: "[claimant.GetName] is no longer considered eligible for the High Kingship. With [claimant.GetHerHis] support rapidly melting away, [claimant.GetTitledFirstName] has accepted the inevitable and abandoned [claimant.GetHerHis] attempt to claim to the title. The Britons are now settling back down into their divided petty kingdoms, with no High King to lead - or dominate - them."
 BTWK_britannia_high_king.0013.a.claimant: "Damn them all!"
 BTWK_britannia_high_king.0013.a.was_supporter: "A true shame..."
 BTWK_britannia_high_king.0013.a.was_opponent_death: "The would-be tyrant is dead."
 BTWK_britannia_high_king.0013.a.was_opponent: "Excellent news."
 BTWK_britannia_high_king.0013.a.briton_roman: "It was not to be, then."
 BTWK_britannia_high_king.0013.a.anglo_saxon: "Let them remain divided, then..."
 BTWK_britannia_high_king.0013.a.other: "This is interesting news..."
 
 BTWK_britannia_high_king.0020.t: "Unfit to Rule?"
 BTWK_britannia_high_king.0020.desc.wrong_culture: "My embrace of the [ROOT.Char.GetCulture.GetName] culture has raised the consternation of many of the other kings, who are starting to consider me a foreigner unfit for the position of High King. If I do not do something to address these worries soon, my support will collapse entirely and I will be forced to forfeit the High Kingship!"
 BTWK_britannia_high_king.0020.desc: "Doubts are growing about my ability to properly command the respect required of a High King, and many of the other kings are starting to openly question if I am still fit for the throne. If I do not do something to address these worries soon, my support will collapse entirely and I will be forced to forfeit the High Kingship!"
 BTWK_britannia_high_king.0020.a: "This is unacceptable!"
 BTWK_britannia_high_king.0020.a.tt.culture: "#warning The [high_king|E] must be a [GetCulturePillar('heritage_brythonic').GetName], [GetCulturePillar('heritage_latin').GetName], or $britannic_romance_culture$ [culture|E]. #!"
 BTWK_britannia_high_king.0020.a.tt.kingdom: "#warning The [high_king|E] must hold a [kingdom|E] [title|E] of [ROOT.GetHerHis] own. #!"
 BTWK_britannia_high_king.0020.a.tt.prestige_level: "#warning The [high_king|E] must have a [prestige_level|E] of at least [GetPrestigeLevelName('(int32)3')] #weak (3)#!. #!"
 BTWK_britannia_high_king.0020.a.tt.martial: "#warning The [high_king|E] must at least #high 10#! [martial|E]. #!"
 BTWK_britannia_high_king.0020.a.tt.diplomacy: "#warning The [high_king|E] must have at least #high 8#! [diplomacy|E]. #!"
 BTWK_britannia_high_king.0020.a.tt.realm_size: "#warning The [high_king|E] must have a [realm_size|E] of at least #high 10#!. #!"
 BTWK_britannia_high_king.0020.a.tt.incapable: "#warning The [high_king|E] must not be [GetTrait('incapable').GetName(GetNullCharacter)]. #!"
 BTWK_britannia_high_king.0020.a.tt.1: "You will have #high 12 months#! to meet the requirements expected of a [high_king|E] in order to convince the other kings that you are still worthy of the title. If you are still unconsidered #N Unfit to Rule#! after that, the [high_kingship|E] will be forfeit!"
 BTWK_britannia_high_king.0021.t: "Fit to Rule"
 BTWK_britannia_high_king.0021.desc: "My efforts to prove myself worthy of the High Kingship appear to have paid off. The hints of uncertainty and disdain that have coloured my interactions with the other kings seem to have tapered off over the last few weeks, and their support for my continued rule now seems as strong as ever."
 BTWK_britannia_high_king.0021.a: "Why did they ever doubt me?"
 BTWK_britannia_high_king.0021.a.tt: "Your hold on the [high_kingship|E] has been secured."
 BTWK_britannia_high_king.0022.t: "Unfit to Rule"
 BTWK_britannia_high_king.0022.desc.wrong_culture_high_king: "A High King only holds his throne by commanding the support and respect of the other kings. My embrace of the [former_high_king.GetCulture.GetName] culture has been highly controversial among the other kings who largely view me as a foreigner, and despite my best efforts, the discontent has finally come to a head. Now, the other kings have come together to declare that I am unfit to rule and from this moment on will no longer be recognized as High King of Britannia.\n\nNo longer recognizing my authority, all my former subject kingdoms have broken off and many are apparently happy that they no longer serve an 'unworthy' overlord. Can they not see that by breaking our unity, soon we may all simply be replacing one overlord with another?"
 BTWK_britannia_high_king.0022.desc.wrong_culture: "The High King of Britannia only holds his throne by commanding the support and respect of the other kings. Discontent over [former_high_king.GetTitledFirstNamePossessive] embrace of the [former_high_king.GetCulture.GetName] culture has been growing for some time, and now the other kings have come together to declare that as a foreigner [former_high_king.GetSheHe] is unfit to rule and from this moment on will no longer be recognized as High King.\n\nNo longer recognizing [former_high_king.GetHerHis] authority, all former subject kingdoms of [former_high_king.GetTitledFirstName] have regained their independence. Many of the kings are happy that they no longer serve an unworthy overlord, but others cannot help but wonder if they will they soon simply be replacing one foreign overlord with another."
 BTWK_britannia_high_king.0022.desc.high_king: "A High King only holds his throne by commanding the support and respect of the other kings. Despite my best efforts, discontent over my rule has grown over the last several months and has finally come to a head. Now, the other kings have come together to declare that I am unfit to rule and from this moment on will no longer be recognized as High King of Britannia.\n\nNo longer recognizing my authority, all my former subject kingdoms have broken off to regain their independence and many are apparently happy that they no longer serve an 'unworthy' overlord. Can they not see that by once more breaking the unity of the Britons, soon we may all simply be replacing one overlord with another?"
 BTWK_britannia_high_king.0022.desc: "The High King of Britannia only holds his throne by commanding the support and respect of the other kings. Discontent over [former_high_king.GetTitledFirstNamePossessive] worthiness to hold the prestigious seat has been growing for some time, and now the other kings have come together to declare that [former_high_king.GetSheHe] is unfit to rule and from this moment on will no longer be recognized as High King.\n\nNo longer recognizing [former_high_king.GetHerHis] authority, all former subject kingdoms of [former_high_king.GetTitledFirstName] have regained their independence. Many of the kings are happy that they no longer serve an unworthy overlord, but others cannot help but wonder - by once more breaking the unity of the Britons, will they soon simply be replacing one overlord with another?"
 BTWK_britannia_high_king.0022.a: "How could they? Do they not see all I have done for them?"
 BTWK_britannia_high_king.0022.a.tt: "You have been declared #N Unfit to Rule#!! The [high_kingship|E] is now forfeit, and all [britannia_subject_kings|E] are released."
 BTWK_britannia_high_king.0022.b.subject_king: "A [ROOT.Char.GetTitleTierName] bends [ROOT.Char.GetHerHis] knee to no one."
 BTWK_britannia_high_king.0022.b.briton_roman: "No lesser ruler can be High King..."
 BTWK_britannia_high_king.0022.b.anglo_saxon: "Clearly, they are unable to govern themselves..."
 BTWK_britannia_high_king.0022.b.other: "This is interesting news..."
 BTWK_britannia_high_king.0022.b.tt: "[former_high_king.GetName] was declared #N Unfit to Rule#!. The [GetTitleByKey('e_britannia').GetName] has been forfeited, and all [britannia_subject_kings|E] have been released."
 BTWK_britannia_high_king.0023.t: "Death of the High King"
 BTWK_britannia_high_king.0023.desc.high_king_relative: "My [former_high_king_player_heir.Custom2('CloseOrExtendedFamilyRelationToMe', SCOPE.sC('former_high_king'))] [former_high_king.GetFirstName], High King of the Britons, has died. Though I may be his heir, the High Kingship now lies vacant, as only a king who has proven himself worthy in the eyes of all the other kings could hope to claim authority over all of Britannia.\n\nWith [former_high_king.GetHerHis] passing, the various kingdoms of the Britons have reasserted their full independence, petty squabbles and rivalries already resurfacing between us. Perhaps one day I will be able to follow in my [former_high_king_player_heir.Custom2('CloseOrExtendedFamilyRelationToMe', SCOPE.sC('former_high_king'))]'s footsteps and claim the High Kingship myself to reunite our divided isle."
 BTWK_britannia_high_king.0023.desc.high_king: "[former_high_king.GetName] has died. Though I may be his heir, the High Kingship now lies vacant, as only a king who has proven himself worthy in the eyes of all the other kings could hope to claim authority over all of Britannia.\n\nWith [former_high_king.GetHerHis] passing, the various kingdoms of the Britons have reasserted their full independence, petty squabbles and rivalries already resurfacing between us. Perhaps one day I will be able to follow in [former_high_king.GetHerHis] footsteps and claim the High Kingship myself to reunite our divided isle."
 BTWK_britannia_high_king.0023.desc: "[former_high_king.GetName] has died. The High Kingship lies vacant once more, as only a king who has proven himself worthy in the eyes of all the other kings could hope to claim authority over all of Britannia.\n\nWith the High King dead, the various kingdoms of the Britons have reasserted their full independence, petty squabbles and rivalries already resurfacing between them. Only time will tell if another king will be able to rise up above the fray and unite the isle once more."
 BTWK_britannia_high_king.0023.a: "In time, I too will be High [Select_CString(former_high_king_player_heir.IsFemale, 'Queen', 'King')]!"
 BTWK_britannia_high_king.0023.a.tt: "With the death of your predecessor, the [high_kingship|E] has gone back into abeyance, and all [britannia_subject_kings|E] are released."
 BTWK_britannia_high_king.0023.b.briton_roman: "Who will protect Britannia now?"
 BTWK_britannia_high_king.0023.b.anglo_saxon: "Excellent news."
 BTWK_britannia_high_king.0023.b.other: "This is interesting news..."
 BTWK_britannia_high_king.0023.b.tt: "[former_high_king.GetName] has died. The [GetTitleByKey('e_britannia').GetName] has gone back into abeyance, and all [britannia_subject_kings|E] have been released."
 BTWK_britannia_high_king.0024.t: "Fall of the High King"
 BTWK_britannia_high_king.0024.desc.high_king: "My reign as High [Select_CString(former_high_king.IsFemale, 'Queen', 'King')] has ended, and with it any semblance of unity among the Britons. Already many of the other kings have asserted their independence, claiming that their oaths were personally to me alone and not to any of my successors who might try to claim the title.\n\nWithout any support for a successor, the High Kingship has been declared vacant, with all my former subject kingdoms regaining their full independence. My time as High King may be over, but perhaps one day one of my heirs will be able to reclaim my legacy and claim the High Kingship for themselves to reunite our divided isle."
 BTWK_britannia_high_king.0024.desc.high_king_heir_relative: "The reign of my [ROOT.Char.Custom2('CloseOrExtendedFamilyRelationToMe', SCOPE.sC('former_high_king'))], High [Select_CString(former_high_king.IsFemale, 'Queen', 'King')] [former_high_king.GetFirstName], has ended, and with it [former_high_king.GetHerHis] hegenomy over the other Brythonic kingdoms. Though I may be [former_high_king.GetHerHis] heir, the other kings have refused to renew their oaths, claiming that their oaths were personally to High [Select_CString(former_high_king.IsFemale, 'Queen', 'King')] [former_high_king.GetFirstName] and [former_high_king.GetHerHim] alone.\n\nWithout any support for a successor, the High Kingship has been declared vacant, with all former subject kingdoms regaining their full independence. Perhaps one day I will be able to reclaim my [ROOT.Char.Custom2('CloseOrExtendedFamilyRelationToMe', SCOPE.sC('former_high_king'))]'s legacy and claim the High Kingship myself to reunite our divided isle."
 BTWK_britannia_high_king.0024.desc.high_king_heir: "The reign of High [Select_CString(former_high_king.IsFemale, 'Queen', 'King')] [former_high_king.GetFirstName] has ended, and with it [former_high_king.GetHerHis] hegenomy over the other Brythonic kingdoms. Though I may be [former_high_king.GetHerHis] heir, the other kings have refused to renew their oaths, claiming that their oaths were personally to High [Select_CString(former_high_king.IsFemale, 'Queen', 'King')] [former_high_king.GetFirstName] and [former_high_king.GetHerHim] alone.\n\nWithout any support for a successor, the High Kingship has been declared vacant, with all former subject kingdoms regaining their full independence. Perhaps one day I will be able to reclaim [former_high_king.GetFirstNamePossessive] legacy and claim the High Kingship myself to reunite our divided isle."
 BTWK_britannia_high_king.0024.desc: "The reign of High [Select_CString(former_high_king.IsFemale, 'Queen', 'King')] [former_high_king.GetFirstName] has ended, and with it [former_high_king.GetHerHis] hegenomy over the other Brythonic kingdoms. Already many of the other kings have refused to renew their oaths, claiming that their oaths were personally to High [Select_CString(former_high_king.IsFemale, 'Queen', 'King')] [former_high_king.GetFirstName] and [former_high_king.GetHerHim] alone.\n\nWithout any support for a successor, the High Kingship has been declared vacant, with all former subject kingdoms regaining their full independence. Only time will tell if another king will be able to rise up above the fray and unite the isle once more."
 BTWK_britannia_high_king.0024.a: "Their treachery shall not be forgotten..."
 BTWK_britannia_high_king.0024.a.tt: "With your abdication, the [high_kingship|E] has gone back into abeyance, and all [britannia_subject_kings|E] are released."
 BTWK_britannia_high_king.0024.b.former_high_king_player_heir: "In time, I too will be High [Select_CString(former_high_king_player_heir.IsFemale, 'Queen', 'King')]!"
 BTWK_britannia_high_king.0024.b.briton_roman: "Who will protect Britannia now?"
 BTWK_britannia_high_king.0024.b.anglo_saxon: "Yes, let them fight among themselves..."
 BTWK_britannia_high_king.0024.b.other: "This is interesting news..."
 BTWK_britannia_high_king.0024.b.tt: "High [Select_CString(former_high_king.IsFemale, 'Queen', 'King')] [former_high_king.GetFirstName] has abdicated from [former_high_king.GetHerHis] throne. The [GetTitleByKey('e_britannia').GetName] has gone back into abeyance, and all [britannia_subject_kings|E] have been released."
 BTWK_britannia_high_king.0025.t: "Fall of the High King"
 BTWK_britannia_high_king.0025.desc.high_king: "My fears have been realized - after suffering defeat after defeat at the hands of [high_king_deposer.GetName], even my allies are wavering in their support, and I have been forced to come to terms. They are simple but harsh - abdicate the High Kingship, release my subject kings from their vows, and renounce any ambitions of 'establishing hegemony' over the Britons.\n\nNo longer recognizing my authority, all my former subject kings have reasserted their independence, with varying degrees of satisfaction or disappointment in my disgrace. My time as High King may be over, but perhaps one day one of my heirs will be able to reclaim the High Kingship for the #italic rightful#! holders of the throne."
 BTWK_britannia_high_king.0025.desc: "High [Select_CString(former_high_king.IsFemale, 'Queen', 'King')] [former_high_king.GetFirstName] has been forced from [former_high_king.GetHerHis] throne! Defeated on the battlefield by the armies of [high_king_deposer.GetName], High [Select_CString(former_high_king.IsFemale, 'Queen', 'King')] [former_high_king.GetFirstName] found [former_high_king.GetHerHis] support among the other kings melting away and was soon forced to abdicate the High Kingship, releasing [former_high_king.GetHerHis] subject kings from their vows and renouncing any ambitions of hegemony over the Britons.\n\nNo longer recognizing [former_high_king.GetHerHis] authority, all former subject kingdoms of [former_high_king.GetTitledFirstName] have regained their independence, some happy that they no longer have to serve an unworthy overlord while others worry about the loss of protection. Only time will tell if another king will be able to rise up above the fray and unite the isle once more."
 BTWK_britannia_high_king.0025.a: "Mark my words - I will have my revenge..."
 BTWK_britannia_high_king.0025.a.tt: "You have been deposed! The [high_kingship|E] is now forfeit, and all [britannia_subject_kings|E] are released."
 BTWK_britannia_high_king.0025.b.subject_king: "I cannot bow to a [Select_CString(former_high_king.IsFemale, 'queen', 'king')] defend [former_high_king.GetHerHis] own throne."
 BTWK_britannia_high_king.0025.b.briton_roman: "A High King who cannot defend [former_high_king.GetHerHis] own throne is no High King at all."
 BTWK_britannia_high_king.0025.b.anglo_saxon: "A mark of an unworthy [Select_CString(former_high_king.IsFemale, 'queen', 'king')]."
 BTWK_britannia_high_king.0025.b.other: "This is interesting news..."
 BTWK_britannia_high_king.0025.b.tt: "[former_high_king.GetName] has been deposed and forced to abdicate the [high_kingship|E]. The [GetTitleByKey('e_britannia').GetName] has been forfeited, and all [britannia_subject_kings|E] have been released."
 
 BTWK_britannia_high_king.0100.t: "Formalization of the High Kingship"
 BTWK_britannia_high_king.0100.desc.high_king: "The idea of a High King of the Britons, a first among equals who would lead the combined armies of all of Britannia against our enemies, is a longstanding one dating back to end of Roman rule. However, this is an informal title defined largely by general consensus and without any legal backing or well-defined obligations it has been easy for recalcitrant subject kings to undermine my authority. Now that my rule has been well established, I am in a position to change this state of affairs and now the other kings have agreed to a council to formally recognize the title of High King and its powers and obligations in law.\n\nWhile in practice little has changed, the formalization still serves as a useful rhetorical tool against defiant subject kings and looking forward might serve as a template for more meaningfully increasing the High King's authority one day. [ROOT.Char.GetFaith.HighGodName] willing, this will one day be seen as the day when Britannia took its first tentative steps towards reunification."
 BTWK_britannia_high_king.0100.desc: "The kings of the Britons have long recognized the potential for the strongest of their number to be elected as High King, a first among equals who would lead their combined armies in the defense of Britannia, but in reality this is largely an informal title defined mostly by general consensus, whose authority depends entirely on the willingness of the other kings to listen to him. Recognizing the weakness of such an arrangement, [high_king.GetTitledFirstName] has convened the other kings for a council to formally recognize the title of High King and its powers and obligations in law.\n\nWhile in practice little has changed, the formalization still serves as a useful rhetorical tool for the High King to try to exert his will against recalcitrant subject kings and serves as a template for more meaningfully increasing the High King's authority down the line. Perhaps, looking back this will be seen the first tentative step that the fragmented Brythonic kingdoms took towards reunification."
 BTWK_britannia_high_king.0100.a: "For the good of of all Britons."
 BTWK_britannia_high_king.0100.a.tt.1: "[britannia_authority|E] loss on succession will be reduced until the #V $BTWK_HK_reform_establish_coregency$#! reform is passed"
 BTWK_britannia_high_king.0100.a.tt.2: "Requirements for claiming the [high_kingship|E] will be slightly reduced if you have a [claim|E] on [GetTitleByKey('e_britannia').GetName]"
 BTWK_britannia_high_king.0100.b.subject_king: "A reasonable step to take."
 BTWK_britannia_high_king.0100.b.briton_roman: "Will this bring some much-needed order?"
 BTWK_britannia_high_king.0100.b.anglo_saxon: "This will amount to little anyways."
 BTWK_britannia_high_king.0100.b.other: "This is interesting news..."
 BTWK_britannia_high_king.0105.t: "Coregency in the High Kingship"
 BTWK_britannia_high_king.0105.desc.high_king: "The concept of a High King ruling over all of Britannia has been well entrenched, but the need for a king to prove himself before being recognized has long prevented any sort of continuity from being established. Our dynasty's success at claiming the High Kingship over the last many decades is changing all of that, however, and the opportunity to entrech our hold has come. \n\nNow, the other kings have assented to an official decree allowing for the pre-emptive election of a co-High King and formal successor during a High King's reign, which will allow me to secure my heir's succession to the High Kingship without the need for an extended vacancy for [high_king.GetPlayerHeir.GetHerHim] to prove himself. May this be the beginning of a long era of [high_king.GetDynasty.GetName] rule over Britannia..."
 BTWK_britannia_high_king.0105.desc: "The concept of a High King ruling over all of Britannia has been well entrenched, but the need for a king to prove himself before being recognized has long prevented any sort of continuity from being established. The [high_king.GetDynasty.GetName] dynasty's success at claiming the High Kingship over the last many decades has changed that, however, and their grasp on the title has grown strong. \n\nNow, [high_king.GetTitledFirstName] has managed to convince his subject kings to assent to an official decree allowing for the pre-emptive election of a co-High King and formal successor during a High King's reign, followed promptly by the election of [high_king.GetHerHis] heir. It would seem that the era of protracted interregnums in the High Kingship, which had long restricted its authority, is over."
 BTWK_britannia_high_king.0105.a: "For the good of all Britons."
 BTWK_britannia_high_king.0105.a.tt: "The [high_kingship|E] will become an inheritable title and will no longer be destroyed on succession or deposition, and the [high_king|E] will no longer be in danger of being declared #N Unfit to Rule#! and forced to forfeit the throne"
 BTWK_britannia_high_king.0105.b.subject_king: "They have much more to do to prove themselves..."
 BTWK_britannia_high_king.0105.b.briton_roman: "Surely this will be for the good of all Britons?"
 BTWK_britannia_high_king.0105.b.anglo_saxon: "A concerning development."
 BTWK_britannia_high_king.0105.b.other: "This is interesting news..."
 BTWK_britannia_high_king.0105.b.tt: "The [high_kingship|E] has become an inheritable title and will no longer be destroyed on succession or deposition, and the [high_king|E] can no longer be declared #N Unfit to Rule#! and forced to forfeit the throne"
 BTWK_britannia_high_king.0110.t: "Britannic Coinage Reintroduced"
 BTWK_britannia_high_king.0110.desc.high_king: "Economic and trade links across Britannia and beyond have been depressed since the end of Roman rule - but no longer. The establishment of a new mint in [high_king_capital_barony.GetNameNoTierNoTooltip], minting coins in my name to be issued across the island, seeks to end this era of atrophy and stagnation.\n\nWith the reestablishment of native Britannic coinage, we will no longer be dependent on old Roman coins and imports from the continent to maintain our economy. While some of my subject kings still, as ever, grumble that the coins show my face and name instead of theirs, even my strongest detractors agree that the return of a steady supply of coinage brings us one step closer to recovering the prosperity that has been largely lacking since the end of Roman rule."
 BTWK_britannia_high_king.0110.desc: "In an effort to revive economic and trade links depressed since the end of Roman rule in Britain, [high_king.GetName] has announced the establishment of a new mint in [high_king.GetHerHis] capital of [high_king_capital_barony.GetNameNoTierNoTooltip], minting coins in the name of the High King to be issued across the island.\n\nWith the reestablishment of native Britannic coinage, the Britons will no longer be dependent on old Roman coins and imports from the continent to maintain their economy. While some of [high_king.GetHerHis] subject kings are grumbling that the coins show [high_king.GetHerHis] face and name instead of theirs, all are in agreement that the return of a steady supply of coinage to Britannia will bring back a degree of prosperity largely lacking since the end of Roman rule across the entire island."
 BTWK_britannia_high_king.0110.a: "For the good of Britannia."
 BTWK_britannia_high_king.0110.a.tt: "This modifier will be inherited by future [high_kings|E]. All current and future [vassals|E], [britannia_subject_kings|E], and [vassals|E] of [britannia_subject_kings|E] in [GetGeographicalRegion('btwk_world_britannia').GetName] will also get this modifier."
 BTWK_britannia_high_king.0110.b.subject_king: "A good move, but must we really see [high_king.GetHerHis] face this often?"
 BTWK_britannia_high_king.0110.b.briton_roman: "This can only be good for Britannia."
 BTWK_britannia_high_king.0110.b.anglo_saxon: "I suppose coins #italic are#! useful..."
 BTWK_britannia_high_king.0110.b.other: "This is interesting news..."
 BTWK_britannia_high_king.0120.t: "The High Council"
 BTWK_britannia_high_king.0120.desc: "The proposal is straightforward and simple - in order to better adjudicate disputes between different kingdoms, a High Council consisting of all the British kings recognizing my authority will be formed, led by myself, with binding authority over its members. The issue is a contentious one, however - while the other kings have long reconciled themselves to my military and diplomatic leadership, the issue of ceding legal authority is one that infringes much more severely on their domestic sovereignty.\n\nThere is still support for my proposed reforms - some supporting out of loyalty, others hoping to leverage their increased influence at my court. But the resistance among its opponents is deep, most walking out in anger when it became clear that I would not back down, and some declaring that even presenting this proposal is a violation of the oath I swore as High King. The remaining kings have agreed to consider the reform, but it seems that the struggle is just beginning..."
 BTWK_britannia_high_king.0120.a: "Surely they will see reason."
 BTWK_britannia_high_king.0120.a.tt: "You propose to your [britannia_subject_kings|E] to increase your High Council's authority over their kingdoms, effectively making them into proper [vassals|E]. Many are unlikely to willingly give up their independence, and may attempt to #N revolt#!!"
 FIRST_BTWK_BRITANNIA_HIGH_KING_REFORM_EMPOWER_HIGH_COUNCIL_WAR: "@warning_icon! #warning Your [britannia_subject_kings|E] are unlikely to willingly give up their independence unless they have a high [opinion|E] of you. This may lead to war!#!"
 GLOBAL_BTWK_BRITANNIA_HIGH_KING_REFORM_EMPOWER_HIGH_COUNCIL_WAR: "#warning Many of the [britannia_subject_kings|E] are unlikely to willingly give up their independence. This may lead to war against [CHARACTER.GetTitledFirstName]!#!"
 FIRST_BTWK_BRITANNIA_HIGH_KING_REFORM_EMPOWER_HIGH_COUNCIL_MAKE_SUBJECT_KING_VASSALS: "If you are victorious, all [britannia_subject_kings|E] will become your [vassals|E] with the [GetSubjectContractType( 'special_contract' ).GetObligationName( 'special_contract_subject_kingdom' )] [vassal_contract|E]. You will also be able to press [de_jure|E] claims on [GetTitleByKey('e_britannia').GetNameNoTier] and use the [GetCasusBelliType('tribal_subjugation_cb').GetName] [casus_belli|E] against any remaining [GetCulturePillar('heritage_brythonic').GetName] or $romanized_culture$ [culture|E] rulers in [GetGeographicalRegion('btwk_world_britannia').GetName]. If defeated, you will be forced to rescind the reform, lose all [britannia_authority|E], and be forced to abdicate."
 THIRD_BTWK_BRITANNIA_HIGH_KING_REFORM_EMPOWER_HIGH_COUNCIL_MAKE_SUBJECT_KING_VASSALS: "If [CHARACTER.GetTitledFirstName] is victorious, all [britannia_subject_kings|E] will become [vassals|E] with the [GetSubjectContractType( 'special_contract' ).GetObligationName( 'special_contract_subject_kingdom' )] [vassal_contract|E]. The [high_king|E] will also be able to press [de_jure|E] claims on [GetTitleByKey('e_britannia').GetNameNoTier] and use the [GetCasusBelliType('tribal_subjugation_cb').GetName] [casus_belli|E] against any remaining [GetCulturePillar('heritage_brythonic').GetName] or $romanized_culture$ [culture|E] rulers in [GetGeographicalRegion('btwk_world_britannia').GetName]. If defeated, [CHARACTER.GetTitledFirstName] will be forced to rescind the reform, lose all [britannia_authority|E], and be forced to abdicate."
 GLOBAL_BTWK_BRITANNIA_HIGH_KING_REFORM_EMPOWER_HIGH_COUNCIL_MAKE_SUBJECT_KING_VASSALS: "$THIRD_BTWK_BRITANNIA_HIGH_KING_REFORM_EMPOWER_HIGH_COUNCIL_MAKE_SUBJECT_KING_VASSALS$"
 BTWK_britannia_high_king.0122.opening: "[high_king.Custom2('GreetingToForeignRulerPositive', ROOT.Char)]"
 BTWK_britannia_high_king.0122.desc: "As an esteemed member of the High Council of Kings, I am asking you to consider this proposal for a significant strengthening of its powers over each of the individual kingdoms. I hope you will be supportive of this endeavor, as I trust that you understand why a strong central authority to resist the Saxon threat is necessary."
 BTWK_britannia_high_king.0122.a: "Disunity is too great a threat to be left alone. You have my assent."
 BTWK_britannia_high_king.0122.a.tt: "You refuse to join the impending revolt of dissenting [britannia_subject_kings|E]. If [high_king.GetTitledFirstName] is successful is passing this [britannia_reform|E], you and all of [high_king.GetHerHis] [britannia_subject_kings|E] will become [vassals|E] with the [GetSubjectContractType( 'special_contract' ).GetObligationName( 'special_contract_subject_kingdom' )] [vassal_contract|E]."
 BTWK_britannia_high_king.0122.b: "I will not be cowed! This is going too far!"
 BTWK_britannia_high_king.0122.b.tt: "You #N revolt#! against [high_king.GetTitledFirstNamePossessive] overreach along with other dissenting [britannia_subject_kings|E]. If victorious, [high_king.GetTitledFirstName] will be forced to withdraw the proposed [britannia_reform|E], lose all [britannia_authority|E], and abdicate the throne, but if defeated all [britannia_subject_kings|E] will become direct [vassals|E] of [high_king.GetTitledFirstName] with the [GetSubjectContractType( 'special_contract' ).GetObligationName( 'special_contract_subject_kingdom' )] [vassal_contract|E]."
 BTWK_britannia_high_king.0123.opening.supporter: "[subject_king.Custom2('GreetingToForeignRulerPositive', ROOT.Char)]"
 BTWK_britannia_high_king.0123.opening.opponent: "[subject_king.Custom2('GreetingToForeignRulerNegative', ROOT.Char)]"
 BTWK_britannia_high_king.0123.desc.supporter: "Your proposals are sensible and farsighted. I approve of this reform and look forward to participating in the empowered Council, and wish you luck against your inevitable opponents."
 BTWK_britannia_high_king.0123.desc.opponent: "Your 'proposal' is nothing more than a selfish power grab to trample on our ancient rights and seize our thrones from underneath us. I will never accept your illegitimate authority as long as I live!"
 BTWK_britannia_high_king.0123.a: "Excellent. You will be well awarded."
 BTWK_britannia_high_king.0123.a.tt: "[subject_king.GetName] has approved of your reform."
 BTWK_britannia_high_king.0123.b: "We will see about that..."
 BTWK_britannia_high_king.0123.b.tt: "[subject_king.GetName] has refused to approve of your reform, and is preparing for war!"
 BTWK_britannia_high_king.0124.t.no_opponents: "A Smooth Passage"
 BTWK_britannia_high_king.0124.t: "An Inevitable Revolt"
 BTWK_britannia_high_king.0124.desc.no_opponents: "Many of my advisors had warned that my subject kings would not be enthusiastic about giving up their sovereignty, but my deft use of diplomacy has proved them wrong. Despite some initial misgivings, all of my subject kings have agreed to my proposal to Empower the High Council - in no small part due to assurances about their continued influence over the council - and the passage of the reform should proceed smoothly from here."
 BTWK_britannia_high_king.0124.desc: "It was inevitable, perhaps, but still disappointing that it had come to this. Furious at my continued efforts to pass the reform, my opponents have banded together under the leadership of [HK_britannia_opponent_leader.GetName] and declared that my attempts to Empower the High Council constitutes an 'act of tyranny' and 'infringement of their inalienable privileges' that renders me unfit to sit on the throne of Britannia. They will accept nothing less than my abdication as a concession to back down, an entirely unacceptable demand - so it seems we are headed for war."
 BTWK_britannia_high_king.0124.a: "I will put these rebels in their place!"
 BTWK_britannia_high_king.0124.a.tt.1: "All other opponents of the reform will #N join the revolt#! against you."
 BTWK_britannia_high_king.0124.a.tt.2: "If you are victorious in the war, the #V $BTWK_HK_reform_empower_high_council$#! will be passed, and all [britannia_subject_kings|E] will become your [vassals|E] with the [GetSubjectContractType( 'special_contract' ).GetObligationName( 'special_contract_subject_kingdom' )] [vassal_contract|E]."
 BTWK_britannia_high_king.0124.a.tt.3: "If you are defeated, you will be forced to rescind the reform, lose all your [britannia_authority|E], be forced to abdicate!"
 BTWK_britannia_high_king.0124.b: "Why did anyone ever doubt me?"
 BTWK_britannia_high_king.0124.b.tt: "Without any opposition to the reform, the #V $BTWK_HK_reform_empower_high_council$#! reform will now be enacted!"
 BTWK_britannia_high_king.0125.t.opponent: "War Against Tyranny"
 BTWK_britannia_high_king.0125.t: "Revolt of the Subject Kings"
 BTWK_britannia_high_king.0125.desc.HK_britannia_opponent_leader: "Despite our protests, [high_king.GetTitledFirstName] was determined to push forwards with his tyrannical proposal - and so we had no choice but to act. All of us kings who refused to bow down have come together in an alliance to oppose the reform, with me informally leading as the most powerful among our number. A declaration denouncing [high_king.GetTitledFirstNamePossessive] acts of tyranny and attempts at infringing upon our inalienable privileges and demanding [high_king.GetHerHis] abdication was, not unexpectedly, met with silence. And so - war it is."
 BTWK_britannia_high_king.0125.desc.opponent: "Despite our protests, [high_king.GetTitledFirstName] was determined to push forwards with his tyrannical proposal - and so we had no choice but to act. All of us kings who refused to bow down have come together in an alliance to oppose the reform, [HK_britannia_opponent_leader.GetName] informally leading as the most powerful among our number. A declaration denouncing [high_king.GetTitledFirstNamePossessive] acts of tyranny and attempts at infringing upon our inalienable privileges and demanding [high_king.GetHerHis] abdication was, not unexpectedly, met with silence. And so - war it is."
 BTWK_britannia_high_king.0125.desc: "A dispute over [high_king.GetNamePossessive] proposals to increase [high_king.GetHerHis] authority has escalated into war! Many of [high_king.GetHerHis] subject kings took great offense to [high_king.GetHerHis] attempts to Empower the High Council of kings, seeing it as an infringement of their sovereignty and inalienable privileges, and [high_king.GetTitledFirstNamePossessive] refusal to back down have now led them to revolt under the leadership of [HK_britannia_opponent_leader.GetName]. They are demanding nothing less than [high_king.GetHerHis] abdication, as they know the consequences of defeat - that their sovereignty will be lost, and that Britannia be embarking firmly and the path of centralization and unification."
 BTWK_britannia_high_king.0125.a.tt: "The alliance of [britannia_subject_kings|E] opposing the reform have revolted against [high_king.GetName] under the leadership of [HK_britannia_opponent_leader.GetName]!"
 BTWK_britannia_high_king.0125.a.tt.a: "The alliance of [britannia_subject_kings|E] opposing the reform have revolted against [high_king.GetName] under your leadership!"
 BTWK_britannia_high_king.0125.a.supporter: "We must watch the developments closely."
 BTWK_britannia_high_king.0125.a.opponent: "The tyrant will be deposed!"
 BTWK_britannia_high_king.0125.a.briton_roman: "A pivotal moment for Britannia..."
 BTWK_britannia_high_king.0125.a.anglo_saxon: "The Britons never pass up an opportunity for infighting."
 BTWK_britannia_high_king.0125.a.other: "This is interesting news..."
 BTWK_britannia_high_king.0126.t: "The High Council of Britannia"
 BTWK_britannia_high_king.0126.desc: "Getting all my subject kings to agree on anything is never easy, but with the acquiesence of the last rebel kings at swordpoint, the High Council of British kings has agreed to pass a motion greatly expanding its - and my - authority over its constituent kingdoms. Formerly a mostly powerless body, the Council now has the power to enact laws, levy taxes, and issue charters in my name throughout the territory of all of my subject kings. \n\nWith the empowered council behind me, my authority now effectively spans much of the island and many see me as the most powerful ruler Britannia has seen since the Roman governors of old. Surely, it will not be long before the foreign invaders are vanquished and Britannia reunited."
 BTWK_britannia_high_king.0126.desc.no_opponents: "Getting all my subject kings to agree on anything is never easy, but with the deft application of diplomatic charm and a little bit of pressure, the High Council of British kings has agreed to pass a motion greatly expanding its - and my - authority over its constituent kingdoms. Formerly a mostly powerless body, the Council now has the power to enact laws, levy taxes, and issue charters in my name throughout the territory of all of my subject kings. \n\nWith the empowered council behind me, my authority now effectively spans much of the island and many see me as the most powerful ruler Britannia has seen since the Roman governors of old. Surely, it will not be long before the foreign invaders are vanquished and Britannia reunited."
 BTWK_britannia_high_king.0126.a: "A High Kingdom not just in name!"
 BTWK_britannia_high_king.0126.a.tt.1: "You are now permitted to have [king|E]-tier vassals, and all your [britannia_subject_kings|E] will become direct [vassals|E] with the [GetSubjectContractType( 'special_contract' ).GetObligationName( 'special_contract_subject_kingdom' )] [vassal_contract|E]."
 BTWK_britannia_high_king.0126.a.tt.2: "You will no longer be able to make [britannia_subject_king|E] [tributaries|E], but will now be able to press [de_jure|E] claims on [GetTitleByKey('e_britannia').GetNameNoTier] and use the [GetCasusBelliType('tribal_subjugation_cb').GetName] [casus_belli|E] against any remaining [GetCulturePillar('heritage_brythonic').GetName] or $romanized_culture$ [culture|E] rulers in [GetGeographicalRegion('btwk_world_britannia').GetName]."
 BTWK_britannia_high_king.0126.a.tt.3: "Your reduced [tributary|E] [realm_size|E] impact on [tribal_respect|E] from being High King will be replaced by a reduced impact of personal [realm_size|E] on [tribal_respect|E]."
 BTWK_britannia_high_king.0126.a.tt.4: "Your [crown_authority|E] will be limited to [GetLaw('crown_authority_1').GetShortName] until further [britannia_reforms|E] are passed."
 BTWK_britannia_high_king.0127.t: "The High Council of Britannia"
 BTWK_britannia_high_king.0127.desc: "Following the defeat of the last rebel kings, the High Council of British kings has agreed to pass [high_king.GetTitledFirstNamePossessive] motion greatly expanding its - and [high_king.GetHerHis] - authority over its constituent kingdoms. Formerly a mostly powerless body, the Council now has the power to enact laws, levy taxes, and issue charters in the [high_king.GetHerHis] name throughout the territory of all of [high_king.GetHerHis] subject kings. \n\n[high_king.GetTitledFirstNamePossessive] authority now effectively spans much of the island and many consider [high_king.GetHerHim] as the most powerful ruler Britannia has seen since the Roman governors of old. It remains to be seen if the High King will be able to harness [high_king.GetHerHis] newfound authority to finally vanquish the Saxon invaders from the beleagured island and reunite Britannia once and for all."
 BTWK_britannia_high_king.0127.desc.no_opponents: "Following fevered negotiations, the High Council of British kings has agreed to pass [high_king.GetTitledFirstNamePossessive] motion greatly expanding its - and [high_king.GetHerHis] - authority over its constituent kingdoms. Formerly a mostly powerless body, the Council now has the power to enact laws, levy taxes, and issue charters in the [high_king.GetHerHis] name throughout the territory of all of [high_king.GetHerHis] subject kings. \n\n[high_king.GetTitledFirstNamePossessive] authority now effectively spans much of the island and many consider [high_king.GetHerHim] as the most powerful ruler Britannia has seen since the Roman governors of old. It remains to be seen if the High King will be able to harness [high_king.GetHerHis] newfound authority to finally vanquish the Saxon invaders from the beleagured island and reunite Britannia once and for all."
 BTWK_britannia_high_king.0127.a.was_supporter: "We will sit on the council as equals."
 BTWK_britannia_high_king.0127.a.was_opponent: "This will not stand!"
 BTWK_britannia_high_king.0127.a.briton_roman: "Long live Britannia!"
 BTWK_britannia_high_king.0127.a.anglo_saxon: "This could prove to be a serious problem..."
 BTWK_britannia_high_king.0127.a.other: "This is interesting news..."
 BTWK_britannia_high_king.0127.a.tt: "All [britannia_subject_kings|E] of [high_king.GetTitledFirstName] have become direct [vassals|E] with the [GetSubjectContractType( 'special_contract' ).GetObligationName( 'special_contract_subject_kingdom' )] [vassal_contract|E], and [high_king.GetTitledFirstName] is now permitted to have [king|E]-tier vassals, press [de_jure|E] claims on [GetTitleByKey('e_britannia').GetNameNoTier], and use the [GetCasusBelliType('tribal_subjugation_cb').GetName] [casus_belli|E] against any remaining [GetCulturePillar('heritage_brythonic').GetName] or $romanized_culture$ [culture|E] rulers in the region of [GetGeographicalRegion('btwk_world_britannia').GetName]."
 BTWK_britannia_high_king.0128.t: "A Stalemated Revolt"
 BTWK_britannia_high_king.0128.desc.high_king: "The rebellious kings have proved their mettle. What was supposed to be a quick and decisive campaign to cow the rebels did not quite turn out as I had hoped, though they too were unable to press their own advantages and force terms on me. Rather than continue to wear each other down and leave Britannia even more vulnerable to its enemies we have agreed to a truce - I will drop my reform, for now, and exchange the rebels have agreed to revoke their renunciation of my Kingship. But ultimately this has not really resolved anything - I will simply have to make sure I am better prepared for the next round..."
 BTWK_britannia_high_king.0128.desc.supporter: "The rebellious kings have proved their mettle. What was supposed to be a quick and decisive campaign to cow the rebels did not quite turn out as [high_king.GetTitledFirstName] had hoped, though the rebels too were unable to press their own advantages and force their own terms. Rather than continue to wear each other down and leave Britannia even more vulnerable to its enemies both sides have agreed to a truce - [high_king.GetTitledFirstName] will drop [high_king.GetHerHis] reform, for now, and exchange the rebels will revoke the renunciation of their recognition [high_king.GetHerHis] Kingship. But ultimately this has not really resolved anything, and [high_king.GetTitledFirstName] seems determined to try to again once the circumstances grow more favourable."
 BTWK_britannia_high_king.0128.desc.opponent: "Our armies held strong against the attacks of [high_king.GetTitledFirstName], but our attempts to force [high_king.GetHerHim] to force terms were also on the whole unsuccessful. Rather than continue to wear each other down and leave Britannia even more vulnerable to its enemies we have therefore now agreed to a truce - [high_king.GetTitledFirstName] has agreed to respect our privileges and will drop [high_king.GetHerHis] proposed reform, and exchange we have agreed to pay homage and revoke our renunciation of [high_king.GetHerHis] Kingship. But we leave this war clear-eyed - [high_king.GetTitledFirstName] has not truly given up [high_king.GetHerHis] intentions of forcing [high_king.GetHerHis] authority on us, and probably never will as long as [high_king.GetSheHe] sits on the throne."
 BTWK_britannia_high_king.0128.desc.other: "The war between [high_king.GetName] and the alliance of rebellious subject kings lead by [HK_britannia_opponent_leader.GetName] has ended in a stalemate, with neither side able to gain a decisive advantage over the other to fully enforce their terms. Recognizing that the continuation of the war would leave them both increasingly vulnerable to their enemies, both sides have agreed to drop their most significant demands in return for peace. But the question of the High King's authority remains tense and unresolved, and both sides seem to recognize that this is more of a temporary truce until [high_king.GetTitledFirstName] feels ready to press the issue again."
 BTWK_britannia_high_king.0128.a.high_king: "Reunification is Britannia's destiny - this is just a delay."
 BTWK_britannia_high_king.0128.a.supporter: "Not the end, merely a delay."
 BTWK_britannia_high_king.0128.a.opponent: "[high_king.GetSheHe] will surely soon try again - we must be ready."
 BTWK_britannia_high_king.0128.a.briton_roman: "This hasn't resolved anything."
 BTWK_britannia_high_king.0128.a.anglo_saxon: "So another war in five years, then?"
 BTWK_britannia_high_king.0128.a.other: "This is interesting news..."
 BTWK_britannia_high_king.0128.tt.a: "You will not be able to try to pass a reform again for #high 5#! years"
 BTWK_britannia_high_king.0128.tt: "[high_king.GetTitledFirstName] will not be able to try to pass a reform again for #high 5#! years"
 BTWK_britannia_high_king.0129.t: "Victory of the Subject Kings"
 BTWK_britannia_high_king.0129.desc.high_king: "I have lost. The rebellious subject kings led by [HK_britannia_opponent_leader.GetName] proved too strong to defeat on the battlefield, and I have had no choice but to accept their terms - renounce all ambitions of reform, affirm the involability of their royal privileges, and abdicate the throne entirely, and in order to retain their loyalty, my heir [high_king_player_heir.GetFirstName] has agreed to affirm these vows and guarantee the rights of [high_king_player_heir.GetHerHis] subject kings. One day, in more favourable circumstances, we will try again - but even the optimistic of our supporters admit that this has been a severe setback for the cause of the High Kingship."
 BTWK_britannia_high_king.0129.desc.supporter: "We have lost. The rebellious subject kings led by [HK_britannia_opponent_leader.GetName] proved too strong to defeat on the battlefield, and [high_king.GetTitledFirstName] has had no choice but to accept their terms - renounce all ambitions of reform, affirm the involability of their royal privileges, and abdicate the throne entirely, and in order to retain their loyalty, [high_king.GetHerHis] heir [high_king_player_heir.GetFirstName] has agreed to affirm these vows and guarantee the rights of [high_king_player_heir.GetHerHis] subject kings. One day, in more favourable circumstances, perhaps we will try again under High [high_king_player_heir.Custom('GetQueenKing')] [high_king_player_heir.GetFirstName] - but even the optimistic of us admit that this has been a severe setback for the cause of the High Kingship."
 BTWK_britannia_high_king.0129.desc.opponent: "High [high_king.Custom('GetQueenKing')] [high_king.GetFirstNamePossessive] hubris proved to be [high_king.GetHerHis] undoing. Underestimating our strength and dedication, [high_king.GetHerHis] armies proved to be no match for our forces, and [high_king.GetSheHe] has had to choice but to accept all of our demands - renounce all ambitions of reform, affirm the involability of our royal privileges, and abdicate the throne entirely. Even from [high_king.GetHerHis] heir [high_king_player_heir.GetFirstName], the new High [high_king_player_heir.Custom('GetQueenKing')], we have been able to extract concessions - fearful of losing our loyalty to High Kingship entirely, [high_king_player_heir.GetSheHe] has agreed to affirm these vows and guarantee our unalienabled rights.\n\nPerhaps one day another ambitious and arrogant High King will make an attempt to violate our rights - but just as we defeated tyranny once, we will certainly do so again."
 BTWK_britannia_high_king.0129.desc.other: "High [high_king.Custom('GetQueenKing')] [high_king.GetFirstNamePossessive] attempts to increase [high_king.GetHerHis] authority over [high_king.GetHerHis] subject kings has ended in defeat. Decisively routed on the battlefield by [HK_britannia_opponent_leader.GetName] and [HK_britannia_opponent_leader.GetHerHis] coalition of opposing subject kings, High [high_king.Custom('GetQueenKing')] [high_king.GetFirstName] has been forced to accede to all of their demands - renounce all ambitions of reform, affirm the involability of their royal privileges, and abdicate the throne entirely, vows that have been affirmed by [high_king.GetHerHis] heir [high_king_player_heir.GetFirstName]. Perhaps one day another High King will make another attempt at increasing his authority, but for now the situation seems clear - the subject kings will remain autonomous and sovereign, and the High King a mostly uninvolved overlord."
 BTWK_britannia_high_king.0129.a.high_king: "Damn the blasted traitors!"
 BTWK_britannia_high_king.0129.a.supporter: "And now we will all have to live with their foolishness."
 BTWK_britannia_high_king.0129.a.opponent: "Tyranny will never stand as long as I breathe."
 BTWK_britannia_high_king.0129.a.briton_roman: "What does this mean for Britannia?"
 BTWK_britannia_high_king.0129.a.anglo_saxon: "If they want to remain divided, then so be it."
 BTWK_britannia_high_king.0129.a.other: "This is interesting news..."
 BTWK_britannia_high_king.0129.tt: "High [Select_CString(high_king.IsFemale, 'Queen', 'King')] [high_king.GetFirstName] has lost all [britannia_authority|E] and has been forced to abdicate."
 BTWK_britannia_high_king.0140.t.christian: "The Archbishopric of Londinium"
 BTWK_britannia_high_king.0140.t.nonchristian: "The Britannic State Church"
 BTWK_britannia_high_king.0140.desc.catholic.high_king: "In a diplomatic triumph, the Pope has agreed with my proposals for a reform of the ecclesiastical hierarchy in Britannia. The ancient and revived see of Londinium, recovered from Saxon domination, has now been officially designated as the Primate See of Britannia, with the Archbishop of Londinium now holding official precedence over the other archbishops and exerting a degree of authority over all the other sees, even those outside his province.\n\nThis act brings the many fragmented dioceses of Britannia, with their bishops largely under local control, under a single authority with much closer ties to my court. While it would certainly be unseemly for me to try to interfere with church affairs too openly, this opens up many opportunities for me to increase my influence over the church in more subtle ways. Certainly, if nothing else, having the ear of the Primate will certainly make it easier to improve my relationships with the bishops and their sees..."
 BTWK_britannia_high_king.0140.desc.christian.high_king: "In a diplomatic triumph, the church has agreed with my proposals for a reform of the ecclesiastical hierarchy in Britannia. The ancient and revived see of Londinium, recovered from Saxon domination, has now been officially designated as the Primate See of Britannia, with the Archbishop of Londinium now holding official precedence over the other archbishops and exerting a degree of authority over all the other sees, even those outside his province.\n\nThis act brings the many fragmented dioceses of Britannia, with their bishops largely under local control, under a single authority with much closer ties to my court. While it would certainly be unseemly for me to try to interfere with church affairs too openly, this opens up many opportunities for me to increase my influence over the church in more subtle ways. Certainly, if nothing else, having the ear of the Primate will certainly make it easier to improve my relationships with the bishops and their sees..."
 BTWK_britannia_high_king.0140.desc.christian: "In a diplomatic triumph for [high_king.GetTitledFirstName], the ancient and revived see of Londinium, recovered from Saxon domination, has been officially designated as the Primate See of Britannia. As the new Primate, the Archbishop of Londinium has official precedence over the other archbishops and exerts a degree of authority over all the other sees, even those outside his province.\n\nThis act brings the many fragmented dioceses of Britannia under a single authority with close ties to the [high_king.GetTitleTierName]. While [high_king.GetTitledFirstName] has shown little sign of openly interfering with church affairs, few doubt that this act will not lead to greater influence of the [high_king.GetTitleTierName] over the church in Britannia, who might now be more incentivized to defend and uphold the legitimacy and authority of the High Kingship"
 BTWK_britannia_high_king.0140.desc.nonchristian.high_king: "Under my direction, my [high_king.GetCouncillor('councillor_court_chaplain').GetCouncilTitleFirstName] has convened together all the most important [high_king.GetFaith.PriestNeuterPlural] of Britannia for a great synod at [state_church_seat_barony.GetNameNoTier] to officially organize the [high_king.GetFaith.GetAdjective] faith in Britannia. After fevered discussions and negotations, my proposals have successfully been approved and the [high_king.GetFaith.PriestNeuterPlural] have now issued a proclamation declaring the formation of a permanent council that will effectively unite the [high_king.GetFaith.GetAdjective] priesthood in Britannia - under my sponsorship and protection, of course.\n\nWhile it would certainly be unseemly for me to try to interfere with the affairs of [high_king.GetFaith.PriestNeuterPlural] too openly, the formation of a state church and royal sponsorship of their [high_king.GetFaith.HouseOfWorshipPlural] opens up many opportunities for me to increase my influence over the priesthood in more subtle ways. Certainly, if nothing else, the [high_king.GetFaith.PriestNeuterPlural] will be much more likely to uphold my rightful legitimacy and piety once they see my generous donations..."
 BTWK_britannia_high_king.0140.desc.nonchristian: "Under the direction of [high_king.GetTitledFirstName], [high_king.GetCouncillor('councillor_court_chaplain').GetCouncilTitleFirstName] has convened together all the most important [high_king.GetFaith.PriestNeuterPlural] of Britannia for a great synod at [state_church_seat_barony.GetNameNoTier] to officially organize the [high_king.GetFaith.GetAdjective] faith in Britannia. After fevered discussions and negotations, the [high_king.GetFaith.PriestNeuterPlural] have issued a proclamation declaring the formation of a permanent council that will effectively unite the [high_king.GetFaith.GetAdjective] priesthood in Britannia under the sponsorship and protection of [high_king.GetTitledFirstName].\n\nWhile the [high_king.GetTitleTierName] has vowed that religious affairs will remain purely the domain of the [high_king.GetFaith.PriestNeuterPlural], few doubt that the formation of a state church will not dramatically increase the High King's influence over the priesthood. With the formalization of royal sponsorship over their [high_king.GetFaith.HouseOfWorshipPlural], [high_king.GetTitledFirstName] will certainly find it much easier to convince the [high_king.GetFaith.PriestNeuterPlural] to defend and uphold the legitimacy and authority of the High Kingship."
 BTWK_britannia_high_king.0140.a: "For the good of Britannia."
 BTWK_britannia_high_king.0140.a.tt.1: "[high_king.GetFaith.GetAdjective] rulers can now build and use the [GetBuilding('holy_site_pagan_grand_temple_01').GetName] in the [GetTitleByKey('b_londiniumcastle').GetName]"
 BTWK_britannia_high_king.0140.a.tt.2.christian: "Any [high_kings|E] that control this [county|E] will get the [GetModifier('BTWK_britannia_high_king_state_church_seat_christian_character_modifier').GetNameWithTooltip] modifier"
 BTWK_britannia_high_king.0140.a.tt.2.nonchristian: "Any [high_kings|E] that control the seat will get the [GetModifier('BTWK_britannia_high_king_state_church_seat_nonchristian_character_modifier').GetNameWithTooltip] modifier"
 BTWK_britannia_high_king.0140.b.subject_king: "And where is my place in all this?"
 BTWK_britannia_high_king.0140.b.briton_roman: "Hopefully [high_king.GetSheHe] uses [high_king.GetHerHis] power responsibly..."
 BTWK_britannia_high_king.0140.b.anglo_saxon: "There is much we could learn from them."
 BTWK_britannia_high_king.0140.b.other: "This is interesting news..."
 BTWK_britannia_high_king.0150.t: "The Britannic Codes of Succession"
 BTWK_britannia_high_king.0150.desc.high_king: "Convinced of the need for reform by reminders of the instability of successions past, my subject kings have agreed to my proposals for reforming the customary practice of electing a new High King upon succession. In addition to formalizing the rules and process of the election, the rights to claim and succeed the High Kingship have been restricted to the High King's heirs of the blood rather than being theoretically available to any British king, a common and problematic source of intrigue in the past.\n\nWhile this act does disempowering my subject kings of many of their traditional prerogatives, many of them also recognize that this act will help end the unpredictable maneuvering and instability that used to mark each succession, to the mutual benefit of all Britons. That it also completely entrenches my dynasty's hold on the High Kingship is merely another side benefit..."
 BTWK_britannia_high_king.0150.desc: "Seeking to reduce the inevitable uncertanties of succession, [high_king.GetName] has promulgated laws reforming the customary practice of electing a new High King upon succession. In addition to formalizing the process of the election, this act restricts the rights to claim and succeed the High Kingship to the High King's heirs of the blood. \n\nWhile a controversial move effectively disempowering the subject kings of many of their traditional prerogatives, it is also clear that this act is meant to end the unpredictable maneuvering and instability that used to mark each succession. Certainly, though, the formalization of the succession will also serve to completely entrench the [high_king.GetDynasty.GetName] dynasty's hold on the High Kingship."
 BTWK_britannia_high_king.0150.a: "For the good of Britannia."
 BTWK_britannia_high_king.0150.a.tt.1: "[britannia_authority|E] will no longer be lost on succession"
 BTWK_britannia_high_king.0150.a.tt.2: "The [crown_authority|E] of the [GetTitleByKey('e_britannia').GetName] will no longer be limited to [GetLaw('crown_authority_1').GetShortName]"
 BTWK_britannia_high_king.0150.b.subject_king: "Merely a formality anyways."
 BTWK_britannia_high_king.0150.b.briton_roman: "Stability is always good to strive for."
 BTWK_britannia_high_king.0150.b.anglo_saxon: "A dedicated usurper will always find a reason."
 BTWK_britannia_high_king.0150.b.other: "This is interesting news..."
 BTWK_britannia_high_king.0160.t: "The Lex Britannorum"
 BTWK_britannia_high_king.0160.desc.high_king: "Under my direction, my scribes have been compiling and standardizing the legal customs of our people and have now published an authoritative compliation and codification, referred to as the Lex Britannorum. The code largely standardizes and does away with the patchwork of local customs and variable mix of Celtic and Roman law previously used and has now been officially promulgated, establishing a single legal code for use over all of Britannia.\n\nCopies of the text have been sent to my subject kings for use in their courts, though there remains some resistance from those who resent the revocation of their local legal customs and traditions. Implictly, the acceptance of the new legal code has also established the right of my council to legislate for the realm as a whole, drawing my subject kingdoms ever more firmly under my authority."
 BTWK_britannia_high_king.0160.desc: "Under the direction of [high_king.GetName], the scribes of [high_king_capital_barony.GetNameNoTier] have been compiling and standardizing the legal customs of the Britannic people into an authoritative compliation and codification, which has now been published as the Lex Britannorum. The code largely standardizes the variable mix of Celtic and Roman law previously used and has now been officially promulgated, doing away with the patchwork of local customs and establishing a single legal code for use over all of Britannia.\n\nCopies of the text have been sent to the various subject kingdoms and their courts, and generally accepted despite some resistance to the abolition of local customs - implictly establishing the right of the High King and his council to legislate for the realm as a whole."
 BTWK_britannia_high_king.0160.a: "For the good of Britannia."
 BTWK_britannia_high_king.0160.a.tt: "The [GetSubjectContractType( 'special_contract' ).GetObligationName( 'special_contract_subject_kingdom' )] [vassal_contract|E] can now be revoked"
 BTWK_britannia_high_king.0160.b.subject_king: "I suppose this will make administering justice easier."
 BTWK_britannia_high_king.0160.b.briton_roman: "A true lawgiver."
 BTWK_britannia_high_king.0160.b.anglo_saxon: "Should we do the same as well...?"
 BTWK_britannia_high_king.0160.b.other: "This is interesting news..."
 BTWK_britannia_high_king.0160.b.tt: "The [high_king|E] can now revoke [GetSubjectContractType( 'special_contract' ).GetObligationName( 'special_contract_subject_kingdom' )] status from [high_king.GetHerHis] vassal kings"
 BTWK_britannia_high_king.0170.t: "The True Heirs of Macsen Wledig"
 BTWK_britannia_high_king.0170.desc.high_king: "When $BTWK_macsen_wledig$ rose up in Britannia and crossed the channel to claim the Imperial throne, it was us Britons, his ever loyal sons and supporters who he had defended against the Picts and Scots, who supported his claim above all. In gratitude our ancestors were entrusted with the protection of their province and the sovereignty of their homelands, which we have striven to uphold ever since. Indeed, after the final withdrawal of the legions it was only been our fierce resistance that stopped the waves of invading barbarians who sought to burn our cities and take our homes.\n\nIn the end, neither Saxon nor Pict nor Scot could stand up to the martial spirit of the people who rebelled so audaciously under Boudicca and delivered so many usurpers over the channel, and now we Britons stand as the undisputed masters of the island, just as he once promised. As High [Select_CString(high_king.IsFemale, 'Queen', 'King')] of the Britons, it is my to duty to finish what he started - to protect the Britons across the channel in Armorica and ensure that the warmongering Picts and Scots can never threaten Britannia again. Never before has a single king ever ruled over all of the Isles, not even the Roman emperors - but soon, [high_king.GetFaith.HighGodName] willing, all will recognize the glory of the true heirs of $BTWK_macsen_wledig$!"
 BTWK_britannia_high_king.0170.desc: "When $BTWK_macsen_wledig$ rose up in Britannia and crossed the channel to claim the Imperial throne, it was his ever loyal sons and supporters in the Britons, who he had defended against the Picts and Scots, who supported his claim above all. In gratitude he greatly rewarded his British supporters, entrusting them with the protection of their province and the sovereignty of their homelands. Indeed, after the withdrawal of the legions not long afterwards it was only been their fierce resistance that prevented the island from falling to the waves of barbarians who continued in their endless invasions.\n\nIn the end, neither Saxon nor Pict nor Scot could stand up to the martial spirit of the people who rebelled so audaciously under Boudicca and delivered so many usurpers over the channel, and the Britons now stand as the undisputed masters of the island, just as he once promised. Now, [high_king.GetTitledFirstName] has declared that as the true heirs of $BTWK_macsen_wledig$, it is the duty of the Britons to finish what he started - to protect the Armoricans across the channel and ensure that the warmongering Picts and Scots can never threaten Britannia again. Never before has a single king ever ruled over all of the Isles - will [high_king.GetTitledFirstName] succeed where even the Roman emperors failed, and build a true Britannic Empire?"
 BTWK_britannia_high_king.0170.a: "May the spirit of Britannia live forever!"
 BTWK_britannia_high_king.0170.a.tt.1: "The [britannia_struggle|E] will end with the #color_green;bold Reunification of Britannia#!! You will forever be honoured as the High King who finished the reclamation and reunification of Britannia, and have earned the right to bring all of the Britannic Isles under proper Briton dominion."
 BTWK_britannia_high_king.0170.a.tt.2: "All special [high_kingship|E] mechanics will be disabled."
 BTWK_britannia_high_king.0170.b.high_king_vassals: "Long live the High King! Long live Britannia!"
 BTWK_britannia_high_king.0170.b.other_briton: "Wait... will [high_king.GetSheHe] be coming after us too?"
 BTWK_britannia_high_king.0170.b.roman: "They really think they can compare to the glory of Rome?"
 BTWK_britannia_high_king.0170.b.anglo_saxon: "Alas, the dream of [GetTitleByKey('e_aengland').GetNameNoTierNoTooltip] was not to be..."
 BTWK_britannia_high_king.0170.b.other_celtic: "Who does [high_king.GetSheHe] think [high_king.GetSheHe] is?!?"
 BTWK_britannia_high_king.0170.b.other: "Maybe Britannia will be of interest after all."
 BTWK_britannia_high_king.0170.b.tt: "The [britannia_struggle|E] has ended with the #color_green;bold Reunification of Britannia#!! The Britons have reclaimed and reunified their homeland, and now look to expand their dominion throughout the whole of the Britannic Isles."
 BTWK_britannia_high_king.0180.t: "Revoking the Royal Privileges"
 BTWK_britannia_high_king.0180.desc: "The Empire of old had no kings ruling its provinces - and if we are to properly restore it and become a true Imperator, neither can we. While we have gone a long way from the days when the High King was mere first among equals, my vassal kings are still deeply entrenched on their ancestral thrones and no matter how much I try to appease them with the promise of influence, court positions, or even governorships there is certain to be fierce resistance to the idea of restoring the old provincial system. Certainly, some will approve out of loyalty, others drawn by the promise of rewards if they accept - but for the rest, there may well be nothing that can be done except to prepare for war..."
 BTWK_britannia_high_king.0180.a: "They will agree - or else."
 BTWK_britannia_high_king.0180.a.tt: "You propose to your vassals the restoration of Imperial Dignity and the old Roman provinces, which will require your vassal kings to give up their thrones. Many are unlikely to willingly give up their royal privileges, particularly kings with the [GetSubjectContractType( 'special_contract' ).GetObligationName( 'special_contract_subject_kingdom' )] [vassal_contract|E], and may attempt to #N revolt#!!"
 FIRST_BTWK_BRITANNIA_HIGH_KING_REFORM_RESTORE_IMPERIAL_DIGNITY_WAR: "@warning_icon! #warning Your vassal kings are unlikely to willingly give up their royal privileges, especially if they have the [GetSubjectContractType( 'special_contract' ).GetObligationName( 'special_contract_subject_kingdom' )] [vassal_contract|E], unless they have a high [opinion|E] of you. This may lead to war!#!"
 GLOBAL_BTWK_BRITANNIA_HIGH_KING_REFORM_RESTORE_IMPERIAL_DIGNITY_WAR: "#warning Many of the vassal kings are unlikely to willingly give up their royal privileges, especially if they have the [GetSubjectContractType( 'special_contract' ).GetObligationName( 'special_contract_subject_kingdom' )] [vassal_contract|E]. This may lead to war against [CHARACTER.GetTitledFirstName]!#!"
 FIRST_BTWK_BRITANNIA_HIGH_KING_REFORM_RESTORE_IMPERIAL_DIGNITY_WAR_VICTORY: "If you are victorious, you will be crowned $emperor_feudal_male_latin_group$ of [GetTitleByKey('e_roman_britannia').GetName] and adopt [GetGovernment('sub_roman_government').GetName] [government|E], all [king|E]-tier vassal titles will be destroyed in preparation for the restoration of the old Roman provinces, the [britannia_struggle|E] will end in a #color_porple;bold Roman Restoration#!, and your [dynasty|E] will gain [GetModifier('BTWK_britannia_high_king_restore_imperial_dignity_modifier').GetNameWithTooltip]."
 GLOBAL_BTWK_BRITANNIA_HIGH_KING_REFORM_RESTORE_IMPERIAL_DIGNITY_WAR_VICTORY: "If [CHARACTER.GetTitledFirstName] is victorious, [CHARACTER.GetSheHe] will be crowned [Select_CString(CHARACTER.IsFemale, '$emperor_feudal_female_latin_group$', '$emperor_feudal_male_latin_group$')] of [GetTitleByKey('e_roman_britannia').GetName] and adopt [GetGovernment('sub_roman_government').GetName] [government|E], all [king|E]-tier vassal titles will be destroyed in preparation for the restoration of the old Roman provinces, the [britannia_struggle|E] will end in a #color_porple;bold Roman Restoration#!, and the [CHARACTER.GetDynasty.GetName] [dynasty|E] will gain [GetModifier('BTWK_britannia_high_king_restore_imperial_dignity_modifier').GetNameWithTooltip]."
 FIRST_BTWK_BRITANNIA_HIGH_KING_REFORM_RESTORE_IMPERIAL_DIGNITY_WAR_DEFEAT: "If defeated, you will be forced to rescind the reform, lose all [britannia_authority|E], and be forced to abdicate."
 GLOBAL_BTWK_BRITANNIA_HIGH_KING_REFORM_RESTORE_IMPERIAL_DIGNITY_WAR_DEFEAT: "If defeated, [CHARACTER.GetTitledFirstName] will be forced to rescind the reform, lose all [britannia_authority|E], and be forced to abdicate."
 BTWK_britannia_high_king.0182.opening: "[high_king.Custom2('GreetingToVassalPositive', ROOT.Char)]"
 BTWK_britannia_high_king.0182.desc.king: "A strong leader is what Britannia needs to reach its full potential and restore the civilization to the fallen provinces of the continent. I have prepared a number of decrees to restore the old administrative system in Britannia and restore the Empire, and while I know it will be difficult to give up your throne I hope you will accept them. If you do, I assure that you will be richly awarded."
 BTWK_britannia_high_king.0182.desc: "A strong leader is what Britannia needs to reach its full potential and restore the civilization to the fallen provinces of the continent. I have prepared a number of decrees to restore the old administrative system in Britannia and restore the Empire, and while I know this are significant changes I hope you will accept them. If you do, I assure that you will be richly awarded."
 BTWK_britannia_high_king.0182.a: "Very well. For the empire!"
 BTWK_britannia_high_king.0182.a.tt.1: "You refuse to join the impending revolt of dissenting vassals. If [high_king.GetTitledFirstName] is successful is passing this [britannia_reform|E] and claims the Imperial crown, the [GetTitleByKey('e_britannia').GetName] will be transformed into [GetTitleByKey('e_roman_britannia').GetName] and adopt [GetGovernment('sub_roman_government').GetName] [government|E], and all [king|E] tier titles in the realm will be destroyed."
 BTWK_britannia_high_king.0182.a.tt.2: "As a supporter of the [britannia_reform|E], if you are not [tribal|E] you will also adopt [GetGovernment('sub_roman_government').GetName] [government|E], receive [house|E] appointment preference to any currently held [duchies|E], and gain a boost to initial [influence|E] if the reform goes through."
 BTWK_britannia_high_king.0182.b: "This is going too far! I will not give up my rightful privileges!"
 BTWK_britannia_high_king.0182.b.tt: "You #N revolt#! against [high_king.GetTitledFirstNamePossessive] overreach along with other dissenting vassals. If victorious, [high_king.GetTitledFirstName] will be forced to withdraw the proposed [britannia_reform|E], lose all [britannia_authority|E], and abdicate the throne, but if you are defeated [high_king.GetSheHe] will be able to claim the Imperial crown and transform the [GetTitleByKey('e_britannia').GetName] into [GetTitleByKey('e_roman_britannia').GetName], adopting [GetGovernment('sub_roman_government').GetName] [government|E] and destroying all [king|E] tier titles in the realm."
 BTWK_britannia_high_king.0183.opening.supporter: "[subject_king.Custom2('GreetingToLiegePositive', ROOT.Char)]"
 BTWK_britannia_high_king.0183.opening.opponent: "[subject_king.Custom2('GreetingToLiegeNegative', ROOT.Char)]"
 BTWK_britannia_high_king.0183.desc.supporter: "While I am hesitant to give up my hereditary rights, I understand the reasons behind your proposed reforms and can see the many opportunities they offer. I will support the enactment of your decrees, and trust that you will live up to your promises. Long live the empire!"
 BTWK_britannia_high_king.0183.desc.opponent: "This tyrannical attempt to suppress our ancient rights and usurp our rightful lands will not be tolerated. I will never accept your illegitimate authority as long as I live!"
 BTWK_britannia_high_king.0183.a: "Excellent. You will be well awarded."
 BTWK_britannia_high_king.0183.a.tt: "[subject_king.GetName] has approved of your reform."
 BTWK_britannia_high_king.0183.b: "Then war it will be!"
 BTWK_britannia_high_king.0183.b.tt: "[subject_king.GetName] has refused to approve of your reform, and is preparing for war!"
 BTWK_britannia_high_king.0184.t.no_opponents: "United for the Empire"
 BTWK_britannia_high_king.0184.t: "Revolt of the Kings"
 BTWK_britannia_high_king.0184.desc.no_opponents: "They said it could not be done - that no matter how much I try to flatter and appease them, my vassal kings are far too anchored to their thrones to accept any proposal that would involve giving up their royal privileges. And yet, that is exactly what what I have managed - through a deft use of diplomacy, bribery, and a little bit of subterfuge, I have managed to gain the assent of all my subject kings for the Revocation of their Royal Privileges and the restoration of the old provincial system. They know the strength of my position, and that they have more to gain working with me than against me - together and united, [GetTitleByKey('e_roman_britannia').GetName] will march forward!"
 BTWK_britannia_high_king.0184.desc: "The response was swift and, unfortunately, expected. Many of my vassal kings have rejected the proposed reforms in fury and raised the banner of revolt, banding together under the leadership of [HK_britannia_opponent_leader.GetName] and declaring that my attempts to Revoke their Royal Privileges constitutes an act of tyranny that renders me unfit to sit on the throne of Britannia. They have rejected my authority entirely and will accept nothing less than my abdication to back down - and so it seems we are headed for war."
 BTWK_britannia_high_king.0184.a: "I will put them in their place!"
 BTWK_britannia_high_king.0184.a.tt.1: "All other opponents of the reform will #N join the revolt#! against you."
 BTWK_britannia_high_king.0184.a.tt.2: "If you are victorious in the war, the #V $BTWK_HK_reform_restore_imperial_dignity$#! will be passed, transforming the [GetTitleByKey('e_britannia').GetName] into [GetTitleByKey('e_roman_britannia').GetName] and reforming your government to [GetGovernment('sub_roman_government').GetName]."
 BTWK_britannia_high_king.0184.a.tt.3: "If you are defeated, you will be forced to rescind the reform, lose all your [britannia_authority|E], be forced to abdicate!"
 BTWK_britannia_high_king.0184.b: "Why did anyone ever doubt me?"
 BTWK_britannia_high_king.0184.b.tt: "Without any opposition to the reform, the #V $BTWK_HK_reform_restore_imperial_dignity$#! reform will now be enacted!"
 BTWK_britannia_high_king.0185.t.opponent: "War Against Tyranny"
 BTWK_britannia_high_king.0185.t: "Revolt of the Kings"
 BTWK_britannia_high_king.0185.desc.HK_britannia_opponent_leader: "In truth, at first we could not believe that [high_king.GetTitledFirstName] was serious - to give up our ancestral thrones, in exchange for a pittance of a position at court, and perhaps a measly governorship over the lands we have ruled for generations? But serious [high_king.GetSheHe] was, and so we have had no choice but to take up arms against this mad tyrant who believes [high_king.GetSheHe] can usurp our thrones and expect us to assent to it. Under my leadership, we have banded together in revolt against [high_king.GetTitledFirstName], and declared [high_king.GetHerHim] unfit for the throne and deposed - only by removing the source of the tyranny entirely will proper order be restored to Britannia."
 BTWK_britannia_high_king.0185.desc.opponent: "In truth, at first we could not believe that [high_king.GetTitledFirstName] was serious - to give up our ancestral thrones, in exchange for a pittance of a position at court, and perhaps a measly governorship over the lands we have ruled for generations? But serious [high_king.GetSheHe] was, and so we have had no choice but to take up arms against this mad tyrant who believes [high_king.GetSheHe] can usurp our thrones and expect us to assent to it. Under the leadership of [HK_britannia_opponent_leader.GetName], we have banded together in revolt against [high_king.GetTitledFirstName], and declared [high_king.GetHerHim] unfit for the throne and deposed - only by removing the source of the tyranny entirely will proper order be restored to Britannia."
 BTWK_britannia_high_king.0185.desc: "The [GetTitleByKey('e_britannia').GetName] has descended into civil war! [high_king.GetNamePossessive] attempts to Revoke the Royal Privileges of [high_king.GetHerHis] vassal kings and restore the old Imperial provincial system naturally sparked outrage among [high_king.GetHerHis] vassals, many of whom have now revolted under the leadership of [HK_britannia_opponent_leader.GetName]. They are demanding nothing less than [high_king.GetTitledFirstNamePossessive] abdication, as the radicalism of [high_king.GetHerHis] reforms and demands have broken all trust that [high_king.GetHerHis] would ever respect their privileges and autonomy - for they know that [high_king.GetSheHe] seeks nothing less than the abolition of their kingdoms entirely, and the restoration of the Empire in Britannia."
 BTWK_britannia_high_king.0185.a.tt: "[vassals|E] opposing the reform have banded together to revolt against [high_king.GetName] under the leadership of [HK_britannia_opponent_leader.GetName]!"
 BTWK_britannia_high_king.0185.a.tt.a: "[vassals|E] opposing the reform have banded together to revolt against [high_king.GetName] under your leadership!"
 BTWK_britannia_high_king.0185.a.supporter: "Can they not see the vision?"
 BTWK_britannia_high_king.0185.a.opponent: "The tyrant will be deposed!"
 BTWK_britannia_high_king.0185.a.briton_roman: "A pivotal moment for Britannia..."
 BTWK_britannia_high_king.0185.a.anglo_saxon: "The Britons never pass up an opportunity for infighting."
 BTWK_britannia_high_king.0185.a.other: "This is interesting news..."
 BTWK_britannia_high_king.0186.t: "The Imperium Britanniarum"
 BTWK_britannia_high_king.0186.desc.no_opponents: "Despite its reputation as a backwater province at the edges of civilization, Britannia has always had played an outsized role in the politics of the Empire. From Constantine the Great to Magnus Maximus, many an emperor and usurper has had their start in Britannia before sailing across the channel to claim the Empire. Many assumed that the province would be soon forever lost after its abandonment by the Roman armies during the slow collapse of the Empire in the West, but the Romano-British endured the waves of barbarian invasions that only intensified. With the western court long dissolved and Constantinople a distant presence, High [Select_CString(high_king.IsFemale, 'Queen', 'King')] [high_king.GetFirstName] has laid claim to the vacant title of Imperator in the West and announced [high_king.GetHerHis] intention to march on the barbarian kingdoms of the continent to restore Roman rule across all of the old provinces of the West."
 BTWK_britannia_high_king.0186.desc: "Despite its reputation as a backwater province at the edges of civilization, Britannia has always had played an outsized role in the politics of the Empire. From Constantine the Great to Magnus Maximus, many an emperor and usurper has had their start in Britannia before sailing across the channel to claim the Empire. Many assumed that Britannia was forever lost after the withdrawal of the Roman armies, but we refused to yield to the barbarian hordes of Saxons, Picts, and Scots, and eventually repelled their invasions altogether. After a long struggle, the barbarian kingdoms were vanquished and under my rule the many fragmented Briton kingdoms have finally been reunited once and for all.\n\nWith the western court long dissolved and Constantinople a distant presence, the title of Imperator in the West has lay vacant for far too long, but no more - for I have now been crowned $BTWK_britannia_high_king_imperator_title$ of the new and restored [GetTitleByKey('e_roman_britannia').GetBaseName]. As the last remaining part of the Empire in the West, it is our #italic duty#! to march on the barbarian kingdoms of the continent and restore Roman rule to the fallen provinces of the West. They may dismiss our claims now, and they may well to do so a long time yet, but one day they will fall to the might of Britannia - and the glory of Rome will be restored!"
 BTWK_britannia_high_king_imperator_title: "[Select_CString(high_king.IsFemale, '$emperor_feudal_female_latin_group$', '$emperor_feudal_male_latin_group$')]"
 BTWK_britannia_high_king.0186.a: "Britannia shall not fall! Long live the empire!"
 BTWK_britannia_high_king.0186.a.tt.1: "The [britannia_struggle|E] will end with a #color_porple;bold Roman Restoration#!! You will forever be remembered as the first [Select_CString(high_king.IsFemale, '$emperor_feudal_female_latin_group$', '$emperor_feudal_male_latin_group$')] of the restored Roman Empire in Britannia who finished the reclamation and reunification of the province, and have earned the right to reconquer the lost provinces of the continent and bring them back under proper Roman rule."
 BTWK_britannia_high_king.0186.a.tt.2: "All [king|E]-tier titles in your realm are destroyed"
 BTWK_britannia_high_king.0186.a.tt.3: "All controlled areas in [GetGeographicalRegion('btwk_world_britannia').GetName] adopt their #color_porple Roman#! de jure configuration"
 BTWK_britannia_high_king.0187.t: "The Imperium Britanniarum"
 BTWK_britannia_high_king.0187.desc: "Despite its reputation as a backwater province at the edges of civilization, Britannia has always had played an outsized role in the politics of the Empire. From Constantine the Great to Magnus Maximus, many an emperor and usurper has had their start in Britannia before sailing across the channel to claim the Empire. Many assumed that Britannia was forever lost after the withdrawal of the Roman armies, but the tenacious citizens of the province refused to yield to the invading barbarians, whether they be Saxon, Pict, or Scot. After a long struggle, the barbarian kingdoms have been reconquered and the petty kingdoms of the Britons reunited once and for all under the rule of High [Select_CString(high_king.IsFemale, 'Queen', 'King')] [high_king.GetFirstName].\n\nWith the western court long dissolved and Constantinople a distant presence, High [Select_CString(high_king.IsFemale, 'Queen', 'King')] [high_king.GetFirstName] has laid claim to the vacant title of Imperator in the West and vowed to restore the provinces of Britannia to their former glory. While the proclamation of a reborn [GetTitleByKey('e_roman_britannia').GetBaseName] has thus far been largely met with derision, the new $BTWK_britannia_high_king_imperator_title$ has largely rebuffed these dismissals and already hinted at designs to follow in the footsteps of [high_king.GetHerHis] predecessors and march on the fallen provinces of the continent. Does this mark the beginning of a new era of Imperial rule over the West?"
 BTWK_britannia_high_king.0187.a.roman_vassals: "Long live the empire!"
 BTWK_britannia_high_king.0187.a.briton_vassals: "Long live the empire...?"
 BTWK_britannia_high_king.0187.a.other_vassals: "I suppose things will be quite different from now on."
 BTWK_britannia_high_king.0187.a.other_roman: "Is this the return of the Empire?"
 BTWK_britannia_high_king.0187.a.other_emperor: "Nothing but an illegitimate usurper!"
 BTWK_britannia_high_king.0187.a.anglo_saxon: "Is there anything we can do against the might of an Empire?"
 BTWK_britannia_high_king.0187.a.other: "A bold thing, to claim the mantle of Rome."
 BTWK_britannia_high_king.0187.a.tt.1: "The [britannia_struggle|E] has ended with a #color_porple;bold Roman Restoration#!! The Romans of Britannia have reunified their province and proclaimed the restoration of the Roman Empire in the West, and have earned the right to reconquer the lost provinces of the continent and bring them back under proper Roman rule."
 BTWK_britannia_high_king.0187.a.tt.2: "All [king|E]-tier titles in the [GetTitleByKey('e_britannia').GetName] have been  destroyed"
 BTWK_britannia_high_king.0187.a.tt.3: "All areas in [GetGeographicalRegion('btwk_world_britannia').GetName] controlled by [high_king.GetName] have adopted their #color_porple Roman#! de jure configuration"
 BTWK_britannia_high_king.0188.t: "A Stalemated Revolt"
 BTWK_britannia_high_king.0188.desc.high_king: "The rebellious kings have proved their mettle. What was supposed to be a quick and decisive campaign to cow the rebels did not quite turn out as I had hoped, though they too were unable to press their own advantages and force terms on me. Rather than continue to wear each other down and leave Britannia even more vulnerable to its enemies we have agreed to a truce - I will drop my demands and allow the kings to keep their privileges, for now, and exchange the rebels have agreed to revoke their renunciation of my Kingship. But ultimately this has not really resolved anything - I will simply have to make sure I am better prepared for the next round..."
 BTWK_britannia_high_king.0188.desc.supporter: "The rebellious kings have proved their mettle. What was supposed to be a quick and decisive campaign to cow the rebels did not quite turn out as [high_king.GetTitledFirstName] had hoped, though the rebels too were unable to press their own advantages and force their own terms. Rather than continue to wear each other down and leave Britannia even more vulnerable to its enemies both sides have agreed to a truce - [high_king.GetTitledFirstName] will drop [high_king.GetHerHis] demands and allow the kings to keep their privileges, for now, and exchange the rebels will revoke the renunciation of their recognition [high_king.GetHerHis] Kingship. But ultimately this has not really resolved anything, and [high_king.GetTitledFirstName] seems determined to try to again once the circumstances grow more favourable."
 BTWK_britannia_high_king.0188.desc.opponent: "Our armies held strong against the attacks of [high_king.GetTitledFirstName], but our attempts to force [high_king.GetHerHim] to force terms were also on the whole unsuccessful. Rather than continue to wear each other down and leave Britannia even more vulnerable to its enemies we have therefore now agreed to a truce - [high_king.GetTitledFirstName] has agreed to respect our privileges and will drop [high_king.GetHerHis] radical demands, and exchange we have agreed to pay homage and revoke our renunciation of [high_king.GetHerHis] Kingship. But we leave this war clear-eyed - [high_king.GetTitledFirstName] has not truly given up [high_king.GetHerHis] intentions of revoking our royal privileges and forcing [high_king.GetHerHis] dreams of Empire on us, and probably never will as long as [high_king.GetSheHe] sits on the throne."
 BTWK_britannia_high_king.0188.desc.other: "The war between [high_king.GetName] and the alliance of rebellious subject kings lead by [HK_britannia_opponent_leader.GetName] has ended in a stalemate, with neither side able to gain a decisive advantage over the other to fully enforce their terms. Recognizing that the continuation of the war would leave them both increasingly vulnerable to their enemies, both sides have agreed to drop their most significant demands in return for peace. But the question of Imperial Restoration remains tense and unresolved, and both sides seem to recognize that this is more of a temporary truce until [high_king.GetTitledFirstName] feels ready to press the issue again."
 BTWK_britannia_high_king.0188.a.high_king: "One way or another, the Empire will be restored - this is just a delay."
 BTWK_britannia_high_king.0188.a.supporter: "Merely a delay before a new Imperator is crowned!"
 BTWK_britannia_high_king.0188.a.opponent: "[high_king.GetSheHe] will surely soon try again - we must be ready."
 BTWK_britannia_high_king.0188.a.briton_roman: "This hasn't resolved anything."
 BTWK_britannia_high_king.0188.a.anglo_saxon: "So another war in five years, then?"
 BTWK_britannia_high_king.0188.a.other: "This is interesting news..."
 BTWK_britannia_high_king.0188.tt.a: "You will not be able to try to pass a reform again for #high 5#! years"
 BTWK_britannia_high_king.0188.tt: "[high_king.GetTitledFirstName] will not be able to try to pass a reform again for #high 5#! years"
 BTWK_britannia_high_king.0189.t: "Victory of the Kings"
 BTWK_britannia_high_king.0189.desc.high_king: "I have lost. The rebellious subject kings led by [HK_britannia_opponent_leader.GetName] were more than a match for our forces, and I have had no choice but to accept their terms - renounce all ambitions of reform, affirm the involability of their royal privileges, and abdicate the throne entirely, vows and guarantees that my heir [high_king_player_heir.GetFirstName] has also agreed to affirm in order to retain their loyalty. The dream of Empire is certainly not dead - one day, in more favourable circumstances, we will try again - but even the optimistic of our supporters admit that this has been a severe setback for the cause of Imperial Restoration."
 BTWK_britannia_high_king.0189.desc.supporter: "We have lost. The rebellious subject kings led by [HK_britannia_opponent_leader.GetName] were more than a match for our forces, and [high_king.GetTitledFirstName] has had no choice but to accept their terms - renounce all ambitions of reform, affirm the involability of their royal privileges, and abdicate the throne entirely, vows and guarantees that [high_king.GetHerHis] heir [high_king_player_heir.GetFirstName] has also agreed to affirm in order to retain their loyalty and in order to retain their loyalty. The dream of Empire is certainly not dead - one day, in more favourable circumstances, perhaps we will try again under High [high_king_player_heir.Custom('GetQueenKing')] [high_king_player_heir.GetFirstName] - but even the optimistic of us admit that this has been a severe setback for the cause of Imperial Restoration."
 BTWK_britannia_high_king.0189.desc.opponent: "High [high_king.Custom('GetQueenKing')] [high_king.GetFirstNamePossessive] hubris proved to be [high_king.GetHerHis] undoing. Underestimating our strength and dedication, [high_king.GetHerHis] armies proved to be no match for our forces, and [high_king.GetSheHe] has had to choice but to accept all of our demands - renounce all ambitions of reform, affirm the involability of our royal privileges, and abdicate the throne entirely. Even from [high_king.GetHerHis] heir [high_king_player_heir.GetFirstName], the new High [high_king_player_heir.Custom('GetQueenKing')], we have been able to extract concessions - fearful of losing our loyalty to High Kingship entirely, [high_king_player_heir.GetSheHe] has agreed to affirm these vows and guarantee our unalienabled rights.\n\nPerhaps one day another ambitious and arrogant High King will make an attempt to violate our rights and a misguided attempt to restore the Empire - but just as we defeated tyranny once, we will certainly do so again."
 BTWK_britannia_high_king.0189.desc.other: "High [high_king.Custom('GetQueenKing')] [high_king.GetFirstNamePossessive] attempts to increase [high_king.GetHerHis] authority over [high_king.GetHerHis] subject kings has ended in defeat. Decisively routed on the battlefield by [HK_britannia_opponent_leader.GetName] and [HK_britannia_opponent_leader.GetHerHis] coalition of opposing subject kings, High [high_king.Custom('GetQueenKing')] [high_king.GetFirstName] has been forced to accede to all of their demands - renounce all ambitions of reform, affirm the involability of their royal privileges, and abdicate the throne entirely, vows that have been affirmed by [high_king.GetHerHis] heir [high_king_player_heir.GetFirstName]. Perhaps one day another High King will make another attempt at Imperial Restoration, but for now the situation seems clear - the subject kings will remain autonomous and sovereign, and the dream of Empire will remain just that."
 BTWK_britannia_high_king.0189.a.high_king: "I may not live to see it, but one day, the Empire #italic will#! return."
 BTWK_britannia_high_king.0189.a.supporter: "But one day, the glory of Rome will surely shine over Britannia again."
 BTWK_britannia_high_king.0189.a.opponent: "Tyranny will never stand as long as I breathe."
 BTWK_britannia_high_king.0189.a.briton_roman: "What does this mean for Britannia?"
 BTWK_britannia_high_king.0189.a.anglo_saxon: "No empire this year, then."
 BTWK_britannia_high_king.0189.a.other: "This is interesting news..."
 BTWK_britannia_high_king.0189.tt: "High [Select_CString(high_king.IsFemale, 'Queen', 'King')] [high_king.GetFirstName] has lost all [britannia_authority|E] and has been forced to abdicate."
 