l_english:

 # Claiming the High Kingship
 BTWK_britannia_high_king.0001.t: "Assessing Support"
 BTWK_britannia_high_king.0001.desc: "A claim to the High Kingship means nothing without the support - or at least acquiescence - of all the other British kings. Emissaries have been sent to the other kings and I am sure of a positive response from my friends and allies, but it may be harder to convince my rivals and some of the stronger kings that this is the proper way forward. If they do not agree peacefully, they may need some convincing at the point of a sword..."
 BTWK_britannia_high_king.0001.a: "One way or another, they will recognize my claim."
 BTWK_britannia_high_king.0001.a.tt.1: "The other kings' responses to your claim to the High Kingship are expected in a few days."
 BTWK_britannia_high_king.0001.a.tt.2: "You are expected to have #P [THIS.ScriptValue('BTWK_britannia_high_king_num_potential_supporters')]#! $BTWK_britannia_high_king.0001.a.supporters$ and #N [THIS.ScriptValue('BTWK_britannia_high_king_num_potential_opponents')]#! $BTWK_britannia_high_king.0001.a.opponents$, with the other #high [THIS.ScriptValue('BTWK_britannia_high_king_num_potential_neutrals')]#! $BTWK_britannia_high_king.0001.a.neutral_kings$ expected to not get involved."
 BTWK_britannia_high_king.0001.a.supporters: "[SelectLocalization(EqualTo_CFixedPoint(THIS.ScriptValue('BTWK_britannia_high_king_num_potential_supporters'), '(CFixedPoint)1'), 'supporter', 'supporters')]"
 BTWK_britannia_high_king.0001.a.opponents: "[SelectLocalization(EqualTo_CFixedPoint(THIS.ScriptValue('BTWK_britannia_high_king_num_potential_opponents'), '(CFixedPoint)1'), 'opponent', 'opponents')]"
 BTWK_britannia_high_king.0001.a.neutral_kings: "[SelectLocalization(EqualTo_CFixedPoint(THIS.ScriptValue('BTWK_britannia_high_king_num_potential_neutrals'), '(CFixedPoint)1'), 'king', 'kings')]"
 BTWK_britannia_high_king.0002.t: "A New High King?"
 BTWK_britannia_high_king.0002.desc: "I have received word that [claimant.GetName] has proclaimed [claimant.GetHerselfHimself] worthy of the title of High King of the Britons. A High King with all the armies of Britannia under [claimant.GetHerHis] command would be a formidable force indeed, but [claimant.GetHerHis] legitimacy depends on the consensus of the other Kings, and if [claimant.GetSheHe] is to unite the Britons under a single banner [claimant.GetSheHe] will first have to gain their approval - whether by diplomacy or force."
 BTWK_britannia_high_king.0002.a.other_king: "[claimant.GetSheHe] will need my consent to move forwards..."
 BTWK_britannia_high_king.0002.a.briton_roman: "Will [claimant.GetSheHe] finally bring unity to the land?"
 BTWK_britannia_high_king.0002.a.anglo_saxon: "United or not, we will still crush them..."
 BTWK_britannia_high_king.0002.a.other: "This is interesting news..."
 BTWK_britannia_high_king.0002.a.tt: "[claimant.GetName] has officially laid claim to the [high_kingship|E] and is now seeking the support of the other British kings. Any kings that oppose [claimant.GetHerHis] claim will attempt to challenge [claimant.GetHerHim] on the battlefield, while any supporters will join [claimant.GetHerHis] side as allies. If [claimant.GetName] is successful at defeating [claimant.GetHerHis] opponents, [claimant.GetSheHe] will be recognized as [high_king|E] with all supporters and defeated opponents becoming [britannia_subject_kings|E]."
 BTWK_britannia_high_king.0002.a.tt.other_king: "An official emissary from [claimant.GetName] is expected in the next few days. We will soon have to decide our own stance on [claimant.GetHerHis] claim to the [high_kingship|E], and whether it is worth going to war over."
 BTWK_britannia_high_king.0004.opening: "[claimant.Custom2('GreetingToForeignRulerPositive', ROOT.Char)]"
 BTWK_britannia_high_king.0004.desc: "I have claimed the title of High King with the aim of uniting the Britons against our many enemies. If you support my claim to the throne and recognize me as the rightful High King of Britannia, I vow that I will protect you and your kingdom against any that would seek to threaten it."
 BTWK_britannia_high_king.0004.a: "You are a great leader. I will support your cause."
 BTWK_britannia_high_king.0004.a.tt.common: "You declare that you will #P support#! [claimant.GetName]'s claim to the [high_kingship|E]. If other kings oppose [claimant.GetHerHis] claim to the throne, you will join the war as [claimant.GetTitledFirstName]'s ally alongside any other supporters,"
 BTWK_britannia_high_king.0004.a.tt: "$BTWK_britannia_high_king.0004.a.tt.common$ and you will swear fealty to [claimant.GetTitledFirstName] as a [britannia_subject_king|E] if [claimant.GetSheHe] is successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0004.a.tt.briton_tributary: "$BTWK_britannia_high_king.0004.a.tt.common$ but as you are already a [tributary|E] you will only swear fealty to [claimant.GetTitledFirstName] as a [britannia_subject_king|E] if your [suzerain|E] swears or is forced to swear fealty to [claimant.GetHerHim] when [claimant.GetSheHe] is successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0004.a.tt.other_tributary: "$BTWK_britannia_high_king.0004.a.tt.common$ but as you are already a [tributary|E] you will not swear fealty to [claimant.GetTitledFirstName] as a [britannia_subject_king|E] if [claimant.GetSheHe] is successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0004.a.tt.suzerain_warning: "#warning Your [duke|E] tier or higher [GetCulturePillar('heritage_brythonic').GetName] and [GetCulturePillar('heritage_latin').GetName] [heritage|E] tributaries will also become [britannia_subject_kings|E] of [claimant.GetName] if we submit.#!"
 BTWK_britannia_high_king.0004.b: "I will bow to no King. Not even to you."
 BTWK_britannia_high_king.0004.b.tt.common: "You declare that you will #N oppose#! [claimant.GetName]'s claim to the [high_kingship|E]. Unless [claimant.GetSheHe] voluntarily backs down, you will go to war against [claimant.GetTitledFirstName] alongside any other opponents to try to force [claimant.GetHerHim] to give up [claimant.GetHerHis] claim. If you are defeated, you will be forced to recognized [claimant.GetTitledFirstName] as [high_king|E]"
 BTWK_britannia_high_king.0004.b.tt: "$BTWK_britannia_high_king.0004.b.tt.common$ and swear fealty to [claimant.GetHerHim] as a [britannia_subject_king|E]."
 BTWK_britannia_high_king.0004.b.tt.briton_tributary: "$BTWK_britannia_high_king.0004.b.tt.common$ but as you are already a [tributary|E] you will only become a [britannia_subject_king|E] if your [suzerain|E] swears or is forced to swear fealty to [claimant.GetHerHim]."
 BTWK_britannia_high_king.0004.b.tt.other_tributary: "$BTWK_britannia_high_king.0004.b.tt.common$ but as you are already a [tributary|E] you will not be forced to swear fealty to [claimant.GetHerHim] as a [britannia_subject_king|E]."
 BTWK_britannia_high_king.0004.b.tt.suzerain_warning: "#warning Your [duke|E] tier or higher [GetCulturePillar('heritage_brythonic').GetName] and [GetCulturePillar('heritage_latin').GetName] [heritage|E] tributaries will also become [britannia_subject_kings|E] of [claimant.GetName] if we are forced to submit.#!"
 BTWK_britannia_high_king.0004.c: "I will recognize your claim, but I will not be your vassal."
 BTWK_britannia_high_king.0004.c.tt.common: "You declare that you will #high nominally support#! [claimant.GetName]'s claim to the [high_kingship|E], but will otherwise not get involved. You will not join in any wars between [claimant.GetTitledFirstName] and any opponents of [claimant.GetHerHis] claim,"
 BTWK_britannia_high_king.0004.c.tt: "$BTWK_britannia_high_king.0004.c.tt.common$ and you will not swear fealty to [claimant.GetTitledFirstName] if [claimant.GetSheHe] is successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0004.c.tt.claimant_tributary: "$BTWK_britannia_high_king.0004.c.tt.common$ but as you are already a [tributary|E] of [claimant.GetTitledFirstName] you will become a [britannia_subject_king|E] if [claimant.GetSheHe] is successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0004.c.tt.briton_tributary: "$BTWK_britannia_high_king.0004.c.tt.common$ but as you are a [tributary|E] you will still become a [britannia_subject_king|E] of [claimant.GetTitledFirstName] if [claimant.GetSheHe] is successfully recognized as [high_king|E] and your [suzerain|E] swears or is forced to swear fealty to [claimant.GetHerHim]."
 BTWK_britannia_high_king.0004.c.tt.other_tributary: "$BTWK_britannia_high_king.0004.c.tt$"
 BTWK_britannia_high_king.0005.opening.supporter: "[claimant.Custom2('GreetingToForeignRulerPositive', ROOT.Char)]"
 BTWK_britannia_high_king.0005.opening.opponent: "[claimant.Custom2('GreetingToForeignRuler', ROOT.Char)]"
 BTWK_britannia_high_king.0005.opening.neutral: "[claimant.Custom2('GreetingToForeignRuler', ROOT.Char)]"
 BTWK_britannia_high_king.0005.desc.tributary_supporter: "I have taken your claim into consideration and decided to grant you my support and recognition as High King of Britannia. I am ready to fight by your side to ensure that your claim comes to fruition. May your rule be a long and prosperous one."
 BTWK_britannia_high_king.0005.desc.supporter: "I have taken your claim into consideration and decided to grant you my support and recognition as High King of Britannia. I am ready to swear fealty to you and become your loyal vassal. May your rule be a long and prosperous one."
 BTWK_britannia_high_king.0005.desc.opponent: "I have taken your request into consideration, and I respectfully inform you that I will not support your claim to the High Kingdom of Britannia.\nYou lack the skills and wisdom necessary to hold such a prestigious throne. Please renounce all your claims."
 BTWK_britannia_high_king.0005.desc.tributary_neutral: "I have considered your claim and decided to grant you my recognition as High King. However, I am not in a position to offer you my full support. While I wish you luck, the [other_king.GetPrimaryTitle.GetNameNoTooltip] will not be further involved at this time."
 BTWK_britannia_high_king.0005.desc.neutral: "I have considered your claim and decided to grant you my recognition as High King. However, I refuse to swear fealty to you and to become de facto one of your vassal kings. The [other_king.GetPrimaryTitle.GetNameNoTooltip] will retain its independence."
 BTWK_britannia_high_king.0005.a: "Very good. You have made the right choice."
 BTWK_britannia_high_king.0005.a.tt.common: "[other_king.GetName] has declared [other_king.GetHerHis] #P support#! for your claim to the [high_kingship|E]."
 BTWK_britannia_high_king.0005.a.tt: "$BTWK_britannia_high_king.0005.a.tt.common$ [other_king.GetSheHe|U] will join your war against the opponents of your claim and will swear fealty as a [britannia_subject_king|E] if you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.a.tt.briton_tributary: "$BTWK_britannia_high_king.0005.a.tt.common$ [other_king.GetSheHe|U] will join your war against the opponents of your claim but as [other_king.GetSheHe] is already a [tributary|E] [other_king.GetSheHe] will only become your [britannia_subject_king|E] if [other_king.GetHerHis] [suzerain|E] swears or is forced to swear fealty to you once you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.a.tt.other_tributary: "$BTWK_britannia_high_king.0005.a.tt.common$ [other_king.GetSheHe|U] will join your war against the opponents of your claim, but as [other_king.GetSheHe] is already a [tributary|E] [other_king.GetSheHe] will not swear fealty as a [britannia_subject_king|E] if you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.b: "Perhaps some steel will convince you..."
 BTWK_britannia_high_king.0005.b.tt.common: "[other_king.GetName] has declared [other_king.GetHerHis] #N opposition#! to your claim to the [high_kingship|E], and will join other opponents in going to war against you to force you to renounce your claim."
 BTWK_britannia_high_king.0005.b.tt: "$BTWK_britannia_high_king.0005.b.tt.common$ If you defeat [other_king.GetHerHim] on the battlefield, [other_king.GetName] will be forced to recognized you as [high_king|E] and swear fealty as a [britannia_subject_king|E]."
 BTWK_britannia_high_king.0005.b.tt.briton_tributary: "$BTWK_britannia_high_king.0005.b.tt.common$ If you defeat [other_king.GetHerHim] on the battlefield, [other_king.GetName] will be forced to recognized you as [high_king|E] but as [other_king.GetSheHe] is already a [tributary|E] [other_king.GetSheHe] will only become your [britannia_subject_king|E] if [other_king.GetHerHis] [suzerain|E] swears or is forced to swear fealty to you."
 BTWK_britannia_high_king.0005.b.tt.other_tributary: "$BTWK_britannia_high_king.0005.b.tt.common$ If you defeat [other_king.GetHerHim] on the battlefield, [other_king.GetName] will be forced to recognized you as [high_king|E] but will not swear fealty as a [britannia_subject_king|E] as [other_king.GetSheHe] is already [tributary|E] to another ruler."
 BTWK_britannia_high_king.0005.c: "Good enough. Formal recognition is all I really need."
 BTWK_britannia_high_king.0005.c.tt.common: "[other_king.GetName] has declared [other_king.GetHerHis] #high nominal support#! for your claim to the [high_kingship|E], but will otherwise not get involved."
 BTWK_britannia_high_king.0005.c.tt: "$BTWK_britannia_high_king.0005.c.tt.common$ [other_king.GetSheHe|U] will remain independent and not become your [britannia_subject_king|E] if you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.c.tt.claimant_tributary: "$BTWK_britannia_high_king.0005.c.tt.common$ As [other_king.GetSheHe] is already your tributary, will [other_king.GetName] will still become your [britannia_subject_king|E] if you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.c.tt.briton_tributary: "$BTWK_britannia_high_king.0005.c.tt.common$ As [other_king.GetSheHe] is already a [tributary|E], [other_king.GetName] may still become your [britannia_subject_king|E] if [other_king.GetHerHis] [suzerain|E] swears or is forced to swear fealty to you once you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.c.tt.other_tributary: "$BTWK_britannia_high_king.0005.c.tt.common$ [other_king.GetSheHe|U] will not become your [britannia_subject_king|E] if you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.c.tt.2: "#V [Subtract_CFixedPoint(GetPlayer.MakeScope.ScriptValue('BTWK_britannia_high_king_num_potential_neutrals'), '(CFixedPoint)1')]#! other kings have also chosen this stance."
 BTWK_britannia_high_king.0006.t: "At an Impasse"
 BTWK_britannia_high_king.0006.t.no_opponents: "A Triumph of Diplomacy"
 BTWK_britannia_high_king.0006.t.second_try: "Continuing the War"
 BTWK_britannia_high_king.0006.t.second_try_no_opponents: "An Unexpected Victory"
 BTWK_britannia_high_king.0006.desc: "Not all of the other kings have accepted my claim to the High Kingship. An alliance of other princes opposed to my claim has gathered under the leadership of [HK_britannia_opponent_leader.GetName] and has declared that nothing short of war will make them recognize my 'pretentions' to the High Kingship. Such a challenge cannot possibly go unanswered, or the loss of face will be so great that I may as well give up on my claim entirely."
 BTWK_britannia_high_king.0006.desc.second_try: "While ongoing developments have brought the war to a pause, there are still several kings in the opposing alliance who continue to oppose my claim to the High Kingship, gathering now under the leadership of [HK_britannia_opponent_leader.GetName]. They remain obstinate and nothing short of a contiuation of the campaign will make them submit - though this could also be a good opportunity for a truce while I attend to other affairs."
 BTWK_britannia_high_king.0006.desc.no_opponents: "Claims to the high kingship are usually accompanied by an outbreak of war to settle old scores or knock a rival off their perch, but it does not always have to be so violent. Through deft use of diplomacy and intimidation, I have managed to convince all the other kings to support - or at least, not oppose - my acclamation to the High Kingship, which is now all but assured. Sometimes the quill really is mightier than the sword."
 BTWK_britannia_high_king.0006.desc.second_try_no_opponents: "In a surprising but not unwelcome development, it seems there are no longer any other kings opposing my claim to the High Kingship. It may not exactly have been my sword that made them all acquiesce, but my acclamation to the High Kingship is in any case now all but assured."
 BTWK_britannia_high_king.0006.a: "Then war it is!"
 BTWK_britannia_high_king.0006.a.tt.1: "All #P supporters#! of your claim will join the war on your side, and all #N opponents#! on the opposing side."
 BTWK_britannia_high_king.0006.a.tt.2: "If you are victorious in the war, you will be recognized as [high_king_britannia|E] and gain all supporters and defeated opponents as [britannia_subject_kings|E]. Kings that did not directly oppose your claim but are called into the war on the opposing side will also be treated as defeated opponents and forced to swear fealty if eligible."
 BTWK_britannia_high_king.0006.a.tt.3: "If you are defeated, you will lose #N 1#! [prestige_level|E], be forced to renounce any right to the [high_kingship|E], and will not be able to make another attempt to claim the title for #N 15#! years."
 BTWK_britannia_high_king.0006.b: "I will renounce my claim. For now."
 BTWK_britannia_high_king_abandon_claim_claimant.tt: "You abandon your claim to the [high_kingship|E], and will not be able to make another attempt to claim the title for #N 5#! years."
 BTWK_britannia_high_king.0006.c: "Let us save our swords for the Saxons."
 BTWK_britannia_high_king.0006.c.tt: "Without any opposition to your claim, you can now be proclaimed [high_king|E]!"
 BTWK_britannia_high_king.0007.t.war: "War for the High Kingship"
 BTWK_britannia_high_king.0007.t.backed_down: "Not Quite Worthy"
 BTWK_britannia_high_king.0007.desc.war: "[claimant.GetName] has not taken lightly to the refusals of some of the other kings to accept [claimant.GetHerHis] claim. Gathering together [claimant.GetHerHis] supporters, [claimant.GetTitledFirstName] now leads an alliance prepared to enforce [claimant.GetHerHis] claim by force while [claimant.GetHerHis] opponents have banded together around the leadership of [HK_britannia_opponent_leader.GetName].\n\nWith neither side willing to back down, [claimant.GetTitledFirstName] has declared war on all of the opposing kings, proclaiming that this dispute will be settled on the field of battle."
 BTWK_britannia_high_king.0007.desc.war_second_try: "While ongoing developments have brought [claimant.GetNamePossessive] war for the high kingship to a pause, many opponents of [claimant.GetHerHis] claim remain. Gathering now around the leadership of [HK_britannia_opponent_leader.GetName], they continue to rebuff [claimant.GetHerHis] demands for recognition, and now [claimant.GetTitledFirstName] has declared that [claimant.GetHerHis] campaign to secure the submission of all the other kings will continue unabated."
 BTWK_britannia_high_king.0007.desc.backed_down: "It seems that [claimant.GetName] did not have the support [claimant.GetSheHe] thought [claimant.GetSheHe] had when claiming the High Kinship. Unwilling to challenge the alliance of opposing kings on the field of battle, [claimant.GetTitledFirstName] has quietly dropped [claimant.GetHerHis] claim for the High Kingship for the time being."
 BTWK_britannia_high_king.0007.desc.backed_down_second_try: "Ongoing developments have brought [claimant.GetNamePossessive] war for the high kingship to a pause, allowing [claimant.GetHerHim] to reconsider [claimant.GetHerHis] current position. With [claimant.GetHerHis] opponents now gathered around the leadership of [HK_britannia_opponent_leader.GetName], [claimant.GetTitledFirstName] has decided to agree on a truce rather than continue [claimant.GetHerHis] campaign and has quietly dropped [claimant.GetHerHis] claim to the High Kingship for the time being."
 BTWK_britannia_high_king.0007.a.supporter: "And I will fight by [claimant.GetHerHis] side!"
 BTWK_britannia_high_king.0007.a.opponent: "Then let [claimant.GetHerHim] come!"
 BTWK_britannia_high_king.0007.a.briton_roman: "What does this mean for Britannia?"
 BTWK_britannia_high_king.0007.a.anglo_saxon: "The Britons never pass up an opportunity to fight."
 BTWK_britannia_high_king.0007.a.other: "This is interesting news..."
 BTWK_britannia_high_king.0007.a.tt.1: "[claimant.GetName] and [claimant.GetHerHis] supporters have declared war on the alliance of opposing kings under [HK_britannia_opponent_leader.GetUINamePossessive] leadership."
 BTWK_britannia_high_king.0007.a.tt.1.a: "As one of [claimant.GetNamePossessive] supporters, you have joined the war against [HK_britannia_opponent_leader.GetUIName]!"
 BTWK_britannia_high_king.0007.a.tt.2: "If victorious, [claimant.GetName] will be proclaimed [high_king_britannia|E], with all supporters and defeated opponents becoming [britannia_subject_kings|E]. If defeated, [claimant.GetTitledFirstName] will be renounce [claimant.GetHerHis] his claims, and will not be able make another attempt to claim the title for #N 15#! years."
 BTWK_britannia_high_king.0007.b.supporter: "A true shame..."
 BTWK_britannia_high_king.0007.b.opponent: "[claimant.GetSheHe] has come to [claimant.GetHerHis] senses, then."
 BTWK_britannia_high_king.0007.b.briton_roman: "Only the worthy can become High King."
 BTWK_britannia_high_king.0007.b.anglo_saxon: "And divided they remain."
 BTWK_britannia_high_king.0007.b.other: "This is interesting news..."
 BTWK_britannia_high_king_abandon_claim.tt: "[claimant.GetName] has abandoned [claimant.GetHerHis] claim to the [high_kingship|E], and will not be able to make another attempt to claim the title for #N 5#! years."
 BTWK_britannia_high_king.0009.t: "High Kingdom of Britannia"
 BTWK_britannia_high_king.0009.desc: "The kings of Britain have declared their unanimous support for my claim to the [GetTitleByKey('e_britannia').GetName], and I have now been proclaimed High King in the Great Hall of [new_high_king_capital_barony.GetNameNoTierNoTooltip].\n\nSome of the other kings have formally sworn fealty and will now rule their homelands as subject kings under my rule. Others, despite their support for my acclamation, have not agreed to become de facto subjects of another king and will maintain their independence - for now.\n\nAs High King, it is my duty and obligation to lead Britannia against its enemies, whether they be Saxon, Irish, or even Briton. Only strong leadership will be able to bring Britannia's foes to heel."
 BTWK_britannia_high_king.0009.a: "And defend Britannia I shall!"
 BTWK_britannia_high_king.0009.a.tt.1: "As [high_king|E], you will passively accumulate [britannia_authority|E] depending on how much of Britannia is under the control of you and your [britannia_subject_kings|E]. Once you have enough [britannia_authority|E], you will be able to pass [britannia_reforms|E] to solidify your hold on the [high_kingship|E], strengthen your control over your [britannia_subject_kings|E], and eventually move towards uniting the petty kingdoms of Britannia back into a single realm."
 BTWK_britannia_high_king.0009.a.tt.2: "Until the #V $BTWK_HK_britannia_formalize_high_kingship$#! [britannia_reform|E] is passed, a [high_king|E] only holds [claimant.GetHerHis] position in a personal capacity, and the title will not be inherited on death or abdication. In addition, the other kings will only continue to support your rule as long as they believe you can and will continue to defend their kingdoms. If you become [GetTrait('incapable').GetName(GetNullCharacter)], adopt a non-$britannic_culture$ [culture|E], or let your [martial|E], [diplomacy|E], [realm_size|E], or [prestige_level|E] decline too far, you will be considered #N Unfit to Rule#! and forced to abdicate the [high_kingship|E]."
 BTWK_britannia_high_king.0009.a.tt.3: "In addition, as a largely informal title, the [high_king|E] cannot have any [king|E]-tier vassals until the #V $BTWK_HK_britannia_empower_the_high_council$#! [britannia_reform|E] has been passed. Until then, any [king|E]-tier vassals will be converted into [britannia_subject_kingdoms|E]."
 BTWK_britannia_high_king.0009.a.tt.4: "You can force other independent rulers of a $celtic_heritage_group$ or $romanized_culture$ [culture|E] to become [britannia_subject_kings|E] using the [GetCasusBelliType('make_tributary_cb').GetName] [casus_belli|E]."
 BTWK_britannia_high_king.0010.t: "High Kingdom of Britannia"
 BTWK_britannia_high_king.0010.desc: "The kings of Britain have declared their unanimous support for [Select_CString(new_high_king.IsFemale, 'Queen', 'King')] [new_high_king.GetFirstName] of [new_high_king_primary_title.GetNameNoTier]'s claim to the [GetTitleByKey('e_britannia').GetName], and have now proclaimed [new_high_king.GetHerHim] High King in the Great Hall of [new_high_king_capital_barony.GetNameNoTierNoTooltip]. Some of the other kings have formally sworn fealty and will now rule as subject kings under [new_high_king.GetHerHim]. Others, despite their support for [new_high_king.GetHerHis] acclamation, have not agreed to become de facto subjects of another king and will maintain their independence.\n\nAs High King, [new_high_king.GetFirstName] has sworn to lead and defend Britannia against its enemies, whether they be Saxon, Irish, or even Briton. All across Britannia, kings are giving pause to consider the new High King, wondering how this will change the balance of power on the isle."
 BTWK_britannia_high_king.0010.a.was_supporter: "Hail to the High King!"
 BTWK_britannia_high_king.0010.a.was_opponent: "Let us hope our fears were not founded."
 BTWK_britannia_high_king.0010.a.briton_roman: "Will [new_high_king.GetSheHe] live up to [new_high_king.GetHerHis] promise?"
 BTWK_britannia_high_king.0010.a.anglo_saxon: "Perhaps [new_high_king.GetSheHe] may prove to be a formidable opponent."
 BTWK_britannia_high_king.0010.a.other: "This is interesting news..."
 BTWK_britannia_high_king.0010.a.tt.1: "All supporters and defeated opponents of [new_high_king.GetNamePossessive] claim to the [high_kingship|E] have become [new_high_king.GetHerHis] [britannia_subject_kings|E]."
 BTWK_britannia_high_king.0010.a.tt.2: "While a powerful title, the position of [high_king|E] is ultimately a personal honour and will not be inherited upon the death or abdication of [new_high_king.GetName] - unless [new_high_king.GetSheHe] manages to accumulate enough [britannia_authority|E] to pass [britannia_reforms|E]. In addition, [new_high_king.GetTitledFirstName] will also be forced to abdicate the [high_kingship|E] if [new_high_king.GetSheHe] ever comes to be considered #N Unfit to Rule#!."
 BTWK_britannia_high_king.0011.t: "Not Quite Worthy"
 BTWK_britannia_high_king.0011.desc.claimant: "It seems that my grand ambition of becoming High King of all the Britons is not quite yet to be. What I had hoped would be a quick and decisive campaign to cow my opponents did not quite turn out as I had hoped, but at least I was not humiliated and forced to renounce my claim to the High Kingship entirely. I will just have to bide my time and make sure I am better prepared for the next round..."
 BTWK_britannia_high_king.0011.desc.supporter: "It seems that [claimant.GetNamePossessive] grand ambition of becoming High King of all the Britons is not quite yet to be. What we had hoped would be a quick and decisive campaign to cow our opponents did not quite turn out as we had hoped, and now both sides have agreed to a truce to avoid wasting more men on the interminable stalemate. [claimant.GetTitledFirstName], however, has not fully renounced [claimant.GetHerHis] claim to the High Kingship, and hopefully I will have the opportunity to support [claimant.GetHerHis] claim again under more favourable conditions."
 BTWK_britannia_high_king.0011.desc.opponent: "The upstart [claimant.GetName] has been stopped in [claimant.GetHerHis] tracks, but we have been unable to force the decisive victories we would need to force [claimant.GetHerHim] to renounce [claimant.GetHerHis] claim to the High Kingship. The truce we have agreed to may have only bought a few years of peace before [claimant.GetTitledFirstName] tries to subjugate us once again, but perhaps that will be enough to gather our strength and put a stop to [claimant.GetHerHis] ambitions once and for all."
 BTWK_britannia_high_king.0011.desc.other: "The war between [claimant.GetName] and the alliance of opposing kings lead by [HK_britannia_opponent_leader.GetName] has ended in a stalemate, with neither side able to gain a decisive advantage over the other. While [claimant.GetTitledFirstName] has not renounced [claimant.GetHerHis] ambition to be proclaimed High King of Britannia, [claimant.GetSheHe] has also agreed to put aside the question of the opposing kings' assent for the time being, leaving the question of [claimant.GetHerHis] claim unresolved. For now, however, it seems that the Kings of the Britons will remain independent and divided."
 BTWK_britannia_high_king.0011.a.claimant: "I will not make the same mistakes again."
 BTWK_britannia_high_king.0011.a.supporter: "Deferred but still alive."
 BTWK_britannia_high_king.0011.a.opponent: "We will be ready."
 BTWK_britannia_high_king.0011.a.briton_roman: "Just kicking the jar down the road..."
 BTWK_britannia_high_king.0011.a.anglo_saxon: "So they'll be fighting each other again soon?"
 BTWK_britannia_high_king.0011.a.other: "This is interesting news..."
 BTWK_britannia_high_king.0012.t: "An Unworthy [claimant.GetTitleTierName]"
 BTWK_britannia_high_king.0012.desc.claimant: "It seems that my grand ambition of becoming High King of all the Britons was not to be. Humiliated and defeated on the battlefield, any credibility I may have had in claiming supremacy over the other kings now lies in pieces, and as the price for my freedom I have been forced to take a vow never to try to claim the High Kingship ever again. Eventually I may be able to weasel out of this vow, but this indignity will follow me for a long time..."
 BTWK_britannia_high_king.0012.desc.supporter: "It seems that [claimant.GetNamePossessive] grand ambition of becoming High King of all the Britons was not to be. Despite our best efforts, our alliance was throughly defeated on the battlefield, and any credibility [claimant.GetSheHe] may have had in claiming supremacy over the other kings now lies in pieces. As the price for [claimant.GetHerHis] freedom, [claimant.GetTitledFirstName] has been forced to take a vow never to try to claim the High Kingship ever again, and while with enough support [claimant.GetSheHe] may one day be able to move past all of this, the humliation will surely follow [claimant.GetHerHim] for a long time."
 BTWK_britannia_high_king.0012.desc.opponent: "The upstart [claimant.GetName] has been defeated, [claimant.GetHerHis] dream of becoming High King lying in tatters before us. As the price for [claimant.GetHerHis] freedom, [claimant.GetTitledFirstName] has humbly vowed to forever give up [claimant.GetHerHis] claim to the High Kingship and never again challenge my independence. Nobody is foolish enough to believe that this vow will truly bind [claimant.GetHerHim] forever, but this humiliation will surely not be soon forgotten."
 BTWK_britannia_high_king.0012.desc.other: "[claimant.GetName] has been defeated on the battlefield by [HK_britannia_opponent_leader.GetName] and [HK_britannia_opponent_leader.GetHerHis] coalition of opposing kings, forcing [claimant.GetTitledFirstName] to renounce [claimant.GetHerHis] ambition to be proclaimed High King of Britannia. With [claimant.GetTitledFirstNamePossessive] dreams of supremacy now dashed at the swords of [claimant.GetHerHis] opponents, it seems that the Kings of the Britons will remain independent and divided, for now."
 BTWK_britannia_high_king.0012.a.claimant: "I have failed..."
 BTWK_britannia_high_king.0012.a.supporter: "We have failed..."
 BTWK_britannia_high_king.0012.a.opponent: "[claimant.GetSheHe|U] is not worthy."
 BTWK_britannia_high_king.0012.a.briton_roman: "[ROOT.Char.GetFaith.HighGodName] did not deem [claimant.GetHerHim] worthy."
 BTWK_britannia_high_king.0012.a.briton_roman_pagan: "The Gods did not deem [claimant.GetHerHim] worthy."
 BTWK_britannia_high_king.0012.a.anglo_saxon: "[claimant.GetSheHe] would not have been a real threat anyways."
 BTWK_britannia_high_king.0012.a.other: "This is interesting news..."
 BTWK_britannia_high_king_renounce_claim_claimant.tt: "You have been forced to renounce your claim to the [high_kingship|E], and will not be able to make another attempt to claim the title for #N 15#! years."
 BTWK_britannia_high_king_renounce_claim.tt: "[claimant.GetName] been forced to renounce [claimant.GetHerHis] claim to the [high_kingship|E], and will not be able to make another attempt to claim the title for #N 15#! years."
 BTWK_britannia_high_king.0013.t: "A Dream Cut Short"
 BTWK_britannia_high_king.0013.desc.death: "[claimant.GetName] is dead! [claimant.GetHerHis|U] dream of claiming the High Kingship has been cut short, now never to be fulfilled. As [claimant.GetTitledFirstNamePossessive] opponents breathe a sigh of relief while [claimant.GetHerHis] supporters mourn what could have been, the Britons settle back down into their divided petty kingdoms, with no High King to lead - or dominate - them."
 BTWK_britannia_high_king.0013.desc.deposed_claimant: "The loss of my throne has dealt a fatal blow to my dreams of claiming the High Kingship. Without a true power base of my own, I would not possibly be able to exert the authority expected of a High King, and even my most committed supporters have advised that I have no choice but to abandon my claim to the title. My opponents are gloating at my downfall, but can they not see how vulnerable we all will be without a strong High King to lead Britannia?"
 BTWK_britannia_high_king.0013.desc.deposed: "[claimant.GetName] has been deposed from [claimant.GetHerHis] throne! Without a power base of [claimant.GetHerHis] own, [claimant.GetTitledFirstName] could not possibly exert the authority expected of a High King, and so has been forced to abandon [claimant.GetHerHis] claim to the title. The Britons are now settling back down into their divided petty kingdoms, with no High King to lead - or dominate - them."
 BTWK_britannia_high_king.0013.desc.ineligible_claimant: "Changing circumstances have caused the other British kings to consider me ineligible for the High Kingship. With my support rapidly melting away, even my most committed supporters have advised that I have no choice but to abandon my claim to the title. It seems that my dream was simply not to be."
 BTWK_britannia_high_king.0013.desc.ineligible: "[claimant.GetName] is no longer considered eligible for the High Kingship. With [claimant.GetHerHis] support rapidly melting away, [claimant.GetTitledFirstName] has accepted the inevitable and abandoned [claimant.GetHerHis] attempt to claim to the title. The Britons are now settling back down into their divided petty kingdoms, with no High King to lead - or dominate - them."
 BTWK_britannia_high_king.0013.a.claimant: "Damn them all!"
 BTWK_britannia_high_king.0013.a.was_supporter: "A true shame..."
 BTWK_britannia_high_king.0013.a.was_opponent_death: "The would-be tyrant is dead."
 BTWK_britannia_high_king.0013.a.was_opponent: "Excellent news."
 BTWK_britannia_high_king.0013.a.briton_roman: "It was not to be, then."
 BTWK_britannia_high_king.0013.a.anglo_saxon: "Let them remain divided, then..."
 BTWK_britannia_high_king.0013.a.other: "This is interesting news..."
 
 BTWK_britannia_high_king.0020.t: "Unfit to Rule?"
 BTWK_britannia_high_king.0020.desc.wrong_culture: "My embrace of the [ROOT.Char.GetCulture.GetName] culture has raised the consternation of many of the other kings, who are starting to consider me a foreigner unfit for the position of High King. If I do not do something to address these worries soon, my support will collapse entirely and I will be forced to forfeit the High Kingship!"
 BTWK_britannia_high_king.0020.desc: "Doubts are growing about my ability to properly command the respect required of a High King, and many of the other kings are starting to openly question if I am still fit for the throne. If I do not do something to address these worries soon, my support will collapse entirely and I will be forced to forfeit the High Kingship!"
 BTWK_britannia_high_king.0020.a: "This is unacceptable!"
 BTWK_britannia_high_king.0020.a.tt.culture: "#warning The [high_king|E] must be a $britannic_culture$ [culture|E]. #!"
 BTWK_britannia_high_king.0020.a.tt.kingdom: "#warning The [high_king|E] must hold a [kingdom|E] [title|E] of [ROOT.GetHerHis] own. #!"
 BTWK_britannia_high_king.0020.a.tt.prestige_level: "#warning The [high_king|E] must have a [prestige_level|E] of at least [GetPrestigeLevelName('(int32)3')] #weak (3)#!. #!"
 BTWK_britannia_high_king.0020.a.tt.martial: "#warning The [high_king|E] must at least #high 10#! [martial|E]. #!"
 BTWK_britannia_high_king.0020.a.tt.diplomacy: "#warning The [high_king|E] must have at least #high 8#! [diplomacy|E]. #!"
 BTWK_britannia_high_king.0020.a.tt.realm_size: "#warning The [high_king|E] must have a [realm_size|E] of at least #high 10#!. #!"
 BTWK_britannia_high_king.0020.a.tt.incapable: "#warning The [high_king|E] must not be [GetTrait('incapable').GetName(GetNullCharacter)]. #!"
 BTWK_britannia_high_king.0020.a.tt.1: "You will have #high 12 months#! to meet the requirements expected of a [high_king|E] in order to convince the other kings that you are still worthy of the title. If you are still unconsidered #N Unfit to Rule#! after that, the [high_kingship|E] will be forfeit!"
 BTWK_britannia_high_king.0021.t: "Fit to Rule"
 BTWK_britannia_high_king.0021.desc: "My efforts to prove myself worthy of the High Kingship appear to have paid off. The hints of uncertainty and disdain that have coloured my interactions with the other kings seem to have tapered off over the last few weeks, and their support for my continued rule now seems as strong as ever."
 BTWK_britannia_high_king.0021.a: "Why did they ever doubt me?"
 BTWK_britannia_high_king.0021.a.tt: "Your hold on the [high_kingship|E] has been secured."
 BTWK_britannia_high_king.0022.t: "Unfit to Rule"
 BTWK_britannia_high_king.0022.desc.wrong_culture_high_king: "A High King only holds his throne by commanding the support and respect of the other kings. My embrace of the [former_high_king.GetCulture.GetName] culture has been highly controversial among the other kings who largely view me as a foreigner, and despite my best efforts, the discontent has finally come to a head. Now, the other kings have come together to declare that I am unfit to rule and from this moment on will no longer be recognized as High King of Britannia.\n\nNo longer recognizing my authority, all my former subject kingdoms have broken off and many are apparently happy that they no longer serve an 'unworthy' overlord. Can they not see that by breaking our unity, soon we may all simply be replacing one overlord with another?"
 BTWK_britannia_high_king.0022.desc.wrong_culture: "The High King of Britannia only holds his throne by commanding the support and respect of the other kings. Discontent over [former_high_king.GetTitledFirstNamePossessive] embrace of the [former_high_king.GetCulture.GetName] culture has been growing for some time, and now the other kings have come together to declare that as a foreigner [former_high_king.GetSheHe] is unfit to rule and from this moment on will no longer be recognized as High King.\n\nNo longer recognizing [former_high_king.GetHerHis] authority, all former subject kingdoms of [former_high_king.GetTitledFirstName] have regained their independence. Many of the kings are happy that they no longer serve an unworthy overlord, but others cannot help but wonder if they will they soon simply be replacing one foreign overlord with another."
 BTWK_britannia_high_king.0022.desc.high_king: "A High King only holds his throne by commanding the support and respect of the other kings. Despite my best efforts, discontent over my rule has grown over the last several months and has finally come to a head. Now, the other kings have come together to declare that I am unfit to rule and from this moment on will no longer be recognized as High King of Britannia.\n\nNo longer recognizing my authority, all my former subject kingdoms have broken off to regain their independence and many are apparently happy that they no longer serve an 'unworthy' overlord. Can they not see that by once more breaking the unity of the Britons, soon we may all simply be replacing one overlord with another?"
 BTWK_britannia_high_king.0022.desc: "The High King of Britannia only holds his throne by commanding the support and respect of the other kings. Discontent over [former_high_king.GetTitledFirstNamePossessive] worthiness to hold the prestigious seat has been growing for some time, and now the other kings have come together to declare that [former_high_king.GetSheHe] is unfit to rule and from this moment on will no longer be recognized as High King.\n\nNo longer recognizing [former_high_king.GetHerHis] authority, all former subject kingdoms of [former_high_king.GetTitledFirstName] have regained their independence. Many of the kings are happy that they no longer serve an unworthy overlord, but others cannot help but wonder - by once more breaking the unity of the Britons, will they soon simply be replacing one overlord with another?"
 BTWK_britannia_high_king.0022.a: "How could they? Do they not see all I have done for them?"
 BTWK_britannia_high_king.0022.a.tt: "You have been declared #N Unfit to Rule#!! The [high_kingship|E] is now forfeit, and all [britannia_subject_kings|E] are released."
 BTWK_britannia_high_king.0022.b.subject_king: "A [ROOT.Char.GetTitleTierName] bends [ROOT.Char.GetHerHis] knee to no one."
 BTWK_britannia_high_king.0022.b.briton_roman: "No lesser ruler can be High King..."
 BTWK_britannia_high_king.0022.b.anglo_saxon: "Clearly, they are unable to govern themselves..."
 BTWK_britannia_high_king.0022.b.other: "This is interesting news..."
 BTWK_britannia_high_king.0022.b.tt: "[former_high_king.GetName] was declared #N Unfit to Rule#!. The [GetTitleByKey('e_britannia').GetName] has been forfeited, and all [britannia_subject_kings|E] have been released."
 BTWK_britannia_high_king.0023.t: "Death of the High King"
 BTWK_britannia_high_king.0023.desc.high_king_relative: "My [former_high_king_player_heir.Custom2('CloseOrExtendedFamilyRelationToMe', SCOPE.sC('former_high_king'))] [former_high_king.GetFirstName], High King of the Britons, has died. Though I may be his heir, the High Kingship now lies vacant, as only a king who has proven himself worthy in the eyes of all the other kings could hope to claim authority over all of Britannia.\n\nWith [former_high_king.GetHerHis] passing, the various kingdoms of the Britons have reasserted their full independence, petty squabbles and rivalries already resurfacing between us. Perhaps one day I will be able to follow in my [former_high_king_player_heir.Custom2('CloseOrExtendedFamilyRelationToMe', SCOPE.sC('former_high_king'))]'s footsteps and claim the High Kingship myself to reunite our divided isle."
 BTWK_britannia_high_king.0023.desc.high_king: "[former_high_king.GetName] has died. Though I may be his heir, the High Kingship now lies vacant, as only a king who has proven himself worthy in the eyes of all the other kings could hope to claim authority over all of Britannia.\n\nWith [former_high_king.GetHerHis] passing, the various kingdoms of the Britons have reasserted their full independence, petty squabbles and rivalries already resurfacing between us. Perhaps one day I will be able to follow in [former_high_king.GetHerHis] footsteps and claim the High Kingship myself to reunite our divided isle."
 BTWK_britannia_high_king.0023.desc: "[former_high_king.GetName] has died. The High Kingship lies vacant once more, as only a king who has proven himself worthy in the eyes of all the other kings could hope to claim authority over all of Britannia.\n\nWith the High King dead, the various kingdoms of the Britons have reasserted their full independence, petty squabbles and rivalries already resurfacing between them. Only time will tell if another king will be able to rise up above the fray and unite the isle once more."
 BTWK_britannia_high_king.0023.a: "In time, I too will be High [Select_CString(former_high_king_player_heir.IsFemale, 'Queen', 'King')]!"
 BTWK_britannia_high_king.0023.a.tt: "With the death of your predecessor, the [high_kingship|E] has gone back into abeyance, and all [britannia_subject_kings|E] are released."
 BTWK_britannia_high_king.0023.b.briton_roman: "Who will protect Britannia now?"
 BTWK_britannia_high_king.0023.b.anglo_saxon: "Excellent news."
 BTWK_britannia_high_king.0023.b.other: "This is interesting news..."
 BTWK_britannia_high_king.0023.b.tt: "[former_high_king.GetName] has died. The [GetTitleByKey('e_britannia').GetName] has gone back into abeyance, and all [britannia_subject_kings|E] have been released."
 BTWK_britannia_high_king.0024.t: "Fall of the High King"
 BTWK_britannia_high_king.0024.desc.high_king: "My reign as High [Select_CString(former_high_king.IsFemale, 'Queen', 'King')] has ended, and with it any semblance of unity among the Britons. Already many of the other kings have asserted their independence, claiming that their oaths were personally to me alone and not to any of my successors who might try to claim the title.\n\nWithout any support for a successor, the High Kingship has been declared vacant, with all my former subject kingdoms regaining their full independence. My time as High King may be over, but perhaps one day one of my heirs will be able to reclaim my legacy and claim the High Kingship for themselves to reunite our divided isle."
 BTWK_britannia_high_king.0024.desc.high_king_heir_relative: "The reign of my [ROOT.Char.Custom2('CloseOrExtendedFamilyRelationToMe', SCOPE.sC('former_high_king'))], High [Select_CString(former_high_king.IsFemale, 'Queen', 'King')] [former_high_king.GetFirstName], has ended, and with it [former_high_king.GetHerHis] hegenomy over the other Brythonic kingdoms. Though I may be [former_high_king.GetHerHis] heir, the other kings have refused to renew their oaths, claiming that their oaths were personally to High [Select_CString(former_high_king.IsFemale, 'Queen', 'King')] [former_high_king.GetFirstName] and [former_high_king.GetHerHim] alone.\n\nWithout any support for a successor, the High Kingship has been declared vacant, with all former subject kingdoms regaining their full independence. Perhaps one day I will be able to reclaim my [ROOT.Char.Custom2('CloseOrExtendedFamilyRelationToMe', SCOPE.sC('former_high_king'))]'s legacy and claim the High Kingship myself to reunite our divided isle."
 BTWK_britannia_high_king.0024.desc.high_king_heir: "The reign of High [Select_CString(former_high_king.IsFemale, 'Queen', 'King')] [former_high_king.GetFirstName] has ended, and with it [former_high_king.GetHerHis] hegenomy over the other Brythonic kingdoms. Though I may be [former_high_king.GetHerHis] heir, the other kings have refused to renew their oaths, claiming that their oaths were personally to High [Select_CString(former_high_king.IsFemale, 'Queen', 'King')] [former_high_king.GetFirstName] and [former_high_king.GetHerHim] alone.\n\nWithout any support for a successor, the High Kingship has been declared vacant, with all former subject kingdoms regaining their full independence. Perhaps one day I will be able to reclaim [former_high_king.GetFirstNamePossessive] legacy and claim the High Kingship myself to reunite our divided isle."
 BTWK_britannia_high_king.0024.desc: "The reign of High [Select_CString(former_high_king.IsFemale, 'Queen', 'King')] [former_high_king.GetFirstName] has ended, and with it [former_high_king.GetHerHis] hegenomy over the other Brythonic kingdoms. Already many of the other kings have refused to renew their oaths, claiming that their oaths were personally to High [Select_CString(former_high_king.IsFemale, 'Queen', 'King')] [former_high_king.GetFirstName] and [former_high_king.GetHerHim] alone.\n\nWithout any support for a successor, the High Kingship has been declared vacant, with all former subject kingdoms regaining their full independence. Only time will tell if another king will be able to rise up above the fray and unite the isle once more."
 BTWK_britannia_high_king.0024.a: "Their treachery shall not be forgotten..."
 BTWK_britannia_high_king.0024.a.tt: "With your abdication, the [high_kingship|E] has gone back into abeyance, and all [britannia_subject_kings|E] are released."
 BTWK_britannia_high_king.0024.b.former_high_king_player_heir: "In time, I too will be High [Select_CString(former_high_king_player_heir.IsFemale, 'Queen', 'King')]!"
 BTWK_britannia_high_king.0024.b.briton_roman: "Who will protect Britannia now?"
 BTWK_britannia_high_king.0024.b.anglo_saxon: "Yes, let them fight among themselves..."
 BTWK_britannia_high_king.0024.b.other: "This is interesting news..."
 BTWK_britannia_high_king.0024.b.tt: "High [Select_CString(former_high_king.IsFemale, 'Queen', 'King')] [former_high_king.GetFirstName] has abdicated from [former_high_king.GetHerHis] throne. The [GetTitleByKey('e_britannia').GetName] has gone back into abeyance, and all [britannia_subject_kings|E] have been released."