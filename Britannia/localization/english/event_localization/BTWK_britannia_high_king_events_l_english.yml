l_english:

 # Claiming the High Kingship
 BTWK_britannia_high_king.0001.t: "Assessing Support"
 BTWK_britannia_high_king.0001.desc: "TODO"
 BTWK_britannia_high_king.0001.a: "And now we wait..."
 BTWK_britannia_high_king.0001.a.tt.1: "Emissaries have been sent to the other kings requesting their support for your claim to the High Kingship. Responses are expected in a few days."
 BTWK_britannia_high_king.0001.a.tt.2: "You are expected to have #P [THIS.ScriptValue('BTWK_britannia_high_king_num_potential_supporters')]#! $BTWK_britannia_high_king.0001.a.supporters$ and #N [THIS.ScriptValue('BTWK_britannia_high_king_num_potential_opponents')]#! $BTWK_britannia_high_king.0001.a.opponents$, with the other #high [THIS.ScriptValue('BTWK_britannia_high_king_num_potential_neutrals')]#! $BTWK_britannia_high_king.0001.a.neutral_kings$ expected to not get involved."
 BTWK_britannia_high_king.0001.a.supporters: "[SelectLocalization(EqualTo_CFixedPoint(THIS.ScriptValue('BTWK_britannia_high_king_num_potential_supporters'), '(CFixedPoint)1'), 'supporter', 'supporters')]"
 BTWK_britannia_high_king.0001.a.opponents: "[SelectLocalization(EqualTo_CFixedPoint(THIS.ScriptValue('BTWK_britannia_high_king_num_potential_opponents'), '(CFixedPoint)1'), 'opponent', 'opponents')]"
 BTWK_britannia_high_king.0001.a.neutral_kings: "[SelectLocalization(EqualTo_CFixedPoint(THIS.ScriptValue('BTWK_britannia_high_king_num_potential_neutrals'), '(CFixedPoint)1'), 'king', 'kings')]"
 BTWK_britannia_high_king.0002.t: "A New High King?"
 BTWK_britannia_high_king.0002.desc: "I have received word that [claimant.GetName] has proclaimed [claimant.GetHerselfHimself] worthy of the title of High King of the Britons. A High King with all the armies of Britannia under [claimant.GetHerHis] command would be a formidable force indeed, but [claimant.GetHerHis] legitimacy depends on the consensus of the other Kings, and if [claimant.GetSheHe] is to unite the Britons under a single banner [claimant.GetSheHe] will first have to gain their approval - whether by diplomacy or force."
 BTWK_britannia_high_king.0002.a.other_king: "[claimant.GetSheHe] will need my consent to move forwards..."
 BTWK_britannia_high_king.0002.a.briton_roman: "Will [claimant.GetSheHe] finally bring unity to the land?"
 BTWK_britannia_high_king.0002.a.anglo_saxon: "United or not, we will still crush them..."
 BTWK_britannia_high_king.0002.a.other: "This is interesting news..."
 BTWK_britannia_high_king.0002.a.tt: "[claimant.GetName] has officially laid claim to the [high_kingship|E] and is now seeking the support of the other British kings. Any kings that oppose [claimant.GetHerHis] claim will attempt to challenge [claimant.GetHerHim] on the battlefield, while any supporters will join [claimant.GetHerHis] side as allies. If [claimant.GetName] is successful at defeating [claimant.GetHerHis] opponents, [claimant.GetSheHe] will be recognized as [high_king|E] with all supporters and defeated opponents becoming [britannia_subject_kings|E]."
 BTWK_britannia_high_king.0002.a.tt.other_king: "An official emissary from [claimant.GetName] is expected in the next few days. We will soon have to decide our own stance on [claimant.GetHerHis] claim to the [high_kingship|E], and whether it is worth going to war over."
 BTWK_britannia_high_king.0004.opening: "[claimant.Custom2('GreetingToForeignRulerPositive', ROOT.Char)]"
 BTWK_britannia_high_king.0004.desc: "I have claimed the title of High King with the aim of uniting the Britons against our many enemies. If you support my claim to the throne and recognize me as the rightful High King of Britannia, I vow that I will protect you and your kingdom against any that would seek to threaten it."
 BTWK_britannia_high_king.0004.a: "You are a great leader. I will support your cause."
 BTWK_britannia_high_king.0004.a.tt.common: "You declare that you will #P support#! [claimant.GetName]'s claim to the [high_kingship|E]. If other kings oppose [claimant.GetHerHis] claim to the throne, you will join the war as [claimant.GetTitledFirstName]'s ally alongside any other supporters,"
 BTWK_britannia_high_king.0004.a.tt: "$BTWK_britannia_high_king.0004.a.tt.common$ and you will swear fealty to [claimant.GetTitledFirstName] as a [britannia_subject_king|E] if [claimant.GetSheHe] is successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0004.a.tt.briton_tributary: "$BTWK_britannia_high_king.0004.a.tt.common$ but as you are already a [tributary|E] you will only swear fealty to [claimant.GetTitledFirstName] as a [britannia_subject_king|E] if your [suzerain|E] swears or is forced to swear fealty to [claimant.GetHerHim] when [claimant.GetSheHe] is successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0004.a.tt.other_tributary: "$BTWK_britannia_high_king.0004.a.tt.common$ but as you are already a [tributary|E] you will not swear fealty to [claimant.GetTitledFirstName] as a [britannia_subject_king|E] if [claimant.GetSheHe] is successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0004.a.tt.suzerain_warning: "#warning Your [duke|E] tier or higher [GetCulturePillar('heritage_brythonic').GetName] and [GetCulturePillar('heritage_latin').GetName] [heritage|E] tributaries will also become [britannia_subject_kings|E] of [claimant.GetName] if we submit.#!"
 BTWK_britannia_high_king.0004.b: "I will bow to no King. Not even to you."
 BTWK_britannia_high_king.0004.b.tt.common: "You declare that you will #N oppose#! [claimant.GetName]'s claim to the [high_kingship|E]. Unless [claimant.GetSheHe] voluntarily backs down, you will go to war against [claimant.GetTitledFirstName] alongside any other opponents to try to force [claimant.GetHerHim] to give up [claimant.GetHerHis] claim. If you are defeated, you will be forced to recognized [claimant.GetTitledFirstName] as [high_king|E]"
 BTWK_britannia_high_king.0004.b.tt: "$BTWK_britannia_high_king.0004.b.tt.common$ and swear fealty to [claimant.GetHerHim] as a [britannia_subject_king|E]."
 BTWK_britannia_high_king.0004.b.tt.briton_tributary: "$BTWK_britannia_high_king.0004.b.tt.common$ but as you are already a [tributary|E] you will only become a [britannia_subject_king|E] if your [suzerain|E] swears or is forced to swear fealty to [claimant.GetHerHim]."
 BTWK_britannia_high_king.0004.b.tt.other_tributary: "$BTWK_britannia_high_king.0004.b.tt.common$ but as you are already a [tributary|E] you will not be forced to swear fealty to [claimant.GetHerHim] as a [britannia_subject_king|E]."
 BTWK_britannia_high_king.0004.b.tt.suzerain_warning: "#warning Your [duke|E] tier or higher [GetCulturePillar('heritage_brythonic').GetName] and [GetCulturePillar('heritage_latin').GetName] [heritage|E] tributaries will also become [britannia_subject_kings|E] of [claimant.GetName] if we are forced to submit.#!"
 BTWK_britannia_high_king.0004.c: "I will recognize your claim, but I will not be your vassal."
 BTWK_britannia_high_king.0004.c.tt.common: "You declare that you will #high nominally support#! [claimant.GetName]'s claim to the [high_kingship|E], but will otherwise not get involved. You will not join in any wars between [claimant.GetTitledFirstName] and any opponents of [claimant.GetHerHis] claim,"
 BTWK_britannia_high_king.0004.c.tt: "$BTWK_britannia_high_king.0004.c.tt.common$ and you will not swear fealty to [claimant.GetTitledFirstName] if [claimant.GetSheHe] is successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0004.c.tt.claimant_tributary: "$BTWK_britannia_high_king.0004.c.tt.common$ but as you are already a [tributary|E] of [claimant.GetTitledFirstName] you will become a [britannia_subject_king|E] if [claimant.GetSheHe] is successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0004.c.tt.briton_tributary: "$BTWK_britannia_high_king.0004.c.tt.common$ but as you are a [tributary|E] you will still become a [britannia_subject_king|E] of [claimant.GetTitledFirstName] if [claimant.GetSheHe] is successfully recognized as [high_king|E] and your [suzerain|E] swears or is forced to swear fealty to [claimant.GetHerHim]."
 BTWK_britannia_high_king.0004.c.tt.other_tributary: "$BTWK_britannia_high_king.0004.c.tt$"
 BTWK_britannia_high_king.0005.opening.supporter: "[claimant.Custom2('GreetingToForeignRulerPositive', ROOT.Char)]"
 BTWK_britannia_high_king.0005.opening.opponent: "[claimant.Custom2('GreetingToForeignRuler', ROOT.Char)]"
 BTWK_britannia_high_king.0005.opening.neutral: "[claimant.Custom2('GreetingToForeignRuler', ROOT.Char)]"
 BTWK_britannia_high_king.0005.desc.tributary_supporter: "I have taken your claim into consideration and decided to grant you my support and recognition as High King of Britannia. I am ready to fight by your side to ensure that your claim comes to fruition. May your rule be a long and prosperous one."
 BTWK_britannia_high_king.0005.desc.supporter: "I have taken your claim into consideration and decided to grant you my support and recognition as High King of Britannia. I am ready to swear fealty to you and become your loyal vassal. May your rule be a long and prosperous one."
 BTWK_britannia_high_king.0005.desc.opponent: "I have taken your request into consideration, and I respectfully inform you that I will not support your claim to the High Kingdom of Britannia.\nYou lack the skills and wisdom necessary to hold such a prestigious throne. Please renounce all your claims."
 BTWK_britannia_high_king.0005.desc.tributary_neutral: "I have considered your claim and decided to grant you my recognition as High King. However, I am not in a position to offer you my full support. While I wish you luck, the [other_king.GetPrimaryTitle.GetNameNoTooltip] will not be further involved at this time."
 BTWK_britannia_high_king.0005.desc.neutral: "I have considered your claim and decided to grant you my recognition as High King. However, I refuse to swear fealty to you and to become de facto one of your vassal kings. The [other_king.GetPrimaryTitle.GetNameNoTooltip] will retain its independence."
 BTWK_britannia_high_king.0005.a: "Very good. You have made the right choice."
 BTWK_britannia_high_king.0005.a.tt.common: "[other_king.GetName] has declared [other_king.GetHerHis] #P support#! for your claim to the [high_kingship|E]."
 BTWK_britannia_high_king.0005.a.tt: "$BTWK_britannia_high_king.0005.a.tt.common$ [other_king.GetSheHe|U] will join your war against the opponents of your claim and will swear fealty as a [britannia_subject_king|E] if you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.a.tt.briton_tributary: "$BTWK_britannia_high_king.0005.a.tt.common$ [other_king.GetSheHe|U] will join your war against the opponents of your claim but as [other_king.GetSheHe] is already a [tributary|E] [other_king.GetSheHe] will only become your [britannia_subject_king|E] if [other_king.GetHerHis] [suzerain|E] swears or is forced to swear fealty to you once you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.a.tt.other_tributary: "$BTWK_britannia_high_king.0005.a.tt.common$ [other_king.GetSheHe|U] will join your war against the opponents of your claim, but as [other_king.GetSheHe] is already a [tributary|E] [other_king.GetSheHe] will not swear fealty as a [britannia_subject_king|E] if you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.b: "Perhaps some steel will convince you..."
 BTWK_britannia_high_king.0005.b.tt.common: "[other_king.GetName] has declared [other_king.GetHerHis] #N opposition#! to your claim to the [high_kingship|E], and will join other opponents in going to war against you to force you to renounce your claim."
 BTWK_britannia_high_king.0005.b.tt: "$BTWK_britannia_high_king.0005.b.tt.common$ If you defeat [other_king.GetHerHim] on the battlefield, [other_king.GetName] will be forced to recognized you as [high_king|E] and swear fealty as a [britannia_subject_king|E]."
 BTWK_britannia_high_king.0005.b.tt.briton_tributary: "$BTWK_britannia_high_king.0005.b.tt.common$ If you defeat [other_king.GetHerHim] on the battlefield, [other_king.GetName] will be forced to recognized you as [high_king|E] but as [other_king.GetSheHe] is already a [tributary|E] [other_king.GetSheHe] will only become your [britannia_subject_king|E] if [other_king.GetHerHis] [suzerain|E] swears or is forced to swear fealty to you."
 BTWK_britannia_high_king.0005.b.tt.other_tributary: "$BTWK_britannia_high_king.0005.b.tt.common$ If you defeat [other_king.GetHerHim] on the battlefield, [other_king.GetName] will be forced to recognized you as [high_king|E] but will not swear fealty as a [britannia_subject_king|E] as [other_king.GetSheHe] is already [tributary|E] to another ruler."
 BTWK_britannia_high_king.0005.c: "Good enough. Formal recognition is all I really need."
 BTWK_britannia_high_king.0005.c.tt.common: "[other_king.GetName] has declared [other_king.GetHerHis] #high nominal support#! for your claim to the [high_kingship|E], but will otherwise not get involved."
 BTWK_britannia_high_king.0005.c.tt: "$BTWK_britannia_high_king.0005.c.tt.common$ [other_king.GetSheHe|U] will remain independent and not become your [britannia_subject_king|E] if you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.c.tt.claimant_tributary: "$BTWK_britannia_high_king.0005.c.tt.common$ As [other_king.GetSheHe] is already your tributary, will [other_king.GetName] will still become your [britannia_subject_king|E] if you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.c.tt.briton_tributary: "$BTWK_britannia_high_king.0005.c.tt.common$ As [other_king.GetSheHe] is already a [tributary|E], [other_king.GetName] may still become your [britannia_subject_king|E] if [other_king.GetHerHis] [suzerain|E] swears or is forced to swear fealty to you once you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.c.tt.other_tributary: "$BTWK_britannia_high_king.0005.c.tt.common$ [other_king.GetSheHe|U] will not become your [britannia_subject_king|E] if you are successfully recognized as [high_king|E]."
 BTWK_britannia_high_king.0005.c.tt.2: "#V [Subtract_CFixedPoint(GetPlayer.MakeScope.ScriptValue('BTWK_britannia_high_king_num_potential_neutrals'), '(CFixedPoint)1')]#! other kings have also chosen this stance."
 BTWK_britannia_high_king.0006.t: "At an Impasse"
 BTWK_britannia_high_king.0006.t.no_opponents: "A Triumph of Diplomacy"
 BTWK_britannia_high_king.0006.desc: "Not all of the other kings have accepted my claim to the High Kingship. An alliance of other princes opposed to my claim has gathered under the leadership of [HK_britannia_opponent_leader.GetName] and has declared that nothing short of war will make them recognize my 'pretentions' to the High Kingship. Such a challenge cannot possibly go unanswered, or the loss of face will be so great that I may as well give up on my claim entirely."
 BTWK_britannia_high_king.0006.desc.no_opponents: "Claims to the high kingship are usually accompanied by an outbreak of war to settle old scores or knock a rival off their perch, but it does not always have to be so violent. Through deft use of diplomacy and intimidation, I have managed to convince all the other kings to support - or at least, not oppose - my acclamation to the High Kingship, which is now all but assured. Sometimes the quill really is mightier than the sword."
 BTWK_britannia_high_king.0006.a: "Then war it is!"
 BTWK_britannia_high_king.0006.a.tt.1: "All #P supporters#! of your claim will join the war on your side, and all #N opponents#! on the opposing side."
 BTWK_britannia_high_king.0006.a.tt.2: "If you are victorious in the war, you will be recognized as [high_king_britannia|E] and gain all supporters and defeated opponents as [britannia_subject_kings|E]. Kings that did not directly oppose your claim but are called into the war on the opposing side will also be treated as defeated opponents and forced to swear fealty if eligible."
 BTWK_britannia_high_king.0006.a.tt.3: "If you are defeated, you will lose #N 1#! [prestige_level|E], be forced to renounce any right to the [high_kingship|E], and will not be able to make another attempt to claim the title for #N 15#! years."
 BTWK_britannia_high_king.0006.b: "I will renounce my claim. For now."
 BTWK_britannia_high_king_abandon_claim_claimant.tt: "You abandon your claim to the [high_kingship|E], and will not be able to make another attempt to claim the title for #N 5#! years."
 BTWK_britannia_high_king.0006.c: "Let us save our swords for the Saxons."
 BTWK_britannia_high_king.0006.c.tt: "Without any opposition to your claim, you can now be proclaimed [high_king|E]!"
 BTWK_britannia_high_king.0007.t.war: "War for the High Kingship"
 BTWK_britannia_high_king.0007.t.backed_down: "Not Quite Worthy"
 BTWK_britannia_high_king.0007.desc.war: "[claimant.GetName] has not taken lightly to the refusals of some of the other kings to accept [claimant.GetHerHis] claim. Gathering together [claimant.GetHerHis] supporters, [claimant.GetTitledFirstName] now leads an alliance prepared to enforce [claimant.GetHerHis] claim by force while [claimant.GetHerHis] opponents have banded together around the leadership of [HK_britannia_opponent_leader.GetName].\n\nWith neither side willing to back down, [claimant.GetTitledFirstName] has declared war on all of the opposing kings, proclaiming that this dispute will be settled on the field of battle. "
 BTWK_britannia_high_king.0007.desc.backed_down: "It seems that [claimant.GetName] did not have the support [claimant.GetSheHe] thought [claimant.GetSheHe] had when claiming the High Kinship. Unwilling to challenge the alliance of opposing kings on the field of battle, [claimant.GetTitledFirstName] has quietly dropped [claimant.GetHerHis] claim for the High Kingship for the time being."
 BTWK_britannia_high_king.0007.a.supporter: "And I will fight by [claimant.GetHerHis] side!"
 BTWK_britannia_high_king.0007.a.opponent: "Then let [claimant.GetHerHim] come!"
 BTWK_britannia_high_king.0007.a.briton_roman: "What does this mean for Britannia?"
 BTWK_britannia_high_king.0007.a.anglo_saxon: "The Britons never pass up an opportunity to fight."
 BTWK_britannia_high_king.0007.a.other: "This is interesting news..."
 BTWK_britannia_high_king.0007.a.tt.1: "[claimant.GetName] and [claimant.GetHerHis] supporters have declared war on the alliance of opposing kings under [HK_britannia_opponent_leader.GetUINamePossessive] leadership."
 BTWK_britannia_high_king.0007.a.tt.1.a: "As one of [claimant.GetNamePossessive] supporters, you have joined the war against [HK_britannia_opponent_leader.GetUIName]!"
 BTWK_britannia_high_king.0007.a.tt.2: "If victorious, [claimant.GetName] will be proclaimed [high_king_britannia|E], with all supporters and defeated opponents becoming [britannia_subject_kings|E]. If defeated, [claimant.GetTitledFirstName] will be renounce [claimant.GetHerHis] his claims, and will not be able make another attempt to claim the title for #N 15#! years."
 BTWK_britannia_high_king.0007.b.supporter: "A true shame..."
 BTWK_britannia_high_king.0007.b.opponent: "[claimant.GetSheHe] has come to [claimant.GetHerHis] senses, then."
 BTWK_britannia_high_king.0007.b.briton_roman: "Only the worthy can become High King."
 BTWK_britannia_high_king.0007.b.anglo_saxon: "And divided they remain."
 BTWK_britannia_high_king.0007.b.other: "This is interesting news..."
 BTWK_britannia_high_king_abandon_claim.tt: "[claimant.GetName] has abandoned [claimant.GetHerHis] claim to the [high_kingship|E], and will not be able to make another attempt to claim the title for #N 5#! years."
 BTWK_britannia_high_king.0009.t: "High Kingdom of Britannia"
 BTWK_britannia_high_king.0009.desc: "The kings of Britain have declared their unanimous support for my claim to the [GetTitleByKey('e_britannia').GetName], and I have now been proclaimed High King in the Great Hall of [new_high_king_capital_barony.GetNameNoTierNoTooltip].\n\nSome of the other kings have formally sworn fealty and will now rule their homelands as subject kings under my rule. Others, despite their support for my acclamation, have not agreed to become de facto subjects of another king and will maintain their independence - for now.\n\nAs High King, it is my duty and obligation to lead Britannia against its enemies, whether they be Saxon, Irish, or even Briton. Only strong leadership will be able to bring Britannia's foes to heel."
 BTWK_britannia_high_king.0009.a: "And defend Britannia I shall!"
 BTWK_britannia_high_king.0009.a.tt.1: "As [high_king|E], you will passively accumulate [britannia_authority|E] depending on how much of Britannia is under the control of you and your [britannia_subject_kings|E]. Once you have enough [britannia_authority|E], you will be able to pass [britannia_reforms|E] to solidify your hold on the [high_kingship|E], strengthen your control over your [britannia_subject_kings|E], and eventually move towards uniting the petty kingdoms of Britannia back into a single realm."
 BTWK_britannia_high_king.0009.a.tt.2: "Until the #V $BTWK_HK_britannia_formalize_high_kingship$#! [britannia_reform|E] is passed, a [high_king|E] only holds [claimant.GetHerHis] position in a personal capacity, and the title will not be inherited on death or abdication. In addition, the other kings will only continue to support your rule as long as they believe you can and will continue to defend their kingdoms. If you become [GetTrait('incapable').GetName(GetNullCharacter)], adopt a non-$britannic_culture$ [culture|E], or let your [martial|E] or [diplomacy|E] decline too far, you will be considered #N Unfit to Rule#! and forced to abdicate the [high_kingship|E]."
 BTWK_britannia_high_king.0009.a.tt.3: "In addition, as a largely informal title, the [high_king|E] cannot have any [king|E]-tier vassals until the #V $BTWK_HK_britannia_empower_the_high_council$#! [britannia_reform|E] has been passed. Until then, any [king|E]-tier vassals will be converted into [britannia_subject_kingdoms|E]."
 BTWK_britannia_high_king.0009.a.tt.4: "You can force other independent rulers of a $celtic_heritage_group$ or $romanized_culture$ [culture|E] to become [britannia_subject_kings|E] using the [GetCasusBelliType('make_tributary_cb').GetName] [casus_belli|E]."
 BTWK_britannia_high_king.0010.t: "High Kingdom of Britannia"
 BTWK_britannia_high_king.0010.desc: "The kings of Britain have declared their unanimous support for [Select_CString(new_high_king.IsFemale, 'Queen', 'King')] [new_high_king.GetFirstName] of [new_high_king_primary_title.GetNameNoTier]'s claim to the [GetTitleByKey('e_britannia').GetName], and have now proclaimed [new_high_king.GetHerHim] High King in the Great Hall of [new_high_king_capital_barony.GetNameNoTierNoTooltip]. Some of the other kings have formally sworn fealty and will now rule as subject kings under [new_high_king.GetHerHim]. Others, despite their support for [new_high_king.GetHerHis] acclamation, have not agreed to become de facto subjects of another king and will maintain their independence.\n\nAs High King, [new_high_king.GetFirstName] has sworn to lead and defend Britannia against its enemies, whether they be Saxon, Irish, or even Briton. All across Britannia, kings are giving pause to consider the new High King, wondering how this will change the balance of power on the isle."
 BTWK_britannia_high_king.0010.a.was_supporter: "Hail to the High King!"
 BTWK_britannia_high_king.0010.a.was_opponent: "Let us hope our fears were not founded."
 BTWK_britannia_high_king.0010.a.briton_roman: "Will [new_high_king.GetSheHe] live up to [new_high_king.GetHerHis] promise?"
 BTWK_britannia_high_king.0010.a.anglo_saxon: "Perhaps [new_high_king.GetSheHe] may prove to be a formidable opponent."
 BTWK_britannia_high_king.0010.a.other: "This is interesting news..."
 BTWK_britannia_high_king.0010.a.tt.1: "All supporters and defeated opponents of [new_high_king.GetNamePossessive] claim to the [high_kingship|E] have become [new_high_king.GetHerHis] [britannia_subject_kings|E]."
 BTWK_britannia_high_king.0010.a.tt.2: "While a powerful title, the position of [high_king|E] is ultimately a personal honour and will not be inherited upon the death or abdication of [new_high_king.GetName] - unless [new_high_king.GetSheHe] manages to accumulate enough [britannia_authority|E] to pass [britannia_reforms|E]. In addition, [new_high_king.GetTitledFirstName] will also be forced to abdicate the [high_kingship|E] if [new_high_king.GetSheHe] ever comes to be considered #N Unfit to Rule#!."
 BTWK_britannia_high_king.0012.t: "A Dream Cut Short"
 BTWK_britannia_high_king.0012.desc.death: "[claimant.GetName] is dead! [claimant.GetHerHis|U] dream of claiming the High Kingship has been cut short, now never to be fulfilled. As [claimant.GetTitledFirstNamePossessive] opponents breathe a sigh of relief while [claimant.GetHerHis] supporters mourn what could have been, the Britons settle back down into their divided petty kingdoms, with no High King to lead - or dominate - them."
 BTWK_britannia_high_king.0012.desc.deposed_claimant: "The loss of my throne has dealt a fatal blow to my dreams of claiming the High Kingship. Without a true power base of my own, I would not possibly be able to exert the authority expected of a High King, and even my most committed supporters have advised that I have no choice but to abandon my claim to the title. My opponents are gloating at my downfall, but can they not see how vulnerable we all will be without a strong High King to lead Britannia?"
 BTWK_britannia_high_king.0012.desc.deposed: "[claimant.GetName] has been deposed from [claimant.GetHerHis] throne! Without a power base of [claimant.GetHerHis] own, [claimant.GetTitledFirstName] could not possibly exert the authority expected of a High King, and so has been forced to abandon [claimant.GetHerHis] claim to the title. The Britons are now settling back down into their divided petty kingdoms, with no High King to lead - or dominate - them."
 BTWK_britannia_high_king.0012.desc.ineligible_claimant: "Changing circumstances have caused the other British kings to consider me ineligible for the High Kingship. With my support rapidly melting away, even my most committed supporters have advised that I have no choice but to abandon my claim to the title. It seems that my dream was simply not to be."
 BTWK_britannia_high_king.0012.desc.ineligible: "[claimant.GetName] is no longer considered eligible for the High Kingship. With [claimant.GetHerHis] support rapidly melting away, [claimant.GetTitledFirstName] has accepted the inevitable and abandoned [claimant.GetHerHis] attempt to claim to the title. The Britons are now settling back down into their divided petty kingdoms, with no High King to lead - or dominate - them."
 BTWK_britannia_high_king.0012.a.claimant: "Damn them all!"
 BTWK_britannia_high_king.0012.a.was_supporter: "A true shame..."
 BTWK_britannia_high_king.0012.a.was_opponent_death: "The would-be tyrant is dead."
 BTWK_britannia_high_king.0012.a.was_opponent: "Excellent news."
 BTWK_britannia_high_king.0012.a.briton_roman: "It was not to be, then."
 BTWK_britannia_high_king.0012.a.anglo_saxon: "Let them remain divided, then..."
 BTWK_britannia_high_king.0012.a.other: "This is interesting news..."
 