l_english:
 BTWK_startup.0001.t.uther_pendragon: "The Winter King"
 BTWK_startup.0001.desc.uther_pendragon: "High King and Pendragon, you rank among the greatest kings Britannia has ever seen. But you are no longer the man you once were, not after the death of your beloved heir and only legitimate son, Mordred, in battle against the Saxons a mere six months ago - a loss you have blamed squarely on your bastard son Arthur, now banished back to Armorica. Not all is lost, however, as on this cold winter day your son's widow has just given birth to a newborn boy - Mordred, son of Mordred, your one and only remaining heir, a wondrous reprieve marred only by the baby's crippled leg - a bad omen. \n\nWith your health rapidly ailing, Mordred will soon be king far before his time - without sufficient preparation in your remaining months, disaster will surely befall Dumnonia. As High King, you have the authority to convene 'High Councils' in times of peril - with the ever-increasing threat of the Saxons while the British are forever infighting, this could be a chance to bring renewed stability. Messengers have been sent to the other kings requesting a formal council in Glevum to decide and secure the future of Dumnonia."
 BTWK_startup.0001.a.uther_pendragon: "I only hope it is not too late to heal old wounds."
 
 BTWK_startup.0001.desc.ambrosius: "Ambrosius Aurelianus is a name that is spoken of in either glowing reverence or bedgruding respect across all of Britannia. First of the Britons and Last of the Romans, the Ambrosii were among the most distinguished Roman families that remained in Britannia after the Roman withdrawal, with first father and then son mounting a determined resistance against Vortigern's ill-fated machinations and leading the struggle against the subsequent Saxon onslaught in a concerted effort to protect the British way of life."
 
 BTWK_startup.0001.t.cumbrian: "The Old North"
 BTWK_startup.0001.desc.cumbrian: "While the northern provinces of Britannia were never quite as developed as the south, the end of Roman rule has been no less impactful on the region. Left to fend for themselves, the newly emerging petty kingdoms were beset by waves of Pictish and Irish raiders, though the Saxons that have become so powerful in the southeast have so far remained more marginal here in the North. There is little unity among the kings of the North, even if many of them claim common descent from the great [coel_hen.GetFirstNameNicknamed]; they squabble over land, honour, and glory alike.\n\nAs much as any king is loath to submit to another, however, the memory of unity in the north is strong. It is the ambition of many a northern king to reunite all of Northern Britannia under his rule, and indeed unity among the Britons of the North may soon be needed - the Saxons will not be content with their coastal settlements forever, and who is to say what the fierce Picts and Scots could be capable of if they were to ever be united under a single king..."
 BTWK_startup.0001.a.cumbrian: "#italic I#! will be the true heir to [coel_hen.GetFirstNameNicknamed]'s legacy."
 
 BTWK_startup.0001.t.briton: "Groans of the Britons"
 BTWK_startup.0001.desc.briton: "It has been more than 70 years since the Roman legions left Britannia, and the decades since have not been kind to the Britons. The province soon divided into a patchwork of petty kingdoms, economic disruption emptied out the cities, and the retreat of the Imperial army opened up Britannia to barbarian raids from every direction. While rebelling Saxon foederati took over much of the east, Irish raiders swept over the west, settling on the coasts and founding or seizing control of a number of kingdoms.\n\nThe Irish tide has since receded somewhat, with many of them being increasingly integrated into Briton society, though the power of the Saxons has only grown. While Britannia remain divided, there does exist the notion of a High King of the Britons, a first among equals who could lead the combined armies of the province against its enemies. Most recent to claim the title was [uther_pendragon.GetName], though his recent illness and lethargy has left the title effectively vacant. With a renewed Saxon onslaught expected, it may take a strong High King to defeat the invaders and, perhaps, begin the process of reuniting the divided isle."
 BTWK_startup.0001.desc.romanobritish: "It has been more than 70 years since the Roman legions left Britannia, and the decades since have not been kind to the Britons. The province soon divided into a patchwork of petty kingdoms, economic disruption emptied out the cities, and the coasts were ravaged by Pictish and Irish raiders. The greatest threat, however, has come from the Saxons that seized control in the east and have since been enroaching westwards. Their ambitions grow year by year, but the rise of [aelle_of_anglia.GetName] has been especially swift - many fear he may conquer all of Britannia if he is not stopped.\n\nWhile every king jealously guards his independence, there does exist the notion of a High King of the Britons, a first among equals who could lead the combined armies of the province against its enemies. Most recent to claim the title was [uther_pendragon.GetName], though his recent illness and lethargy has left the title effectively vacant. With a renewed Saxon onslaught expected, it may take a strong High King to defeat the invaders and, perhaps, begin the process of reuniting the divided isle."
 BTWK_startup.0001.a.briton: "We will drive the barbarians back into the sea!"
 
 BTWK_startup.0001.aelle_warning_tooltip: "[aelle_of_anglia.GetName] has made little secret of his ambitions and will soon embark on a grand campaign to #high conquer the British midlands#!, and from there perhaps all of the south. However, his focus on conquest has left little room for proper state building or stabilization - an unwieldy construction held together only by personal loyalty or fear, his kingdom will surely #high collapse#! after his death."
 BTWK_startup.0001.britannia_high_kingship_tooltip: "Any sufficiently powerful British king can attempt to claim the [high_kingship|E], denoting informal leadership over all of [GetTitleByKey('e_britannia').GetNameNoTier]. While the authority of a High King outside his kingdom is initially quite limited, that can be increased by passing #high reforms#! to institutionalize the title and gradually centralize power around the High King, potentially reuniting the province under a single ruler once more."
 BTWK_startup.0001.hen_ogledd_tooltip: "While the north is not to be underestimated, the center of power in Britannia has always lay in the south. As a northern king, any of our attempts to claim the [high_kingship|E] will not be taken seriously until [GetTitleByKey('e_hen_ogledd').GetNameNoTier] is united under our rule."
 