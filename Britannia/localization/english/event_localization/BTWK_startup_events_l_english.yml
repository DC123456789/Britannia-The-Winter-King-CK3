l_english:
 BTWK_startup.0001.t.uther_pendragon: "The Winter King"
 BTWK_startup.0001.desc.uther_pendragon: "As High King and Pendragon, many rank me among the greatest kings Britannia has ever seen. But nothing could have prepared me for the death of my beloved heir [mordred_ap_uther.GetFirstName], my only legitimate son, at the hands of the Saxons six months ago - undoubtedly the fault of his bastard brother [arthur_pendragon.GetFirstName], now banished back to Armorica. Not all is lost, however, as on this cold winter day my son's widow has given birth to a newborn boy - [mordred_pendragon.GetFirstName], son of Mordred, my one and only remaining heir, a wondrous reprieve in these hard times. \n\nWith my health rapidly ailing, Mordred will soon be king far before his time - and without sufficient preparation, disaster will surely befall Dumnonia. To that end, I have called for a council of the other kings to decide on a protector for Mordred and secure the future of the kingdom. With the threat of the Saxons ever growing, this could perhaps be one last chance to lay old grievances to rest and bring stability to the island before the invasions resume..."
 BTWK_startup.0001.a.uther_pendragon: "I only hope it is not too late to heal old wounds."
 
 BTWK_startup.0001.t.arthur_pendragon: "The Royal Bastard"
 BTWK_startup.0001.desc.arthur_pendragon: "As the bastard son of [uther_pendragon.GetFirstName], King of [GetTitleByKey('k_dumnonia').GetNameNoTier], I was in truth somewhat neglected by my father in favour of my brother [mordred_ap_uther.GetFirstName], his heir and only legitimate son. My efforts to prove myself through swordsmanship and prowess have won the admiration of many, but my most recent return to Dumnonia to fight against the Saxons saw [mordred_ap_uther.GetFirstName] killed in an ill-fated hubristic charge before I could arrive in support. In his grief and heartbreak my father blamed me for his death and banished me back to Armorica, where I have most recently been serving in the court of [ban_of_benoic.GetFirstName], King of Benoic.\n\nThe birth of [mordred_ap_uther.GetFirstNamePossessive] son, also named [mordred_pendragon.GetFirstName], has alleviated fears of an immediate succession crisis, but with my father ailing he will soon be king far before he is ready. While many have pushed for me to try to take the throne myself, I have no interest in usurping a throne that is not rightfully mine. I have vowed to defend [mordred_pendragon.GetFirstName], his throne, and Dumnonia as a whole - and that is what I will do."
 BTWK_startup.0001.a.arthur_pendragon: "I shall honour my vows - no matter what it takes."
 
 BTWK_startup.0001.desc.ambrosius: "Ambrosius Aurelianus is a name that is spoken of in either glowing reverence or bedgruding respect across all of Britannia. First of the Britons and Last of the Romans, the Ambrosii were among the most distinguished Roman families that remained in Britannia after the Roman withdrawal, with first father and then son mounting a determined resistance against Vortigern's ill-fated machinations and leading the struggle against the subsequent Saxon onslaught in a concerted effort to protect the British way of life. TODO Finish"
 
 BTWK_startup.0001.t.cumbrian: "The Old North"
 BTWK_startup.0001.desc.cumbrian: "While the northern provinces of Britannia were never quite as developed as the south, the end of Roman rule was no less impactful. Left to fend for ourselves, our newly emerging petty kingdoms were beset by waves of Pictish and Irish raiders, though the Saxons that have taken over much of the southeast have so far remained more marginal here. There is little unity among the kings of the North, even if many of them claim kinship with the great [coel_hen.GetFirstNameNicknamed]; they squabble over land, honour, and glory alike.\n\nAs much as any king is loath to submit to another, however, the memory of unity in the north is strong. It is the ambition of many a northern king to reunite all of Northern Britannia under his rule, and indeed unity among the Britons of the North may soon be needed - the Saxons will not be content with their coastal settlements forever, and who is to say what the fierce Picts and Scots could be capable of if they were to ever be united under a single king..."
 BTWK_startup.0001.a.cumbrian: "#italic I#! will be the true heir to [coel_hen.GetFirstNameNicknamed]'s legacy."
 
 BTWK_startup.0001.t.briton: "Groans of the Britons"
 BTWK_startup.0001.desc.briton: "It has been 70 years since the Roman legions left Britannia, and the decades since have not been kind. The province soon splintered into a patchwork of petty kingdoms, economic disruption emptied out the cities, and the retreat of the Imperial army opened up Britannia to barbarian raids from every direction. While rebelling Saxon foederati took over much of the east, Irish raiders swept over the west, settling on the coasts and carving out kingdoms of their own.\n\nThe Irish tide has since receded somewhat, though the power of the Saxons has only grown. While Britannia remains divided, there does exist the notion of a High King of the Britons, a first among equals who could lead the combined armies of the province against its enemies - a title most recently claimed by [uther_pendragon.GetName], but now once again vacant. With a renewed Saxon onslaught expected, it will take a strong High King to defeat the invaders and, perhaps, begin the process of reuniting the divided isle."
 BTWK_startup.0001.desc.romanobritish: "It has been 70 years since the Roman legions left Britannia, and the decades since have not been kind. The province soon splintered into petty kingdoms, economic disruption emptied out the cities, and the coasts were ravaged by the Picts and Scots. The greatest threat, however, has come from the Saxons that seized the east and continue to enroach our lands. Their ambitions grow year by year, but the rise of [aelle_of_anglia.GetName] has been especially swift - many fear he may conquer all of Britannia if he is not stopped.\n\nWhile every king jealously guards his independence, there does exist the notion of a High King of the Britons, a first among equals who could lead the combined armies of the province against its enemies - a title most recently claimed by [uther_pendragon.GetName], but now once again vacant. With a renewed Saxon onslaught expected, it will take a strong High King to defeat the invaders and, perhaps, begin the process of reuniting the divided isle."
 BTWK_startup.0001.a.briton: "We will drive the barbarians back into the sea!"
 
 BTWK_startup.0001.t.anglo_saxon: "A New [GetTitleByKey('e_aengland').GetNameNoTierNoTooltip]"
 BTWK_startup.0001.desc.anglo_saxon: "Many decades have passed since the Romans and Britons first invited our ancestors to Britannia to fight on their behalf as #italic foederati#!. After the collapse of central authority, we quickly took control of the east, and in the years since our tribes and settlements have been gradually consolidating in the lands we are now calling '[GetTitleByKey('e_aengland').GetNameNoTier]'. To the north and west, the Britons have formed their petty own kingdoms which sometimes rival our own in strength, though they remain more often than not on the back foot.\n\nOur peoples are divided between many kings, and as more groups rise in the north and the midlands more kingdoms may well soon emerge. While no king has ever managed to unite all the Anglo-Saxons together, the ambitious [aelle_of_anglia.GetName] aims to be the first to do so and he has become so powerful that some say he will soon be called 'Bretwalda' - wide-ruler over Britain. And indeed, perhaps the Anglo-Saxons will one day rule over all of Britain..."
 BTWK_startup.0001.a.anglo_saxon: "Britannia shall be ours!"
 
 BTWK_startup.0001.t: "The Sundered Province"
 BTWK_startup.0001.desc: "Nowhere else has the decline of the Roman Empire been felt more keenly than in Britannia. War, plague, and invasion led to the collapse of central authority not long after the withdrawal of the Roman army and the former province splintered into a patchwork of petty kingdoms, while the economic collapse has almost eliminated the Roman way of life. The province is now divided between Anglo-Saxons in the east and Britons in the north and west, with some Irish raiders settling down on the western coasts to found kingdoms of their own as well. Attempts by the Britons to rally around a High King have so far proved ephemeral, with no single king able to exert the authority needed to bring the fractured province back together.\n\nBut where there is disorder and uncertainty, there is also opportunity and possibilities that would never have been fathomable before. The fate of Britannia lies wide open - who will be the one to grasp it?"
 BTWK_startup.0001.a: "From these dark times, it will be #italic my#! name that is remembered."
 
 BTWK_startup.0001.arthur_tt.1: "While your father [uther_pendragon.GetFirstName] may never forgive you for the death of your brother [mordred_ap_uther.GetFirstName], even he admits that you will be needed to help defend the kingdom. Once he passes, you can expect to be #V recalled#! back to [GetTitleByKey('k_dumnonia').GetNameNoTier] to join the regency council and be granted the [GetTitleByKey('d_centdumnonia').GetName] to help support your men. Then, the hard task of defending [GetTitleByKey('k_dumnonia').GetNameNoTier] will begin..."
 BTWK_startup.0001.arthur_tt.2: "You are currently unmarried, and though you have had twin sons with your lover [ailleann_arthur_lover.GetFirstName] her low birth precludes you from marrying her. Perhaps once you return to Dumnonia you will find a suitable match..."
 BTWK_startup.0001.britannia_struggle_tt: "The [britannia_struggle|E] has begun! The End of Roman Britain has shattered the island, with petty kings and opportunistic warlords alike feuding for dominance and carving out new kingdoms over the ruins of the old province. Only by reuniting Britannia once and for all, whether as #V High King#!, #V $emperor_feudal_male_west_germanic_group_aengland_bretwalda$#!, or even #V Imperator#!, will we be able to bring the struggle to an end."
 BTWK_startup.0001.britannia_high_kingship_tooltip: "Any sufficiently powerful British king can attempt to claim the [high_kingship|E], denoting informal leadership over all of [GetTitleByKey('e_britannia').GetNameNoTier]. While the authority of a High King outside his kingdom is initially quite limited, that can be increased by passing [britannia_reforms|E] to institutionalize the title and gradually centralize power around the High King, potentially reuniting the province under a single ruler once more."
 BTWK_startup.0001.hen_ogledd_tooltip: "While the north is not to be underestimated, the center of power in Britannia has always lay in the south. As a northern king, any of our attempts to claim the [high_kingship|E] will not be taken seriously until [GetTitleByKey('e_hen_ogledd').GetNameNoTier] is united under our rule."
 BTWK_startup.0001.aelle_tooltip: "All the Anglo-Saxons north of the Thames recognize you as their overlord - but this a far cry from your ambition to be recognized as [bretwalda|E] over all of [GetTitleByKey('e_aengland').GetNameNoTier]. With warriors and adventurers continuing to flock to your banner, you will soon be able to embark on a grand campaign to #high conquer the British midlands#!, and from there perhaps all of the south - but with such a relentless focus on conquest, will your large and unwieldy kingdom be able to #high survive beyond your passing#!?"
 BTWK_startup.0001.aelle_warning_tooltip: "[aelle_of_anglia.GetName] has made little secret of his ambitions and will soon embark on a grand campaign to #high conquer the British midlands#!, and from there perhaps all of the south. However, his focus on conquest has left little room for proper consolidation or stabilization - an unwieldy construction held together only by personal loyalty or fear, his kingdom will surely #high collapse#! after his death."
 BTWK_startup.0001.aengland_bretwalda_tooltip: "The goal of any self-respecting Anglo-Saxon ruler is to subject all the other kings under their hegemony and become recognized as [bretwalda|E]. While merely a nominal title, it is only from this position of leadership that it will be possible to consolidate our supremacy over [GetTitleByKey('e_aengland').GetNameNoTier] and permanently subject ths other kingdoms to our own to unite the island."
 BTWK_startup.0001.rise_of_mercia_wessex_tt: "While the midlands and the upper Thames remain dominated by Briton kings for the moment, that may not remain the case forever. An ambitious Saxon warlord in the south may eventually attempt to #V rise up#! and claim the lands that are beginning to be called #V [GetTitleByKey('k_wessex').GetNameNoTier]#!, while Anglian lords in the midlands - or perhaps even the exiled Scylding princes - may attempt to forge a new kingdom in #V [GetTitleByKey('k_mercia').GetNameNoTier]#!."
 BTWK_startup.0001.rise_of_mercia_wessex_warning_tt: "Even once the threat of Aelle has abated, we should not assume that we will be safe from further Saxon invasions. The Saxons in the south may one day attempt to #V rise up#! and claim the lands that they are beginning to call #V [GetTitleByKey('k_wessex').GetNameNoTier]#!, while the exiled Scylding princes may someday decide to stake their claim on the midlands and attempt to forge a new kingdom in #V [GetTitleByKey('k_mercia').GetNameNoTier]#!."
 BTWK_startup.0001.rise_of_bernicia_deira_tt: "While the north remains dominated by Britons for now, the Anglian settlements on the coast may one day form the nuclei of new Anglo-Saxon kingdoms. In the event of Briton weakness, ambitious Angle lords may be able to #V rise up#! to forge the new kingdoms of #V [GetTitleByKey('k_bernicia').GetNameNoTier]#! and #V [GetTitleByKey('k_deira').GetNameNoTier]#!."
 BTWK_startup.0001.rise_of_bernicia_deira_warning_tt: "While the eastern coasts are peaceful for now, we should not assume that north will continue to be safe from the Saxon menace. Ambitious Angle lords may one day decide to take advantage of Briton weakness and attempt to #V rise up#! to forge new kingdoms in #V [GetTitleByKey('k_bernicia').GetNameNoTier]#! and #V [GetTitleByKey('k_deira').GetNameNoTier]#!."