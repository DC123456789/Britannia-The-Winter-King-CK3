l_english:
 BTWK_government.0001.t: "A [GetGovernment('feudal_government').GetNameNoTooltip] [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]"
 BTWK_government.0001.desc: "The old ways have served as well for many generations, but we all can see how it is reaching its limits. As [actor.GetTitleAsNameNoTooltip] of [actor.GetPrimaryTitle.GetNameNoTierNoTooltip], I have concluded that they are no longer enough for this new era and that we must adopt the [GetGovernment('feudal_government').GetNameNoTooltip] system and its principles if our [actor.GetPrimaryTitle.GetTierAsNameNoTooltip] is to continue forwards. Only by working more closely together will [actor.GetPrimaryTitle.GetNameNoTierNoTooltip] reach new heights!"
 BTWK_government.0001.a: "For a stronger [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]!"
 easier_for_vassals_to_convert_to_feudal: "Our [GetGovernment('pre_feudal_government').GetNameNoTooltip] [vassals|E] will be able to reform to [feudalism|E] more easily"
 msg_vassal_pre_feudal_to_feudal: "Vassal has become [GetGovernment('feudal_government').GetNameNoTooltip]"
 msg_vassal_pre_feudal_to_feudal_desc: "Your vassal, [ROOT.Char.GetShortUIName], has reformed [ROOT.Char.GetHerHis] government and become adopted the [GetGovernment('feudal_government').GetNameNoTooltip] System"
 
 BTWK_government.0002.opening: "[actor.Custom2('AppropriateGreeting', ROOT.Char)]"
 BTWK_government.0002.a: "Very well then."
 easier_to_convert_to_feudal: "If we are [GetGovernment('pre_feudal_government').GetNameNoTooltip], we will be able to reform to [feudalism|E] more easily"
 
 BTWK_government.0003.t: "A [GetGovernment('germanic_government').GetNameNoTooltip] [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]"
 BTWK_government.0003.desc: "Our ways of governing have worked well enough in the past, but never quite fully captured the importance that [actor.GetCulture.GetNameNoTooltip] culture places on blood ties and familial relations. Now that we are a [actor.GetCulture.GetNameNoTooltip] realm, it is past time that we reformed our government to respect these ties more appropriately. Family is important - only by recognizing these ties and making sure to properly attending to our noble families will [actor.GetPrimaryTitle.GetNameNoTierNoTooltip] reach new heights!"
 BTWK_government.0003.a: "Blood is the fulcrum around which all politics turns."
 sub_roman_vassals_have_converted: "My [sub_roman|E] vassals will adopt [germanic_government|E]"
 msg_vassal_to_germanic: "Vassal has become [GetGovernment('germanic_government').GetNameNoTooltip]"
 msg_vassal_to_germanic_desc: "Your vassal, [ROOT.Char.GetShortUIName], has reformed [ROOT.Char.GetHerHis] government and become [GetGovernment('germanic_government').GetNameNoTooltip]"
 
 BTWK_government.0004.opening: "[actor.Custom2('AppropriateGreeting', ROOT.Char)]"
 BTWK_government.0004.a: "I expect that my family will be given its rightful honours, then."
 
 BTWK_government.0005.t: "A [GetGovernment('sub_roman_government').GetNameNoTooltip] [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]"
 BTWK_government.0005.desc: "Our ways of governing have worked well enough in the past, but always placed too much emphasis on blood ties and familial relations. Now that we are a [actor.GetCulture.GetNameNoTooltip] realm, it is past time that we reformed our government to be more properly meritocratic. Family may be important, but cannot be the be-all and end-all that our government revolves around - only then will [actor.GetPrimaryTitle.GetNameNoTierNoTooltip] reach new heights!"
 BTWK_government.0005.a: "Merit, influence, and personal loyalty - that's where it's at."
 germanic_vassals_have_converted: "My [germanic|E] vassals will adopt [sub_roman_government|E]"
 msg_vassal_to_sub_roman: "Vassal has become [GetGovernment('sub_roman_government').GetNameNoTooltip]"
 msg_vassal_to_sub_roman_desc: "Your vassal, [ROOT.Char.GetShortUIName], has reformed [ROOT.Char.GetHerHis] government and become [GetGovernment('sub_roman_government').GetNameNoTooltip]"
 
 BTWK_government.0006.opening: "[actor.Custom2('AppropriateGreeting', ROOT.Char)]"
 BTWK_government.0006.a: "I look forward to my future appointments, then."
 
 BTWK_government.0007.t: "$major_decisions.0001.t$"
 BTWK_government.0007.desc.roman_empire: "Our empire has outgrown the streamlined administration that has served us well in the past. The old Imperial administration was a wonder of bureaucracy at its height, capable of efficiently governing the vast and disparate provinces of the Empire, and so it will do the same for us. Only with these reforms will [actor.GetPrimaryTitle.GetNameNoTierNoTooltip] reach its full potential and be a true successor of the Empire of old!"
 BTWK_government.0007.desc: "Our empire has outgrown the streamlined administration that has served us well in the past. The old Roman Imperial administration was a wonder of bureaucracy at its height, capable of efficiently governing the vast and disparate provinces of the Roman Empire, and so it will do the same for us. Only with these reforms will [actor.GetPrimaryTitle.GetNameNoTierNoTooltip] reach its full potential and be the true equal of Rome!"
 BTWK_government.0007.a: "For the renewed Empire!"
 bureaucratic_vassals_have_converted_to_administrative: "My [government_bureaucratic_type|E] governors will adopt [administrative_government|E]"
 msg_vassal_to_admin: "Governor has become [GetGovernment('administrative_government').GetNameNoTooltip]"
 msg_vassal_to_admin_desc: "Your governor, [ROOT.Char.GetShortUIName], has reformed [ROOT.Char.GetHerHis] government and become [GetGovernment('administrative_government').GetNameNoTooltip]"
 
 BTWK_government.0008.opening: "[actor.Custom2('AppropriateGreeting', ROOT.Char)]"
 BTWK_government.0008.a: "For the renewed Empire!"
 
 BTWK_government.0009.t: "Decaying Administration"
 BTWK_government.0009.desc: "Our Imperial Administration was designed for an empire far larger than the one I now rule. The multitude of offices that once governed our many provinces seem like an anachronism now, many of them now merged together or even allowed to fall into abeyance. While our bureaucracy remains largely intact, it is gradually being streamlined and stipped down from its former, now extraneous size, and at this rate it will not be long before our administration will have slipped into something distinctively sub-Imperial."
 BTWK_government.0009.a: "Is maintaining the facade really still worth it?"
 BTWK_government.0009.a.tt.sub_roman: "If our [realm_size|0] remains under #V [EmptyScope.ScriptValue('BTWK_admin_min_realm_size')]#! for at least #high 10#! years, then our [government_form|E] will decay into [GetGovernment('sub_roman_government').GetName]"
 BTWK_government.0009.a.tt.germanic: "If our [realm_size|0] remains under #V [EmptyScope.ScriptValue('BTWK_admin_min_realm_size')]#! for at least #high 10#! years, then our [government_form|E] will decay into [GetGovernment('germanic_government').GetName]"
 
 BTWK_government.0010.t: "End of the Imperial Administration"
 BTWK_government.0010.desc: "With our recent losses, the administration we have inherited is regrettably no longer fit for purpose for a realm of our size. While it pains me to see these so many of these great offices be abolished or go into abeyance, it cannot be denied that they no longer serve a real purpose, and a streamlining of our administration is needed to more efficiently use our resources. Perhaps one day, when our empire has recovered from its losses and reclaimed its rightful territories, the Imperial administration can be restored."
 BTWK_government.0010.a: "An unfortunate but necessary step."
 administrative_vassals_have_converted_to_sub_roman: "My [administrative_government|E] governors will adopt [sub_roman_government|E]"
 administrative_vassals_have_converted_to_germanic: "My [administrative_government|E] governors will adopt [germanic_government|E]"
 
 BTWK_government.0011.opening: "[actor.Custom2('AppropriateGreeting', ROOT.Char)]"
 BTWK_government.0011.a: "Unfortunate but necessary, I suppose."