l_english:
 # Britannia struggle events
 BTWK_britannia_struggle.0011.t: "Invasion"
 BTWK_britannia_struggle.0011.desc: "The tenuous period of relative peace has been definitively broken. Not to be content with their existing holdings, Saxon warlords are once again the march, seeking to conquer new lands and forge new kingdoms to call their own. All across Britain, kings and princes feud amongst themselves, each hoping to use the strife to settle old scores and establish their supremacy over the island. In this time of conflict, there is little certainty except that whatever happens, the face of Britannia will be changed forever."
 BTWK_britannia_struggle.0011.a.anglo_saxon: "Britannia shall be ours!"
 BTWK_britannia_struggle.0011.a.briton_roman: "Britannia will not fall!"
 BTWK_britannia_struggle.0011.a: "Truly a time of instability and opportunity."
 BTWK_britannia_struggle.0011.a.tt: "The [britannia_struggle|E] has entered the [struggle_britannia_phase_invasion|E] [struggle_phase_phase|E]"
 BTWK_britannia_struggle.0012.t: "Detente"
 BTWK_britannia_struggle.0012.desc: "The strife of the last many years has been fierce and unrelenting, but no war can go forever. The men of Britannia have grown tired of the continuous fighting and their kings have let the conflicts subside to consolidate their gains and rebuild their battered kingdoms. While the struggle is far from over and the island remains divided between Briton and Saxon, it appears that we may be heading towards a era of relative peace and security. But with ambitious kings at every corner still dreaming of conquest and hegemony, how long can this peace last?"
 BTWK_britannia_struggle.0012.a.anglo_saxon: "Merely a respite before we go on the offensive again."
 BTWK_britannia_struggle.0012.a.briton_roman: "We must use this time to prepare for the wars to come."
 BTWK_britannia_struggle.0012.a: "A welcome respite, but we must not become complacent."
 BTWK_britannia_struggle.0012.a.tt: "The [britannia_struggle|E] has entered the [struggle_britannia_phase_detente|E] [struggle_phase_phase|E]"
 BTWK_britannia_struggle.0013.t: "Consolidation"
 BTWK_britannia_struggle.0013.desc: "The era of warlords and petty kings is coming to an end. The rise of proper kingdoms, both Briton and Saxon, allows for greater realms and stronger rulers, forcing the remaining minor lords to consolidate or submit. The peoples of Britannia move away from old tribal identities and reinvent themselves in the mould of the new and rising kingdoms. Whether as High King, $emperor_feudal_male_west_germanic_group_aengland_bretwalda$, or something else entirely, the time has come for kings to look towards greater and more expansive ambitions, and perhaps even dream of the reunification of the island..."
 BTWK_britannia_struggle.0013.a.anglo_saxon: "The Age of the Saxons has come!"
 BTWK_britannia_struggle.0013.a.briton_roman: "The dream of Britannia beckons..."
 BTWK_britannia_struggle.0013.a: "And we will ensure that this time is ours!"
 BTWK_britannia_struggle.0013.a.tt: "The [britannia_struggle|E] has entered the [struggle_britannia_phase_consolidation|E] [struggle_phase_phase|E]"
 BTWK_britannia_struggle.0014.t: "Unification"
 BTWK_britannia_struggle.0014.desc: "The struggle for Britannia is approaching its end. Would-be hegemons attempt to bring the entire island under their control, while the other remaining kingdoms fight to maintain their independence or strive for a hegemony of their own. One way or another, the era of division is approaching its end, and the fate of Britannia - whether it be Briton, Saxon, or something else entirely - will be decided once and for all."
 BTWK_britannia_struggle.0014.a.anglo_saxon: "For a new and united [GetTitleByKey('e_aengland').GetNameNoTierNoTooltip]!"
 BTWK_britannia_struggle.0014.a.briton_roman: "For a reunited [GetTitleByKey('e_britannia').GetNameNoTierNoTooltip]!"
 BTWK_britannia_struggle.0014.a: "And a [ROOT.Char.GetCulture.GetNameNoTooltip] triumph it will be!"
 BTWK_britannia_struggle.0014.a.tt: "The [britannia_struggle|E] has entered the [struggle_britannia_phase_unification|E] [struggle_phase_phase|E]"
 
 BTWK_britannia_struggle.0020.t: "[WordA_An(conqueror.GetCulture.GetNameNoTooltip)|U] [conqueror.GetCulture.GetNameNoTooltip] Britain"
 BTWK_britannia_struggle.0020.desc.conqueror: "When Britannia fractured after the withdrawal of the Roman armies, many assumed that it would be either native Briton lords or descendants of the Anglo-Saxon foederati that would come to dominate and eventually reunite the island. Few, if any, considered the [conqueror.GetCulture.GetCollectiveNounNoTooltip] as even a possibility for the unifiers of the province, and yet it is #italic me#! who is now universally recognized as lord over all Britannia. Britons and Saxons alike have been subjugated and brought to heel, some bitter holdouts still mourning their own dashed dreams of ascendancy, while the wise among them accept the inevitable and offer themselves into my service to help build the new Britannia. A new chapter has opened in the story of Britain - and it will be us who write it."
 BTWK_britannia_struggle.0020.desc: "When Britannia fractured after the withdrawal of the Roman armies, many assumed that it would be either native Briton lords or descendants of the Anglo-Saxon foederati that would come to dominate and eventually reunite the island. Few could have predicted that it would be the [conqueror.GetCulture.GetCollectiveNounNoTooltip] who would bring the province to heel, and yet it is [conqueror.GetName] who is now universally recognized as lord over all Britannia. Britons and Saxons alike either chafe under the new [conqueror.GetCulture.GetNameNoTooltip] supremacy, their own dreams of ascendancy crushed, or accept the inevitable and offer themselves in service of their now well entrenched overlord. A new chapter has opened in the story of Britain - and it seems that it will be the [conqueror.GetCulture.GetCollectiveNounNoTooltip] who write it."
 BTWK_britannia_struggle.0020.a.conqueror: "A new dawn for Britannia, under its #italic rightful#! rulers."
 BTWK_britannia_struggle.0020.a.briton: "And yet, we still remain, waiting to reclaim our homeland..."
 BTWK_britannia_struggle.0020.a.anglo_saxon: "The dream of [GetTitleByKey('e_aengland').GetNameNoTierNoTooltip] was not to be..."
 BTWK_britannia_struggle.0020.a.roman: "An unfortunate fate for Britannia."
 BTWK_britannia_struggle.0020.a.other_in_britannia: "A new overlord is here."
 BTWK_britannia_struggle.0020.a: "An unexpected turn, for sure."
 BTWK_britannia_struggle.0020.a.tt: "The [britannia_struggle|E] has ended with [WordA_An(conqueror.GetCulture.GetNameNoTooltip)] #color_yellow;bold [conqueror.GetCulture.GetNameNoTooltip] Conquest#!! The [conqueror.GetCulture.GetCollectiveNounNoTooltip] have conquered Britannia and made it their own, and from now on the island will be under their rightful dominion."

 # Anglo-Saxon events
 BTWK_anglo_saxon_invasions.0002.t: "The Anglian Invasion"
 BTWK_anglo_saxon_invasions.0002.desc: "Longboats full of Anglian settlers are grounding every month on the eastern shores of Britain. Drawn to the rising fame of [aelle_of_anglia.GetName], the newcomers are hungry and fierce warriors arriving with their wives and children, and they are looking for new lands to call 'home'.\n\n[aelle_of_anglia.GetFirstName] has never made a secret of [aelle_of_anglia.GetHerHis] ambitions to one day conquer all of Britannia, and with [aelle_of_anglia.GetHerHis] armies now swelling, [aelle_of_anglia.GetSheHe] has vowed to march on the Briton kingdoms of the west and push all the way to the Severn Sea. Local British rulers should strengthen their defenses and be ready to fight for their lands, or otherwise be prepared to submit to their new Anglian overlords. One way or another, a new era has surely begun..."
 BTWK_anglo_saxon_invasions.0002.a.aelle: "Soon all will recognize me as Bretwalda!"
 BTWK_anglo_saxon_invasions.0002.a.anglo_saxon: "Excellent! We shall soon rule over these lands!"
 BTWK_anglo_saxon_invasions.0002.a.briton_roman: "We must find a way to stop [aelle_of_anglia.GetHerHim]!"
 BTWK_anglo_saxon_invasions.0002.a: "This is interesting news..."
 BTWK_anglo_saxon_invasions.0002.a.tt.aelle_1: "The age of the Angles has begun, and all of Britannia lies open for the taking! You can now use the [GetCasusBelliType('duchy_conquest_cb').GetName] [casus_belli|E] on neighbouring [GetCulturePillar('heritage_brythonic').GetName] and [GetCulturePillar('heritage_latin').GetName] [culture|E] rulers."
 BTWK_anglo_saxon_invasions.0002.a.tt.aelle_2: "The Britons will surely be easy fodder for your warriors - but will your empire endure, once you are no longer around to rule it?"
 BTWK_anglo_saxon_invasions.0002.a.tt.1: "The Anglian Invasions have begun! [aelle_of_anglia.GetName] will soon begin [aelle_of_anglia.GetHerHis] conquest of the midlands, and perhaps beyond..."
 BTWK_anglo_saxon_invasions.0002.a.tt.2: "But [aelle_of_anglia.GetFirstName]'s empire is held together by loyalty to [aelle_of_anglia.GetHerHim] and [aelle_of_anglia.GetHerHim] alone. Will [aelle_of_anglia.GetHerHis] kingdom truly be able to hold together without [aelle_of_anglia.GetHerHim]?"
 ANGLIAN_WARRIORS: "Anglian Warriors"
 SOUTH_SAXON_WARRIORS: "South Saxon Warriors"
 
 BTWK_anglo_saxon_invasions.0010.t.aelle_dead: "The Death of [aelle_of_anglia.GetFirstNameNoTooltip]"
 BTWK_anglo_saxon_invasions.0010.t.aelle_deposed: "The Fall of [aelle_of_anglia.GetFirstNameNoTooltip]"
 BTWK_anglo_saxon_invasions.0010.desc.anglia_heir_aelle_dead: "My [new_holder.Custom2('RelationToMe', SCOPE.sC('aelle_of_anglia'))] [aelle_of_anglia.GetName] has taken his last breath, and thus his rule has ended. His claim to the title of Bretwalda held together the diverse tribes of Angles and Saxons in the struggle to carve out a homeland - now his death heralds a bleaker period and more divided period for our peoples. Despite my legitimate succession many of his former vassals have rejected my rule, preferring to look in amongst themselves for strength and seeking to rule as kings in their own right. It will not be long before I have to face these rebels on the field of battle and prove my right to rule, or the kingdom - and [aelle_of_anglia.GetFirstName]'s legacy - will be lost entirely."
 BTWK_anglo_saxon_invasions.0010.desc.anglia_heir_aelle_deposed: "King [aelle_of_anglia.GetFirstName] of [GetTitleByKey('k_east_anglia').GetNameNoTier] has been cast from his throne, and thus his rule has ended. His claim to the title of Bretwalda having made him the greatest King of the Saxon Shore, he now lives dishonoured, his legacy the mockery of those who have taken his crown. While some have rightfully recognized me as his successor, his fall has opened up great divisions amongst the Angles and Saxons, and now his former vassals squabble amongst one another, many denying my legitimacy to rule over them altogether. Rebellious lords across the kingdom are ignoring the authority that Aelle had upheld, and it will not be long before I have to face these rebels on the field of battle and prove my right to rule - or the kingdom will be lost entirely."
 BTWK_anglo_saxon_invasions.0010.desc.aelle_aelle_dead: "$BTWK_anglo_saxon_invasions.0010.desc.anglia_heir_aelle_dead$"
 BTWK_anglo_saxon_invasions.0010.desc.aelle_aelle_deposed_to_heir: "My treacherous vassals have cast me from my throne - and with me, all the authority that the kingship once held. It was my claim to the title of Bretwalda that held together the diverse tribes of Angles and Saxons that had submitted to my rule, and with [new_holder.GetTitledFirstNamePossessive] attempts at maintaining this claim being unfortunately almost entirely ignored, many of my former vassals are rejecting [new_holder.GetHerHis] rule and refusing [new_holder.GetHerHis] legitimacy. Across the kingdom, rebellious lords are ignoring the authority that I had so strongly upheld, and it is hard to watch the impending collapse of the kingdom I had worked so hard to build. I can only hope that my heir [new_holder.GetFirstName] will be able to defy the odds and preserve my legacy."
 BTWK_anglo_saxon_invasions.0010.desc.aelle_aelle_deposed: "My treacherous vassals have cast me from my throne - and with me, all the authority that the kingship once held. It was my claim to the title of Bretwalda that held together the diverse tribes of Angles and Saxons that had submitted to my rule, and with [new_holder.GetTitledFirstNamePossessive] pitiful attempts at maintaining this claim being almost entirely ignored, many of my former vassals are rejecting [new_holder.GetHerHis] rule and refusing [new_holder.GetHerHis] legitimacy. Across the kingdom, rebellious lords are ignoring the authority that I had so strongly upheld, and while it is hard to watch the impending collapse of the kingdom I had worked so hard to build it is a small comfort that [new_holder.GetSheHe] who dared to usurp my rightful throne may soon be left with nothing at all."
 BTWK_anglo_saxon_invasions.0010.desc.aelle_dead: "[aelle_of_anglia.GetName] has taken his last breath, and thus his rule over [aelle_of_anglia.GetPrimaryTitle.GetNameNoTier] has ended. His claim to the title of Bretwalda held together the diverse tribes of Angles and Saxons in their struggle to carve out a homeland - now his death heralds a bleaker period and more divided period for the Saxon peoples. Across his former lands his vassals now reject the new king, preferring to look in amongst themselves for strength. These rebellious types seek to be kings in their own right, leaving Aelle's beleaguered heir to try and earn his rule through strength and cunning - before the kingdom is torn asunder entirely."
 BTWK_anglo_saxon_invasions.0010.desc.aelle_deposed: "King [aelle_of_anglia.GetFirstName] of [GetTitleByKey('k_east_anglia').GetNameNoTier] has been cast from his throne, and thus his rule has ended. His claim to the title of Bretwalda having made him the greatest King of the Saxon Shore, he now lives dishonoured, his legacy the mockery of those who have taken his crown. His fall has opened up divisions amongst the Angles and Saxons, and now his former vassals squabble amongst one another, unable to agree the legitimacy of the new King. Now looking in amongst themselves for strength, new rebels across his former kingdom are ignoring the authority that Aelle had upheld, leaving his successor with the difficult task of earning his rule through strength and cunning - before the kingdom is torn asunder entirely."
 BTWK_anglo_saxon_invasions.0010.a: "I will prove myself worthy!"
 BTWK_anglo_saxon_invasions.0010.a.aelle_dead: "$BTWK_anglo_saxon_invasions.0010.a$"
 BTWK_anglo_saxon_invasions.0010.a.aelle_deposed_to_heir: "I have done what I can; it is up to [new_holder.GetFirstName] now."
 BTWK_anglo_saxon_invasions.0010.a.aelle: "A just fate for an unworthy usurper."
 BTWK_anglo_saxon_invasions.0010.a.tt: "Your vassals have rejected your legitimacy as their rightful overlord, and will soon organize in a [dissolution_faction|E] to revolt against your rule and attempt to dissolve the kingdom. Only by defeating the rebels and holding [GetTitleByKey('k_east_anglia').GetNameNoTier] together for at least #V 10#! years will you be able to prove yourself as a true heir of [aelle_of_anglia.GetFirstName], worthy of ruling over his kingdom."
 BTWK_anglo_saxon_invasions.0010.b.vassal: "[new_holder.GetSheHe] is not worthy of his legacy."
 BTWK_anglo_saxon_invasions.0010.b.anglo_saxon: "A great king and warrior has died..."
 BTWK_anglo_saxon_invasions.0010.b.briton_roman: "Perhaps this will stop the barbarians' advance..."
 BTWK_anglo_saxon_invasions.0010.b: "This is interesting news..."
 BTWK_anglo_saxon_invasions.0010.b.tt.vassal: "[new_holder.GetNamePossessive] vassals have rejected his legitimacy and will soon organize in a [dissolution_faction|E] to revolt against [new_holder.GetHerHis] rule. [new_holder.GetPrimaryTitle.GetDefinitiveName|U] may soon be at an end..."
 BTWK_anglo_saxon_invasions.0010.b.tt.other: "[new_holder.GetNamePossessive] vassals have rejected [new_holder.GetHerHis] legitimacy and will soon revolt against [new_holder.GetHerHis] rule. [GetTitleByKey('k_east_anglia').GetDefinitiveName|U] may soon be at an end..."
 BTWK_anglo_saxon_invasions.0011.t: "The Collapse of [GetTitleByKey('k_east_anglia').GetNameNoTierNoTooltip]"
 BTWK_anglo_saxon_invasions.0011.desc.former_king: "I have failed. Despite my best efforts, the disparate tribes of [GetTitleByKey('k_east_anglia').GetNameNoTier] proved impossible to hold together, and each successive defeat diminished my remaining authority until there was nothing left to rule at all. Once a great Anglo-Saxon kingdom and under King [aelle_of_anglia.GetFirstName] one of the most powerful and feared realms in Britannia, the [GetTitleByKey('k_east_anglia').GetName] is no more.\n\nWithout a unifying realm ruling over them all, the different tribes within my former kingdom are going their separate ways, with the East Saxons to the south looking to form a kingdom of their own while the Angles settled in the newly conquered west are beginning to think of themselves as 'Mercians'. His kingdom sundered, [aelle_of_anglia.GetFirstNamePossessiveNoTooltip] dream of Anglo-Saxon unity seems dead - for now."
 BTWK_anglo_saxon_invasions.0011.desc: "Once a great Anglo-Saxon kingdom and under King [aelle_of_anglia.GetFirstName] one of the most powerful and feared realms in Britannia, the [GetTitleByKey('k_east_anglia').GetName] has fallen to infighting and is no more. [former_king.GetHerHis|U] right to rule rejected by [former_king.GetHerHis] vassals who would recognize no overlord after [aelle_of_anglia.GetFirstName], King [former_king.GetFirstName] could not enforce [former_king.GetHerHis] authority after [former_king.GetHerHis] succession and the kingdom has been effectively dissolved.\n\nWithout a unifying realm ruling over them all, the different tribes within the former kingdom are going their separate ways, with the East Saxons to the south looking to form a kingdom of their own while the Angles settled in the newly conquered west are beginning to think of themselves as 'Mercians'. His kingdom sundered, [aelle_of_anglia.GetFirstNamePossessiveNoTooltip] dream of Anglo-Saxon unity seems dead - for now."
 BTWK_anglo_saxon_invasions.0011.a.former_king: "I will remember their treachery..."
 BTWK_anglo_saxon_invasions.0011.a.anglo_saxon: "[former_king.GetSheHe|U] dared to claim [aelle_of_anglia.GetFirstNamePossessiveNoTooltip] legacy, and [former_king.GetSheHe] was found wanting."
 BTWK_anglo_saxon_invasions.0011.a.briton_roman: "Hah! Let the barbarians fight among themselves!"
 BTWK_anglo_saxon_invasions.0011.a: "This is interesting news..."
 BTWK_anglo_saxon_invasions.0012.t: "[aelle_of_anglia.GetFirstNamePossessiveNoTooltip] Legacy Secured"
 BTWK_anglo_saxon_invasions.0012.desc: "Many believed my position was hopeless, with much of the kingdom rejecting my right to rule and threatening open revolt, but I have proven them wrong. The rebels who thought that I would be an easy mark have been defeated on the field of battle and forced to submit, and while I might still not quite compare to the might of [aelle_of_anglia.GetFirstName] my vassals have acknowledged that I am certainly strong enough to rule over his kingdom. Any lingering doubts about my right to rule have now well and firmly been put to rest, and if not - they, too, will see the heel of my sword."
 BTWK_anglo_saxon_invasions.0012.a: "I #italic am#! a worthy successor to his legacy."
 BTWK_anglo_saxon_invasions.0012.a.tt: "Your rule has been secured! Your vassals have accepted your legitimacy, and will no longer seek to dissolve the kingdom."
 
 BTWK_rise_of_new_anglo_saxon_kingdom_story: "Rise of [Story.MakeScope.Var('target_kingdom').Title.GetNameNoTierNoTooltip]"
 BTWK_rise_of_new_anglo_saxon_kingdom_story_desc: "The age of the Britons is over, and the age of the Saxons is here. Let the Rise of [Story.MakeScope.Var('target_kingdom').Title.GetNameNoTierNoTooltip] begin!"
 BTWK_rise_of_new_anglo_saxon_kingdom_story_end_tt: "The #V Rise of [current_story.MakeScope.Var('target_kingdom').Title.GetNameNoTierNoTooltip]#! will end"
 BTWK_anglo_saxon_invasions.0110.t: "The Rise of [target_kingdom.GetNameNoTierNoTooltip]"
 BTWK_anglo_saxon_invasions.0110.desc.foederati: "As foederati, we have loyally served the Britons for many generations now - but their time is past, and it is clear that they are not up to the task of the defending themselves. Our takeover of the kingdom is likely to be resisted by Briton holdouts and it will take some campaigning to fully subjugate the area, but then we will finally be masters of our own affairs - and, of course, in a position to properly protect the Britons from themselves. Soon, they will be speaking not of the Kings of [ROOT.Char.GetSuzerain.GetPrimaryTitle.GetNameNoTierNoTooltip], but of [target_kingdom.GetNameNoTier]!"
 BTWK_anglo_saxon_invasions.0110.desc.laeti: "As laeti, we have loyally served the Britons for many generations now - but their time is past, and it is clear that they are not up to the task of the defending the kingdom. Our takeover of the kingdom should be relatively swift, after which we will finally be masters of our own affairs - and, of course, in a position to properly protect the Britons from themselves. Soon, they will be speaking not of the Kings of [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip], but of [target_kingdom.GetNameNoTier]!"
 BTWK_anglo_saxon_invasions.0110.desc.adventurer: "Without a land to call our own, we have wandered around Britannia for quite some time now, but that will soon be at an end. The Britons of the frontier are divided and weak, and with the momentum we are gathering we should easily be able to prove our superiority and seize their lands to finally build a kingdom of our own. Soon, [target_kingdom.GetNameNoTier] will be ours, and all will know of our glory!"
 BTWK_anglo_saxon_invasions.0110.desc: "The [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] of our region are vulnerable without a powerful kingdom to unite them, but I am determined to ensure that that will soon be at an end. The Britons around us are divided and weak, and with the momentum we are gathering we should easily be able to prove our superiority and take over their lands to finally build a proper kingdom of our own. Soon, [target_kingdom.GetNameNoTier] will be ours, and a new [ROOT.Char.GetCulture.GetNameNoTooltip] hegemony secured!"
 BTWK_anglo_saxon_invasions.0110.a: "To arms!"
 BTWK_anglo_saxon_invasions.0110.a.tt.1: "The #V Rise of [target_kingdom.GetNameNoTierNoTooltip]#! has begun!"
 BTWK_anglo_saxon_invasions.0110.a.tt.2.lindsey: "While the #V Rise of [THIS.Char.Custom('BTWK_get_rise_of_anglo_saxon_kingdom_name')]#! is ongoing, [truce|E] timers will be reduced"
 BTWK_anglo_saxon_invasions.0110.a.tt.2: "While the #V Rise of [THIS.Char.Custom('BTWK_get_rise_of_anglo_saxon_kingdom_name')]#! is ongoing, [truce|E] timers will be reduced and [innovation|E] requirements for the [GetCasusBelliType('pre_feudal_subjugation_cb').GetName] [casus_belli|E] can be bypassed at a significant [prestige|U] cost"
 BTWK_anglo_saxon_invasions.0110.a.tt.3.lindsey: "The Rise of [target_kingdom.GetNameNoTierNoTooltip] will end after you create the [GetTitleByKey('d_lindsey').GetBaseName], if you become a [vassal|E] or [tributary|E], or if #V 30#! years has elapsed without managing to create the title"
 BTWK_anglo_saxon_invasions.0110.a.tt.3: "The Rise of [target_kingdom.GetNameNoTierNoTooltip] will end after you create the [target_kingdom.GetBaseName], if you become a [vassal|E] or [tributary|E], or if #V 30#! years has elapsed without managing to create the title"
 BTWK_anglo_saxon_invasions.0111.t: "The Rise of [target_kingdom.GetNameNoTierNoTooltip]"
 BTWK_anglo_saxon_invasions.0111.desc.foederati: "The [rise_of_kingdom_leader.GetCulture.GetNameNoTooltip] foederati of [rise_of_kingdom_leader.GetSuzerain.GetPrimaryTitle.GetNameNoTier], led by [rise_of_kingdom_leader.GetName], have revolted! Growing [rise_of_kingdom_leader.GetCulture.GetNameNoTooltip] power had led to discontent with their current status, and it seems that they have taken this opportunity to try to take over [rise_of_kingdom_leader.GetSuzerain.GetPrimaryTitle.GetNameNoTierNoTooltip] for themselves. The local Britons have vowed to resist and any [rise_of_kingdom_leader.GetCulture.GetNameNoTooltip] takeover is likely to be a protracted process, but the strength of the revolting foederati makes their prospects dim. This may well be the beginnings of a new [rise_of_kingdom_leader.GetCulture.GetNameNoTooltip] kingdom of [target_title.GetNameNoTier]."
 BTWK_anglo_saxon_invasions.0111.desc.laeti: "The [rise_of_kingdom_leader.GetCulture.GetNameNoTooltip] laeti of [rise_of_kingdom_leader.GetTopLiege.GetPrimaryTitle.GetNameNoTier], led by [rise_of_kingdom_leader.GetName], have revolted! Growing [rise_of_kingdom_leader.GetCulture.GetNameNoTooltip] power had led to discontent with their current status, and it seems that they have taken this opportunity to try to seize control of [rise_of_kingdom_leader.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip] for themselves. [rise_of_kingdom_leader.GetTopLiege.GetName] is attempting to resist this coup and preserve Briton power over [rise_of_kingdom_leader.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip], but their previous military reliance on the revolting laeti makes their prospects dim. This may well be the beginnings of a new [rise_of_kingdom_leader.GetCulture.GetNameNoTooltip] kingdom of [target_title.GetNameNoTier]."
 BTWK_anglo_saxon_invasions.0111.desc.adventurer: "Without a land to call [rise_of_kingdom_leader.GetHerHis] own, [rise_of_kingdom_leader.GetName] has been wandering around Britannia with [rise_of_kingdom_leader.GetHerHis] retinue for quite some time now, but that that may soon be at an end. Sensing an opportunity, [rise_of_kingdom_leader.GetTitledFirstName] has summoned [rise_of_kingdom_leader.GetHerHis] men and followers to try to seize control of several vulnerable provinces on the Briton frontier, with the hope of eventually building a realm of [rise_of_kingdom_leader.GetHerHis] own. If the local British kings cannot gather their armies and defeat this host, this may well be the beginnings of a new [rise_of_kingdom_leader.GetCulture.GetNameNoTooltip] kingdom of [target_title.GetNameNoTier]."
 BTWK_anglo_saxon_invasions.0111.desc: "Sensing an opportunity amidst continued Briton weakness, [rise_of_kingdom_leader.GetName] has gathered together a large host of followers and adventurers and embarked on a great campaign against [rise_of_kingdom_leader.GetHerHis] neighbours. While [rise_of_kingdom_leader.GetSheHe] seems to be primarily focused on conquering new lands from the Britons, [rise_of_kingdom_leader.GetTitledFirstName] has declared that [rise_of_kingdom_leader.GetHerHis] goal is to unite the [rise_of_kingdom_leader.GetCulture.GetCollectiveNounNoTooltip] of the region together and forge a new kingdom that they will be able to call their own. If the local kings cannot gather their armies and defeat this new rising power, this may well be the beginnings of a new [rise_of_kingdom_leader.GetCulture.GetNameNoTooltip] kingdom of [target_title.GetNameNoTier]."
 BTWK_anglo_saxon_invasions.0111.a.anglo_saxon: "A new Anglo-Saxon kingdom is rising!"
 BTWK_anglo_saxon_invasions.0111.a.briton_roman: "Will their invasions ever end?"
 BTWK_anglo_saxon_invasions.0111.a: "This interesting news..."
 BTWK_anglo_saxon_invasions.0111.a.tt.1: "The #V Rise of [target_kingdom.GetNameNoTierNoTooltip]#! has begun, led by [rise_of_kingdom_leader.GetName]!"
 BTWK_anglo_saxon_invasions.0111.a.tt.2: "[rise_of_kingdom_leader.GetName] will attempt to conquer neighbouring areas in order to form the [target_title.GetBaseName]. This will continue until the [target_title.GetBaseName] has been created and consolidated, [rise_of_kingdom_leader.GetName] or [rise_of_kingdom_leader.GetHerHis] successors are unlanded or subjugated, or #V 30#! years have passed."
 BTWK_anglo_saxon_invasions.0111.a.tt.2.unlanded: "[rise_of_kingdom_leader.GetName] will attempt to conquer new lands in order to form the [target_title.GetBaseName]. This will continue until the [target_title.GetBaseName] has been created and consolidated, [rise_of_kingdom_leader.GetName] or [rise_of_kingdom_leader.GetHerHis] successors are unlanded or subjugated, or #V 30#! years have passed."
 BTWK_anglo_saxon_invasions.0112.t: "The Dream Falters"
 BTWK_anglo_saxon_invasions.0112.desc: "Our conquest of [target_kingdom.GetNameNoTierNoTooltip] started off well, but quickly lost its momentum as we were unable to establish a sustained superiority over the local British kings. Years of back-and-forth have devolved into a stalemate, and I have been forced to concede that any further campaigns will be fruitless in our current situation. The dream of a great [ROOT.Char.GetCulture.GetNameNoTooltip] kingdom in [target_kingdom.GetNameNoTierNoTooltip] is not quite dead, but it will certainly have to be put aside, for now."
 BTWK_anglo_saxon_invasions.0112.a: "But one day, [target_kingdom.GetNameNoTierNoTooltip] #italic will#! rise."
 BTWK_anglo_saxon_invasions.0112.a.tt: "The #V Rise of [target_kingdom.GetNameNoTierNoTooltip]#! has ended"
 BTWK_anglo_saxon_invasions.0113.t: "An Ambition Crushed"
 BTWK_anglo_saxon_invasions.0113.desc: "It was not to be. Early successes against the Britons soon turned into demoralizing defeats, and now we have been forced to concede entirely and submit back to Briton rule. My disgruntled followers who were attracted by promises of titles and land have dispersed, and indeed we are lucky that we are still allowed to keep our lands at all. The Britons have won, and the dream of a great [ROOT.Char.GetCulture.GetNameNoTooltip] kingdom in [target_kingdom.GetNameNoTierNoTooltip] is dead - for now."
 BTWK_anglo_saxon_invasions.0113.a: "One day we will try again - and we will not falter."
 BTWK_anglo_saxon_invasions.0113.a.tt: "The #V Rise of [target_kingdom.GetNameNoTierNoTooltip]#! has ended"
 BTWK_anglo_saxon_invasions.0114.t: "[target_story.MakeScope.Var('target_kingdom').Title.GetNameNoTierNoTooltip] Rising"
 BTWK_anglo_saxon_invasions.0114.desc: "Victory! Our first campaign against the Britons has ended in success, and we have significantly expanded the extent of our control. Our eager followers have been quick to seize the best lands to settle on for themselves, and the news of my new conquests is being seen as proof that my ambitions are in fact to be taken seriously. There is more to be done before our rule over [target_story.MakeScope.Var('target_kingdom').Title.GetNameNoTierNoTooltip] can be said to be complete and secure, but this is a promising start for our new kingdom that is to come."
 BTWK_anglo_saxon_invasions.0114.a: "[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] today, [target_story.MakeScope.Var('target_kingdom').Title.GetNameNoTierNoTooltip] tomorrow!"
 
 BTWK_anglo_saxon_invasions.9001.t: "Tribal Settlements in [target_county.GetNameNoTierNoTooltip]"
 BTWK_anglo_saxon_invasions.9001.desc: "The legacy of Rome is fading away in the face of our conquest of [target_county.GetNameNoTier]. Our settlers and chieftains have abandoned the decaying remnants of the old Roman towns, preferring our traditional wooden halls in the villages, and what little remains of the old customs and administration are long gone as well. While their ruins may still stand as a reminder of past glories, it can now be definitively said that the old Roman way of life is well and firmly dead."
 BTWK_anglo_saxon_invasions.9001.a: "Reminders of a bygone era, never to return."
 BTWK_anglo_saxon_invasions.9001.a.tt.1: "The [holding|E] in [county_capital.GetName] changes to a [tribe|E]"
 BTWK_anglo_saxon_invasions.9001.a.tt.2: "Any other [castle|E] and [city|E] holdings are destroyed"
 BTWK_anglo_saxon_invasions.9003.t: "[new_culture.GetNameNoTooltip] Settlements in [target_county.GetNameNoTierNoTooltip]"
 BTWK_anglo_saxon_invasions.9003.desc: "An increasing number of [new_culture.GetName] settlers have made their home in [target_county.GetNameNoTier], settling in new villages away from the abandoned towns and ruined villas alongside locals who have begun to adopt our culture and language. The area and its people are now noticeably [ROOT.Char.GetCulture.GetNameNoTooltip] and while there are still some Britons who still hold steadfastly to their culture and identity, they have declined to a marginalized and increasingly irrelevant minority."
 BTWK_anglo_saxon_invasions.9003.a: "An excellent development." 
 BTWK_anglo_saxon_invasions.9003.toast.t: "[current_county.GetName|U] Converted [faith|E]"
 BTWK_anglo_saxon_invasions.9003.toast.desc: "Converted from [old_faith.GetName] to [new_faith.GetName]"
 