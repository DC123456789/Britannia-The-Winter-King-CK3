l_english:

 # Anglo-Saxon events
 BTWK_anglo_saxon_invasions.0002.t: "The Anglian Invasion"
 BTWK_anglo_saxon_invasions.0002.desc: "Longboats full of Anglian settlers are grounding every month on the eastern shores of Britain. Drawn to the rising fame of [aelle_of_anglia.GetName], the newcomers are hungry and fierce warriors arriving with their wives and children, and they are looking for new lands to call 'home'.\n\n[aelle_of_anglia.GetFirstName] has never made a secret of [aelle_of_anglia.GetHerHis] ambitions to one day conquer all of Britannia, and with [aelle_of_anglia.GetHerHis] armies now swelling, [aelle_of_anglia.GetSheHe] has vowed to march on the Briton kingdoms of the west and push all the way to the Severn Sea. Local British rulers should strengthen their defenses and be ready to fight for their lands, or otherwise be prepared to submit to their new Anglian overlords. One way or another, a new era has surely begun..."
 BTWK_anglo_saxon_invasions.0002.a.aelle: "Soon all will recognize me as Bretwalda!"
 BTWK_anglo_saxon_invasions.0002.a.anglo_saxon: "Excellent! We shall soon rule over these lands!"
 BTWK_anglo_saxon_invasions.0002.a.briton_roman: "We must find a way to stop [aelle_of_anglia.GetHerHim]!"
 BTWK_anglo_saxon_invasions.0002.a: "This is interesting news..."
 BTWK_anglo_saxon_invasions.0002.a.tt.aelle_1: "The age of the Angles has begun, and all of Britannia lies open for the taking! You can now use the [GetCasusBelliType('duchy_conquest_cb').GetName] [casus_belli|E] on neighbouring [GetCulturePillar('heritage_brythonic').GetName] and [GetCulturePillar('heritage_latin').GetName] [culture|E] rulers."
 BTWK_anglo_saxon_invasions.0002.a.tt.aelle_2: "The Britons will surely be easy fodder for your warriors - but will your empire endure, once you are no longer around to rule it?"
 BTWK_anglo_saxon_invasions.0002.a.tt.1: "The Anglian Invasions have begun! [aelle_of_anglia.GetName] will soon begin [aelle_of_anglia.GetHerHis] conquest of the midlands, and perhaps beyond..."
 BTWK_anglo_saxon_invasions.0002.a.tt.2: "But [aelle_of_anglia.GetFirstName]'s empire is held together by loyalty to [aelle_of_anglia.GetHerHim] and [aelle_of_anglia.GetHerHim] alone. Will [aelle_of_anglia.GetHerHis] kingdom truly be able to hold together without [aelle_of_anglia.GetHerHim]?"
 ANGLIAN_WARRIORS: "Anglian Warriors"
 
