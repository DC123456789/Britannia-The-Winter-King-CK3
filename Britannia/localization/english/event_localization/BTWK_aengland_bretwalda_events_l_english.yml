l_english:

 # Anglo-Saxon events
 BTWK_aengland_bretwalda.0001.t: "[GetTitleByKey('e_aengland').GetDefinitiveNameNoTooltip|U]"
 BTWK_aengland_bretwalda.0001.desc.bretwalda: "The most powerful king among the Anglo-Saxons is customarily entitled to be called Bretwalda - wide-ruler over Britain - and now that honour is mine to claim. With my hegemony over the Anglo-Saxons well established, my claim to the [GetTitleByKey('e_aengland').GetName] has gone unchallenged and I have now been proclaimed Bretwalda in the Great Hall of [new_bretwalda_capital_barony.GetNameNoTier]. Even those kings who have not formally submitted to my rule have recognized my hegemony over [GetTitleByKey('e_aengland').GetNameNoTier].\n\nAs Bretwalda, I lay claim to overlordship over not just all of the Anglo-Saxon kingdoms but all of Britannia as a whole. All across the island, the other kings are well aware that it is only a matter of time before they submit to my rule - willingly or not."
 BTWK_aengland_bretwalda.0001.desc.other: "As the most powerful king among the Anglo-Saxons, [Select_CString(new_bretwalda.IsFemale, 'Queen', 'King')] [new_bretwalda.GetFirstName] of [old_primary_title.GetNameNoTier] has laid claim to the [GetTitleByKey('e_aengland').GetNameNoTooltip] and has now proclaimed [new_bretwalda.GetHerselfHimself] Bretwalda in the Great Hall of [new_bretwalda_capital_barony.GetNameNoTier]. Without any realistic challenger for hegemony over the various Anglo-Saxon kingdoms, even those not formally under [new_bretwalda.GetHerHis] rule have recognized [new_bretwalda.GetHerHim] as undisputedly the strongest and most dominant king among the Anglo-Saxons.\n\nThe Bretwalda will hold [new_bretwalda.GetHerHis] title as long as he keeps proving [new_bretwalda.GetHerHis] worth on the battlefield and exerting [new_bretwalda.GetHerHis] authority over the other Anglo-Saxon kings."
 BTWK_aengland_bretwalda.0001.a: "All the other kings will bow to me!"
 BTWK_aengland_bretwalda.0001.a.gain_hegemony_score_inherited.tt: "Inherit #P [hegemony_score_starting_boost]#! [aengland_hegemony_score|E] from previous kings"
 BTWK_aengland_bretwalda.0001.a.gain_hegemony_score.tt: "Gain #P [hegemony_score_starting_boost]#! [aengland_hegemony_score|E]"
 BTWK_aengland_bretwalda.0001.a.tt.1: "The title of [bretwalda|E] is a personal honour, and until you take the decision to #V $BTWK_HK_aengland_declare_supremacy_decision$#!, the title will not be inherited on death or abdication. In addition, the other kings will only continue to recognize your title of Bretwalda as long as you can maintain your hegemony over the Anglo-Saxons. If your [aengland_hegemony_score|E] drops below #V [EmptyScope.ScriptValue('BTWK_aengland_bretwalda_hegemony_score_bretwalda_min')|0]#! for too long, your claim to supremacy will no longer be taken seriously and you will be forced to forsake the title."
 BTWK_aengland_bretwalda.0001.a.tt.2: "In addition, as a largely informal title, the [bretwalda|E] cannot have any [king|E]-tier vassals until the decision to #V $BTWK_HK_aengland_declare_supremacy_decision$#! has been taken. Until then, any [king|E]-tier vassals will be converted into [tributaries|E]. You also may not press any of [GetTitleByKey('e_aengland').GetNameNoTier]'s [de_jure|E] claims until the title has been completely formalized by taking the decision to crown yourself #V $BTWK_HK_aengland_unite_aengland_decision$#!."
 BTWK_aengland_bretwalda.0001.a.anglo_saxon_vassal: "Glory to [new_bretwalda.GetFirstName]!"
 BTWK_aengland_bretwalda.0001.a.anglo_saxon_other_king: "What pretentiousness is this?"
 BTWK_aengland_bretwalda.0001.a.anglo_saxon: "A bold claim indeed."
 BTWK_aengland_bretwalda.0001.a.briton_roman: "We must watch our borders carefully."
 BTWK_aengland_bretwalda.0001.a.other: "This is interesting news..."
 BTWK_aengland_bretwalda.0002.t: "The [GetTitleByKey('e_aengland').MakeScope.Var('aengland_primary_kingdom').Title.GetAdjectiveNoTooltip] Supremacy"
 BTWK_aengland_bretwalda.0002.desc.bretwalda: "Traditionally, the title of Bretwalda was given to any king in [GetTitleByKey('e_aengland').GetNameNoTier] who could successfully exert his control over the myriad other kings of the Anglo-Saxons, without heed to their dynasty or kingdom. However, our kings have been so dominant and more or less monopolized the title for so long that few now can even conceive of a Bretwalda that is not also a [GetTitleByKey('e_aengland').MakeScope.Var('aengland_primary_kingdom').Title.GetAdjectiveNoTooltip] king. \n\nWith the inheritance of the title now seen as an inevitability, it is only proper that we do away with the formality of each new king having to prove their authority and instead invest the title of Bretwalda as a permanent, inheritable honour for the kings of [GetTitleByKey('e_aengland').MakeScope.Var('aengland_primary_kingdom').Title.GetNameNoTier], cementing our control over [GetTitleByKey('e_aengland').GetNameNoTier]. The [GetTitleByKey('e_aengland').MakeScope.Var('aengland_primary_kingdom').Title.GetAdjectiveNoTooltip] Supremacy has now begun - and may it never end."
 BTWK_aengland_bretwalda.0002.desc.other: "Traditionally, the title of Bretwalda was given to any king in [GetTitleByKey('e_aengland').GetNameNoTier] who could successfully exert his control over the myriad other kings of the Anglo-Saxons, without heed to their dynasty or kingdom. However, with [GetTitleByKey('e_aengland').MakeScope.Var('aengland_primary_kingdom').Title.GetNameNoTier]'s rise to power, their kings have more or less monopolized the title for the past several decades, to the point where few now can conceive of a Bretwalda that is not also a [GetTitleByKey('e_aengland').MakeScope.Var('aengland_primary_kingdom').Title.GetAdjectiveNoTooltip] king. \n\nWith the inheritance of the title seen as an inevitability, [Select_CString(bretwalda.IsFemale, 'Queen', 'King')] [bretwalda.GetFirstName] has seized the opportunity to permanently invest [bretwalda.GetHerHis] heirs with the title without the formality of proving their authority, cementing [bretwalda.GetHerHis] kingdom's control over [GetTitleByKey('e_aengland').GetNameNoTier]. The [GetTitleByKey('e_aengland').MakeScope.Var('aengland_primary_kingdom').Title.GetAdjectiveNoTooltip] Supremacy has begun."
 BTWK_aengland_bretwalda.0002.a: "[GetTitleByKey('e_aengland').MakeScope.Var('aengland_primary_kingdom').Title.GetNameNoTierNoTooltip] shall forever reign!"
 BTWK_aengland_bretwalda.0002.a.tt.1: "The title of [bretwalda|E] will become inheritable and will no longer be destroyed on succession or deposition. It can still be lost if your [aengland_hegemony_score|E] drops below #V [EmptyScope.ScriptValue('BTWK_aengland_bretwalda_hegemony_score_bretwalda_min')|0]#! for too long."
 BTWK_aengland_bretwalda.0002.a.tt.2: "You are now permitted to have [king|E]-tier vassals, and can now use the #V $BTWK_enforce_vassalage_client_kingdom_interaction$#! interaction on all [king|E]-tier [BTWK_client_kingdoms|E] that share your [heritage|E]."
 BTWK_aengland_bretwalda.0002.b.anglo_saxon_vassal: "Glory to [bretwalda.GetFirstName]!"
 BTWK_aengland_bretwalda.0002.b.anglo_saxon_other_king: "[bretwalda.GetHerHis|U] rule will never extend here!"
 BTWK_aengland_bretwalda.0002.b.anglo_saxon: "Nothing can challenge [bretwalda.GetFirstNamePossessive] might now."
 BTWK_aengland_bretwalda.0002.b.briton_roman: "This is troubling news..."
 BTWK_aengland_bretwalda.0002.b.other: "This is interesting news..."
 BTWK_aengland_bretwalda.0002.b.tt: "The title of [bretwalda|E] will become inheritable and will no longer be destroyed on succession or deposition. It can still be lost if the [bretwalda|E]'s [aengland_hegemony_score|E] drops too far for too long, however."
 BTWK_aengland_bretwalda.0003.t: "King of the English"
 BTWK_aengland_bretwalda.0003.desc.bretwalda: "In a grand ceremony in the court of [bretwalda_capital_barony.GetNameNoTier], I have finally fulfilled the goal of every Anglo-Saxon king since we arrived on the shores of Britannia centuries ago - to be been proclaimed King of the undivided English peoples and hegemon of all Britannia. With most of the kings and lords of all Britannia in attendance for this grand proclamation, all of the old Anglo-Saxon kingdoms have been united together once and for all and now bow obediently to my rule. No longer will Mercians feud with Northumbrians or West Saxons with the Kentish; ancient enmities and rivalries have now been cast aside in favour of an undivided loyalty to a united [GetTitleByKey('e_aengland').GetNameNoTier] under our triumphant rule.\n\nThe power of a united [GetTitleByKey('e_aengland').GetNameNoTier] is not to be underestimated - I have little equal across the whole of the isles, and indeed I am recognized as a powerful king on the continent and beyond. As the rightful hegemon of all the British Isles, those remaining lords who have not already submitted to my rule know that it is only a matter of time before we come knocking at their doors and bringing our rightful dominion to their shores. The time of the [GetTitleByKey('e_aengland').GetAdjectiveNoTooltip] has come!"
 BTWK_aengland_bretwalda.0003.desc.other: "In a grand ceremony in the court of [bretwalda_capital_barony.GetNameNoTier], the Bretwalda [bretwalda.GetFirstName] has been proclaimed 'King of the English' and hegemon of Britannia. With most of the kings and lords of all Britannia in attendance, all of the old Anglo-Saxon kingdoms have been united together once and for all and now bow obediently to [bretwalda.GetHerHis] rule. No longer will Mercians feud with Northumbrians or West Saxons with the Kentish; ancient enmities and rivalries have now been cast aside in favour of an undivided loyalty to a united [GetTitleByKey('e_aengland').GetNameNoTier], ruled by the triumphant [bretwalda.GetDynasty.GetName] dynasty.\n\nThe power of a united [GetTitleByKey('e_aengland').GetNameNoTier] is not to be underestimated - [bretwalda.GetTitledFirstName] has little equal across the whole of the isles, and is indeed recognized as a powerful king on the continent and beyond. All across the British Isles those lords who have not already submitted know that it is only a matter of time before the [GetTitleByKey('e_aengland').GetAdjective] come knocking at their doors and bringing the [GetTitleByKey('e_aengland').GetAdjectiveNoTooltip] dominion to their shores."
 BTWK_aengland_bretwalda.0003.a: "By the will of [bretwalda.GetFaith.HighGodName], I am King of all [GetTitleByKey('e_aengland').GetNameNoTierNoTooltip]!"
 BTWK_aengland_bretwalda.0003.a.tt.1: "The [britannia_struggle|E] has ended with the #color_red;bold Rise of $e_aengland$#!! The Anglo-Saxons have united together and conquered Britannia for themselves. The new [GetTitleByKey('e_aengland').GetNameNoTierNoTooltip] looks proudly outwards, looking to subject all of the Isles under their rule."
 BTWK_aengland_bretwalda.0003.a.tt.2: "The [GetTitleByKey('e_aengland').GetName] can no longer be lost if [aengland_hegemony_score|E] drops too low, and you are now permitted press [GetTitleByKey('e_aengland').GetNameNoTier]'s [de_jure|E] claims."
 BTWK_aengland_bretwalda.0003.a.tt.3: "This modifier also gives [EmptyScope.ScriptValue('BTWK_HK_aengland_unite_aengland_modifier_conversion_factor')|+=%0] $task_promote_culture$ speed for [counties|E] in the region of [GetGeographicalRegion('btwk_world_britannia').GetName]"
 BTWK_aengland_bretwalda.0003.b.anglo_saxon: "Glory to [e_aengland.GetNameNoTierNoTooltip]!"
 BTWK_aengland_bretwalda.0003.b.briton_roman: "The Saxons have won... we must prepare for the worst."
 BTWK_aengland_bretwalda.0003.b.other: "This is interesting news..."
 
 BTWK_aengland_bretwalda.0020.t: "Death of the Bretwalda"
 BTWK_aengland_bretwalda.0020.desc.bretwalda_relative: "My [former_bretwalda_player_heir.Custom2('CloseOrExtendedFamilyRelationToMe', SCOPE.sC('former_bretwalda'))] [former_bretwalda.GetFirstName], Bretwalda over [GetTitleByKey('e_aengland').GetNameNoTier], has died. Though I may be his heir, the title of Bretwalda lies vacant once more, as only a king who has proven himself as a worthy overlord of the Anglo-Saxons could hope to claim such authority over all of [GetTitleByKey('e_aengland').GetNameNoTier].\n\nWith my [former_bretwalda_player_heir.Custom2('CloseOrExtendedFamilyRelationToMe', SCOPE.sC('former_bretwalda'))] dead, it falls to me to keep the kingdom [former_bretwalda.GetSheHe] built together, as [former_bretwalda.GetHerHis] various vassals and subjects watch closely for signs of strength or weakness, weighing whether to support my rule or take the opportunity to declare independence. The difficult task of consolidating my rule lies ahead, but one day, surely, my [former_bretwalda_player_heir.Custom2('CloseOrExtendedFamilyRelationToMe', SCOPE.sC('former_bretwalda'))]'s legacy will be mine as well..."
 BTWK_aengland_bretwalda.0020.desc.bretwalda: "My predecessor [former_bretwalda.GetFirstName], Bretwalda over [GetTitleByKey('e_aengland').GetNameNoTier], has died. Though I may be his heir, the title of Bretwalda lies vacant once more, as only a king who has proven himself as a worthy overlord of the Anglo-Saxons could hope to claim such authority over all of [GetTitleByKey('e_aengland').GetNameNoTier].\n\nWith the Bretwalda dead, it falls to me to keep the kingdom [former_bretwalda.GetSheHe] built together, as [former_bretwalda.GetHerHis] - now my - various vassals and subjects watch closely for signs of strength or weakness, weighing whether to support my rule or take the opportunity to declare independence. The difficult task of consolidating my rule lies ahead, but one day, surely, [former_bretwalda.GetFirstNamePossessive] legacy will be mine as well..."
 BTWK_aengland_bretwalda.0020.desc.other: "[former_bretwalda.GetTitledFirstName], Bretwalda over [GetTitleByKey('e_aengland').GetNameNoTier], has died. The title of Bretwalda lies vacant once more, as only a king who has proven himself as a worthy overlord of the Anglo-Saxons could hope to claim such authority over all of [GetTitleByKey('e_aengland').GetNameNoTier].\n\nWith the Bretwalda dead, [former_bretwalda.GetHerHis] various vassals and subjects watch [former_bretwalda.GetHerHis] now-succeeded heir closely for signs of strength or weakness, weighing whether to support the new [Select_CString(former_bretwalda_player_heir.IsFemale, 'Queen', 'King')] or take the opportunity to declare independence. Only time will tell if the new [Select_CString(former_bretwalda_player_heir.IsFemale, 'Queen', 'King')] [former_bretwalda_player_heir.GetFirstName] will be able to live up to the feats and expectations of [former_bretwalda_player_heir.GetHerHis] predecessor, or if it will be up to another king to take up the mantle as lord over the Anglo-Saxons."
 BTWK_aengland_bretwalda.0020.a: "In time, I too will be Bretwalda!"
 BTWK_aengland_bretwalda.0020.a.tt: "With the death of your predecessor, the title of [bretwalda|E] has gone back into abeyance"
 BTWK_aengland_bretwalda.0020.b.anglo_saxon: "Who will unite the Anglo-Saxons now?"
 BTWK_aengland_bretwalda.0020.b.briton_roman: "A true relief."
 BTWK_aengland_bretwalda.0020.b.other: "This is interesting news..."
 BTWK_aengland_bretwalda.0021.t: "Fall of the Bretwalda"
 BTWK_aengland_bretwalda.0021.desc.bretwalda: "My reign is over, and with it my hegemony over the Anglo-Saxons. Though my heir [former_bretwalda_player_heir.GetFirstName] has inherited much of my power, the title of Bretwalda lies vacant once more, as only a king who has proven himself as a worthy overlord of the Anglo-Saxons could hope to claim such authority over all of [GetTitleByKey('e_aengland').GetNameNoTier].\n\nIt now falls to [former_bretwalda_player_heir.GetFirstName] to keep the kingdom I built together, as my former vassals and subjects watch closely for signs of strength or weakness, weighing whether to support [former_bretwalda_player_heir.GetHerHis] rule or take the opportunity to declare independence. I have done all I can for [former_bretwalda_player_heir.GetPrimaryTitle.GetNameNoTierNoTooltip] - it will be up to [former_bretwalda_player_heir.GetTitledFirstName] to consolidate [former_bretwalda_player_heir.GetHerHis] rule and, perhaps, prove that [former_bretwalda_player_heir.GetSheHe] too can be called Bretwalda."
 BTWK_aengland_bretwalda.0021.desc.bretwalda_heir_relative: "My [former_bretwalda_player_heir.Custom2('CloseOrExtendedFamilyRelationToMe', SCOPE.sC('former_bretwalda'))] [former_bretwalda.GetFirstName], Bretwalda over [GetTitleByKey('e_aengland').GetNameNoTier], has abdicated [former_bretwalda.GetHerHis] throne. Though I may be his heir, the title of Bretwalda lies vacant once more, as only a king who has proven himself as a worthy overlord of the Anglo-Saxons could hope to claim such authority over all of [GetTitleByKey('e_aengland').GetNameNoTier].\n\nWith my [former_bretwalda_player_heir.Custom2('CloseOrExtendedFamilyRelationToMe', SCOPE.sC('former_bretwalda'))]'s reign over, it falls to me to keep the kingdom [former_bretwalda.GetSheHe] built together, as [former_bretwalda.GetHerHis] - now my - various vassals and subjects watch closely for signs of strength or weakness, weighing whether to support my rule or take the opportunity to declare independence. The difficult task of consolidating my rule lies ahead, but one day, surely, my [former_bretwalda_player_heir.Custom2('CloseOrExtendedFamilyRelationToMe', SCOPE.sC('former_bretwalda'))]'s legacy will be mine as well..."
 BTWK_aengland_bretwalda.0021.desc.bretwalda_heir: "My predecessor [former_bretwalda.GetFirstName], Bretwalda over [GetTitleByKey('e_aengland').GetNameNoTier], has abdicated [former_bretwalda.GetHerHis] throne to me. Though I may be [former_bretwalda.GetHerHis] heir, the title of Bretwalda lies vacant once more, as only a king who has proven himself as a worthy overlord of the Anglo-Saxons could hope to claim such authority over all of [GetTitleByKey('e_aengland').GetNameNoTier].\n\nWith [former_bretwalda.GetFirstNamePossessive] reign over, it falls to me to keep the kingdom [former_bretwalda.GetSheHe] built together, as [former_bretwalda.GetHerHis] - now my - various vassals and subjects watch closely for signs of strength or weakness, weighing whether to support my rule or take the opportunity to declare independence. The difficult task of consolidating my rule lies ahead, but one day, surely, [former_bretwalda.GetFirstNamePossessive] legacy will be mine as well..."
 BTWK_aengland_bretwalda.0021.desc.other: "The reign of [former_bretwalda.GetTitledFirstName], Bretwalda over [GetTitleByKey('e_aengland').GetNameNoTier], is over. The title of Bretwalda lies vacant once more, as only a king who has proven himself as a worthy overlord of the Anglo-Saxons could hope to claim such authority over all of [GetTitleByKey('e_aengland').GetNameNoTier].\n\n[former_bretwalda.GetFirstNamePossessive] various vassals and subjects watch [former_bretwalda.GetHerHis] now-succeeded heir closely for signs of strength or weakness, weighing whether to support the new [former_bretwalda_player_heir.Custom('GetQueenKing')] or take the opportunity to declare independence. Only time will tell if the new [Select_CString(former_bretwalda_player_heir.IsFemale, 'Queen', 'King')] [former_bretwalda_player_heir.GetFirstName] will be able to live up to the feats and expectations of [former_bretwalda_player_heir.GetHerHis] predecessor, or if it will be up to another king to take up the mantle as lord over the Anglo-Saxons."
 BTWK_aengland_bretwalda.0021.a: "I can only hope that [former_bretwalda_player_heir.GetSheHe] will be worthy."
 BTWK_aengland_bretwalda.0021.a.tt: "With your abdication, the title of [bretwalda|E] has gone back into abeyance"
 BTWK_aengland_bretwalda.0021.b.former_bretwalda_player_heir: "In time, I too will be Bretwalda!"
 BTWK_aengland_bretwalda.0021.b.anglo_saxon: "Who will unite the Anglo-Saxons now?"
 BTWK_aengland_bretwalda.0021.b.briton_roman: "Yes, let them fight among themselves..."
 BTWK_aengland_bretwalda.0021.b.other: "This is interesting news..."
 BTWK_aengland_bretwalda.0021.b.tt: "[Select_CString(former_bretwalda.IsFemale, 'Queen', 'King')] [former_bretwalda.GetFirstName] has abdicated from [former_bretwalda.GetHerHis] throne, and the title of [bretwalda|E] has gone back into abeyance."
 BTWK_aengland_bretwalda.0022.t: "A Loss of Hegemony?"
 BTWK_aengland_bretwalda.0022.desc: "Only the greatest kings who have achieved a position of absolute supremacy over the Anglo-Saxons are afforded the title of Bretwalda - and, it seems, that my control has slipped to the point where people are questioning if I am really still worthy of the honour. If I do not redouble my efforts and force the recalcitrant kings to submit, my title as Bretwalda will be in peril..."
 BTWK_aengland_bretwalda.0022.a: "This is unacceptable!"
 BTWK_aengland_bretwalda.0022.a.tt.1: "You will have #high 12 months#! to raise your [aengland_hegemony_score|E] above #V [EmptyScope.ScriptValue('BTWK_aengland_bretwalda_hegemony_score_bretwalda_min')|0]#! in order to maintain confidence in your hegemony as Bretwalda. If your [aengland_hegemony_score|E] is still below the threshold after that, your title of [bretwalda|E] will be forfeit!"
 BTWK_aengland_bretwalda.0023.t: "Hegemony Maintained"
 BTWK_aengland_bretwalda.0023.desc: "A few short campaigns was all it took to prove that my hegemony over the Anglo-Saxon kingdoms still holds strong. Any lingering doubts about my right to be called Bretwalda have been silenced by this show of strength, and my rule over [GetTitleByKey('e_aengland').GetNameNoTierNoTooltip] is as secure as ever."
 BTWK_aengland_bretwalda.0023.a: "Why did they ever doubt me?"
 BTWK_aengland_bretwalda.0023.a.tt: "Your right to hold the title of [bretwalda|E] has been secured."
 BTWK_aengland_bretwalda.0024.t: "Fall of a Hegemon"
 BTWK_aengland_bretwalda.0024.desc.bretwalda: "With the continuing loss of territory and control over my subject kings, my authority over [GetTitleByKey('e_aengland').GetNameNoTierNoTooltip] has collapsed to the point where my claim to hold imperium over the Kings of the Anglo-Saxons is no longer recognized. The other kings now refuse to address me as Bretwalda, and even my remaining subjects are questioning if I am still strong enough to protect them or if they would be better off on their own. This state of affairs is unlikely to last for long, of course - I certainly intend to try to reclaim my title in time, and it is likely that my rivals will attempt to make a play to be establish their own hegemony and be recognized as Bretwalda - but for now, no king reigns supreme over [GetTitleByKey('e_aengland').GetNameNoTierNoTooltip]."
 BTWK_aengland_bretwalda.0024.desc: "With the loss of territory and control over [former_bretwalda.GetHerHis] subject kings, the authority of the [former_bretwalda.Custom('GetQueenKing')] [former_bretwalda.GetFirstName] of [primary_kingdom.GetNameNoTier] has collapsed to the point where [former_bretwalda.GetSheHe] cannot be seriously considered to hold imperium over the Kings of the Anglo-Saxons. [former_bretwalda.GetHerHis|U] status as Bretwalda and overking of the Anglo-Saxons is no longer recognized, and even [former_bretwalda.GetHerHis] remaining subjects are questioning if [former_bretwalda.GetSheHe] is still strong enough to protect - or enforce [former_bretwalda.GetHerHis] authority - on them. In time, it is likely that another king - perhaps even [former_bretwalda.GetFirstName] [former_bretwalda.GetHerselfHimself] - will manage to reestablish a hegemony over the Anglo-Saxons and be recognized as Bretwalda, but for now, no king reigns supreme over [GetTitleByKey('e_aengland').GetNameNoTierNoTooltip]."
 BTWK_aengland_bretwalda.0024.a: "This is not over - I #italic will#! reclaim my title."
 BTWK_aengland_bretwalda.0024.a.tt: "You have lost your hegemony, and the title of [bretwalda|E] is now forfeit."
 BTWK_aengland_bretwalda.0024.b.anglo_saxon: "Only the greatest of kings are worthy of the title."
 BTWK_aengland_bretwalda.0024.b.briton_roman: "No longer so threatening now..."
 BTWK_aengland_bretwalda.0024.b.other: "This is interesting news..."
 BTWK_aengland_bretwalda.0024.b.tt: "[former_bretwalda.GetName] has lost [former_bretwalda.GetHerHis] hegemony, and the title of [bretwalda|E has been forfeited."