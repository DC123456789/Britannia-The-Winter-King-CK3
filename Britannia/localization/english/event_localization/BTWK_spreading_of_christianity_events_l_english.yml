l_english:
 spreading_of_christianity.0001.t: "The Spreading of Christianity"
 spreading_of_christianity.0001.desc.christian: "Praise the Lord and His Saints! While the last few decades have been turbulent indeed, the church has persevered as it always has and the faith has never been stronger. From Ireland to India the hard work of missionaries continues to spread the Word of God to ever more peoples who have not yet had the fortune to hear the good news. \n\nWith every passing day the church grows as more and more worshippers enter the faith, whether it be converts in still-pagan rural areas or entirely new peoples at the frontier of civilization. Surely it is only a matter of time before the whole world comes under the loving bosom of the Lord!"
 spreading_of_christianity.0001.desc.hellenic: "The Christians are spreading like a plague across Europe. Followers of the old religions are becoming fewer and fewer in the cities and larger settlements, and their missionaries are starting to make great strides even in the rural areas where our gods still hold strong. \n\nIf nothing is done, then our ancestral faith will soon be nothing more than a distant memory, an academic curiosity of the old days amidst the triumph of the cross. Can the Galilean tide be stopped? Or is it time to accept the inevitable and embrace the Christian faith as our own?"
 spreading_of_christianity.0001.desc.briton_gaelic: "The Christians are spreading like a plague across Europe. The old gods of the Romans have already largely given way to the singular worship of the Christian god, and it seems that our gods may not be much further behind. Already many chiefs and kings have decided to accept the missionaries and embrace this new religion, allowing them to spread their faith deep into our heartlands.\n\nIf nothing is done, our ancestral faith will soon be nothing more than a distant memory, a scattering of half-remembered tales amidst the triumph of the cross. Can the old ways be preserved? Or is it time to accept the inevitable and embrace the Christian faith as our own?"
 spreading_of_christianity.0001.desc.other_non_christian: "The faith of the Christians is a peculiar one, insisting on the worship of their god to the exclusion of all others and incessantly seeking to spread their faith further and further beyond. While some say that their Christ is a weak and peace-loving god, we would do well not to underestimate the zeal of his followers and the power of his church. \n\nWhile we have seen little in the way of missionary activity so far, it may only be a matter of time before their church turns its sights to us in full force. But perhaps that may not be all that bad - it could also be an opportunity to seek better ties with the rich lands of the south and harness their knowledge and culture for ourselves."
 spreading_of_christianity.0001.a.christian: "Let them hear the good news!"
 spreading_of_christianity.0001.a.hellenic: "This may be the last gasp of the old gods..."
 spreading_of_christianity.0001.a.briton_gaelic: "We must make our choice soon."
 spreading_of_christianity.0001.a.other_non_christian: "We should keep an eye on this."
 
 spreading_of_christianity.0010.t: "[current_county.GetName|U] Converted to [GetReligionByKey('christianity_religion').GetNameNoTooltip]"
 spreading_of_christianity.0010.desc: "[GetReligionByKey('christianity_religion').GetAdjectiveNoTooltip] missionaries have converted the [county.GetName] to [current_county.GetFaith.GetName] #weak ([old_faith.GetAdjective])#!"
 
 spreading_of_christianity.0020.t.decreased: "[GetReligionByKey('christianity_religion').GetNameNoTooltip] Declining in [current_sub_region.GetNameNoTooltip]"
 spreading_of_christianity.0020.t.phase_1.increased: "[GetReligionByKey('christianity_religion').GetNameNoTooltip] Established in [current_sub_region.GetNameNoTooltip]"
 spreading_of_christianity.0020.t: "[GetReligionByKey('christianity_religion').GetNameNoTooltip] [current_sub_region.GetCurrentPhase.GetType.GetNameNoTooltip] in [current_sub_region.GetNameNoTooltip]"
 spreading_of_christianity.0020.desc.phase_0.decreased.christian: "TODO"
 spreading_of_christianity.0020.desc.phase_0.decreased.non_christian: "TODO"
 spreading_of_christianity.0020.desc.phase_1.increased.christian: "Churches and missionaries are becoming a regular sight in [current_sub_region.GetName] as the [GetReligionByKey('christianity_religion').GetAdjectiveNoTooltip] faith spreads. Formerly a marginal faith with little presence outside of travelling merchants and the occaisional missionary, the church has secured a foothold of converts in the region and established a number of growing communities. While the vast majority of [current_sub_region.GetName] continues to follow the old ways, a foundation has now been established from which the faith will be able to grow."
 spreading_of_christianity.0020.desc.phase_1.increased.non_christian: "Churches and missionaries are becoming a regular sight in [current_sub_region.GetName] as the [GetReligionByKey('christianity_religion').GetAdjectiveNoTooltip] faith spreads. Formerly a marginal faith with little presence outside of travelling merchants and the occaisional missionary, the church has secured a foothold of converts in the region and established a number of growing communities. While the vast majority of [current_sub_region.GetName] continues to follow the old ways, the [GetReligionByKey('christianity_religion').GetAdherentNamePluralNoTooltip] have now established a beachhead, and it is certain that they will not stop there."
 spreading_of_christianity.0020.desc.phase_1.decreased.christian: "TODO"
 spreading_of_christianity.0020.desc.phase_1.decreased.non_christian: "TODO"
 spreading_of_christianity.0020.desc.phase_2.increased.christian: "The [GetReligionByKey('christianity_religion').GetAdjectiveNoTooltip] faith has made great strides in its efforts to convert the people of [current_sub_region.GetName]. New churches are springing up all across the region to minister to the increasing numbers of converts, and there is no part of [current_sub_region.GetName] where the presence of the church is not at least felt. While the faith is not yet completely dominant, it is now firmly established as one of the main religions in [current_sub_region.GetName] and it may only be a matter of time before the region is completely Christianized."
 spreading_of_christianity.0020.desc.phase_2.increased.non_christian: "The [GetReligionByKey('christianity_religion').GetAdjectiveNoTooltip] faith is spreading rapidly among the people of [current_sub_region.GetName]. New churches are springing up all across the region to minister to the increasing numbers of converts, and there is no part of [current_sub_region.GetName] where the presence of [GetReligionByKey('christianity_religion').GetNameNoTooltip] is not at least felt. While it is not yet completely dominant and there are many areas where the old ways still hold strong, it is now clear that the [GetReligionByKey('christianity_religion').GetAdjectiveNoTooltip] faith has firmly established itself as one of the main religions in [current_sub_region.GetName], with no signs of slowing its spread."
 spreading_of_christianity.0020.desc.phase_2.decreased.christian: "TODO"
 spreading_of_christianity.0020.desc.phase_2.decreased.non_christian: "TODO"
 spreading_of_christianity.0020.desc.phase_3.increased.christian: "The [GetReligionByKey('christianity_religion').GetAdjectiveNoTooltip] faith is now indisputably dominant over [current_sub_region.GetName], with its followers now outnumbering all the remaining adherents of the old pagan ways. There is scarcely an area where you cannot find at least one church, and indeed in many places the faith is now so widespread that you would be hard-pressed to find any significant number of remaining pagans. There is still quite some way to go before the region can be considered fully converted, but [current_sub_region.GetName] can now be comfortably counted as among the nations of the faithful."
 spreading_of_christianity.0020.desc.phase_3.increased.non_christian: "The [GetReligionByKey('christianity_religion').GetAdjectiveNoTooltip] faith is now indisputably dominant over [current_sub_region.GetName], with its followers now outnumbering all the remaining adherents of the old ways. There is scarcely an area where you cannot find at least one church, and indeed in many places [GetReligionByKey('christianity_religion').GetNameNoTooltip] is now so widespread that you would be hard-pressed to find any significant community still following the old ways. Their dominance is not yet complete and indeed there are still some areas where the old ways remain strong, but even these are slowly fading in the face of continued pressure and may not be able to hold out for that much longer."
 spreading_of_christianity.0020.desc.phase_3.decreased.christian: "TODO"
 spreading_of_christianity.0020.desc.phase_3.decreased.non_christian: "TODO"
 spreading_of_christianity.0020.desc.phase_4.increased.christian: "The efforts of the church to convert the people of [current_sub_region.GetName] have come to fruition. All across the region the followers of the [GetReligionByKey('christianity_religion').GetAdjectiveNoTooltip] faith are dominant at every level, and only in the most isolated and remote areas will you still find communities of heavily marginalized pagans. [current_sub_region.GetName] is now well and truly a stronghold of the faith, and may it remain so until the end of days."
 spreading_of_christianity.0020.desc.phase_4.increased.non_christian: "The efforts of the [GetReligionByKey('christianity_religion').GetAdjectiveNoTooltip] church to convert the people of [current_sub_region.GetName] have come to fruition. All across the region the followers of the [GetReligionByKey('christianity_religion').GetAdjectiveNoTooltip] faith are dominant at every level, and only in the most isolated and remote areas will you still find communities of pagans who have not yet been converted. [current_sub_region.GetName] is now well and truly a [GetReligionByKey('christianity_religion').GetAdjectiveNoTooltip] province - the old ways are rapidly fading away, and it may not be long before they are lost entirely."
 spreading_of_christianity.0020.tt_phase_increased: "[current_sub_region.GetName] has moved to the [current_sub_region.GetCurrentPhase.GetType.GetName] phase of the [situation.GetName] [situation|E]. [christian_proselytization|E] Monthly Progress in the region will be #positive_value increased#!."
 spreading_of_christianity.0020.tt_phase_decreased: "[current_sub_region.GetName] has moved to the [current_sub_region.GetCurrentPhase.GetType.GetName] phase of the [situation.GetName] [situation|E]. [christian_proselytization|E] Monthly Progress in the region will be #negative_value decreased#!."
 spreading_of_christianity.0020.a.increased.christian: "Praised be the Lord!"
 spreading_of_christianity.0020.a.increased.non_christian: "Most concerning."
 spreading_of_christianity.0020.a.decreased.christian: "We must redouble our efforts and protect the faith!"
 spreading_of_christianity.0020.a.decreased.non_christian: "Perhaps now they will learn some humility..."
 
 spreading_of_christianity.0101.t: "First [GetReligionByKey('christianity_religion').GetAdjectiveNoTooltip] Anglo-Saxon [target_char.Custom('GetQueenKing')]"
 spreading_of_christianity.0101.desc: "[target_char.GetName] has become the first Anglo-Saxon King to swear off the traditional gods of the Anglo-Saxon peoples and officially adopt [GetReligionByKey('christianity_religion').GetNameNoTooltip]. This comes to the delight of [target_char.GetHerHis] [GetReligionByKey('christianity_religion').GetAdjectiveNoTooltip] subjects and the church at large which has sent many priests and missionaries to [target_char.GetHerHis] kingdom to help establish the faith, while those who still hold true to the old gods watch these developments with worry.\n\n[target_char.GetTitledFirstNamePossessive] conversion is a watershed moment for the Anglo-Saxons, many of who are now looking at the possibility of following [target_char.GetHerHis] lead with renewed interest. [target_char.GetTitledFirstName] has made [target_char.GetHerHis] mark as the first [GetReligionByKey('christianity_religion').GetAdjectiveNoTooltip] Anglo-Saxon [target_char.Custom('GetQueenKing')] - but [target_char.GetSheHe] is unlikely to be the last."
 spreading_of_christianity.0101.tt: "[GetCulturePillar('heritage_west_germanic').GetName] [heritage|E] [counties|E] will no longer get a penalty to [christian_proselytization|E] Monthly Progress"
 spreading_of_christianity.0101.a.anglosaxon.christian: "Excellent! We will rule Britain in the name of God!"
 spreading_of_christianity.0101.a.anglosaxon.non_christian: "This is unacceptable! We must remain true to our ancient Gods!"
 spreading_of_christianity.0101.a.briton.christian: "At last, the true light of God has touched those brutal boors."
 spreading_of_christianity.0101.a.briton.non_christian: "They are barbarians no matter which god they worship..."
 spreading_of_christianity.0101.a.other.christian: "Praised be the Lord!"
 spreading_of_christianity.0101.a.other_non_christian: "This is troubling news..."