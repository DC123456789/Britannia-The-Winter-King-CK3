 # Culture shift events
 culture_shifts.0011.t: "The [new_culture.GetNameNoTooltip] Culture"
 culture_shifts.0011.desc.hybrid.non_west_germanic_parent_culture_char: "The [dominant_west_germanic_culture.GetCollectiveNounNoTooltip] have been settled in Britannia for many generations now, and the differences between the disparate groups spread over the island are becoming increasingly apparent. Here in [new_culture_kingdom.GetNameNoTier], this has become especially apparent as we [old_culture.GetCollectiveNounNoTooltip] have been mixing and assimilating into the larger [dominant_west_germanic_culture.GetNameNoTooltip] population. While they still consider other [dominant_west_germanic_culture.GetCollectiveNounNoTooltip] kin, it is a common sentiment that those outside our local region and kingdom are becoming somewhat unfamiliar and foreign, and both [dominant_west_germanic_culture.GetCollectiveNounNoTooltip] and us [old_culture.GetCollectiveNounNoTooltip] are abandoning the old tribal identities and divisions in favour of seeing ourselves as first and foremost [new_culture.GetName]."
 culture_shifts.0011.desc.hybrid.culture_char: "Us [dominant_west_germanic_culture.GetCollectiveNounNoTooltip] have been settled in Britannia for many generations now, and the differences between us and the more faraway groups are becoming increasingly apparent. Inevitably, here in [new_culture_kingdom.GetNameNoTier], this has become especially apparent as we mix with the ruling [old_culture.GetCollectiveNounNoTooltip] and while we still feel that the other [dominant_west_germanic_culture.GetCollectiveNounNoTooltip] are kin it is hard not to feel that those outside our local region and kingdom are becoming somewhat unfamiliar and foreign. While we still proudly call ourselves [dominant_west_germanic_culture.GetCollectiveNounNoTooltip], in truth we now see ourselves as first and foremost [new_culture.GetName]."
 culture_shifts.0011.desc.hybrid: "The [dominant_west_germanic_culture.GetCollectiveNounNoTooltip] have been settled in Britannia for many generations now, and the differences between the disparate groups spread over the island are becoming increasingly apparent. In [new_culture_kingdom.GetNameNoTier], this has become especially apparent as the local [dominant_west_germanic_culture.GetNameNoTooltip] population mixes with the ruling [old_culture.GetCollectiveNounNoTooltip] and they are beginning to identify more with their local region and kingdom rather than the old tribal identities. While they still proudly call themselves [dominant_west_germanic_culture.GetCollectiveNounNoTooltip], it is becoming increasingly clear that they are now first and foremost [new_culture.GetName]."
 culture_shifts.0011.desc.divergent.western_cultures.culture_char: "Us [old_culture.GetCollectiveNounNoTooltip] have been settled in Britannia for many generations now, and the differences between us and the more faraway groups are becoming increasingly apparent. Inevitably, here in [new_culture_kingdom.GetNameNoTier], this has become especially apparent as we mix with the assimilating Britons and while we still feel that the other [old_culture.GetCollectiveNounNoTooltip] are kin it is hard not to feel that those outside our local region and kingdom are becoming somewhat unfamiliar and foreign. While we still proudly call ourselves [old_culture.GetCollectiveNounNoTooltip], in truth we now see ourselves as first and foremost [new_culture.GetName]."
 culture_shifts.0011.desc.divergent.western_cultures: "The [old_culture.GetCollectiveNounNoTooltip] have been settled in Britannia for many generations now, and the differences between the disparate groups spread over the island are becoming increasingly apparent. In [new_culture_kingdom.GetNameNoTier], this has become especially apparent as the local [old_culture.GetNameNoTooltip] population mixes with the assimilating Britons, and they are beginning to identify more with their local region and kingdom rather than the old tribal identities. While they still proudly call themselves [old_culture.GetCollectiveNounNoTooltip], it is becoming increasingly clear that they are now first and foremost [new_culture.GetName]."
 culture_shifts.0011.desc.divergent.culture_char: "Us [old_culture.GetCollectiveNounNoTooltip] have been settled in Britannia for many generations now, and the differences between us and the more faraway groups are becoming increasingly apparent. Inevitably, here in [new_culture_kingdom.GetNameNoTier] we have taken notice of this and while we still feel that the other [old_culture.GetCollectiveNounNoTooltip] are kin it is hard not to feel that those outside our local region and kingdom are becoming somewhat unfamiliar and foreign. While we still proudly call ourselves [old_culture.GetCollectiveNounNoTooltip], in truth we now see ourselves as first and foremost [new_culture.GetName]."
 culture_shifts.0011.desc.divergent: "The [old_culture.GetCollectiveNounNoTooltip] have been settled in Britannia for many generations now, and the differences between the disparate groups spread over the island are becoming increasingly apparent. In [new_culture_kingdom.GetNameNoTier], the local [old_culture.GetNameNoTooltip] population has taken notice of this and they are beginning to identify more with their local region and kingdom rather than the old tribal identities. While they still proudly call themselves [old_culture.GetCollectiveNounNoTooltip], it is becoming increasingly clear that they are now first and foremost [new_culture.GetName]."
 culture_shifts.0011.culture_spread_tooltip: "The new [new_culture.GetName] culture will gradually spread to other #high Germanic#! provinces within the [new_culture_kingdom.GetName]."
 culture_shifts.0011.culture_spread_to_us_tooltip: "We have embraced the new [new_culture.GetName] culture."
 culture_shifts.0011.culture_tradition_discount_tooltip: "Reforming [traditions|E] for the [new_culture.GetName] culture will cost less [prestige|E] for the next #high 25 years#!."
 culture_shifts.0011.a.hybrid.non_west_germanic_parent_culture: "My heritage may be [old_culture.GetName], but we are all [new_culture.GetName] now!"
 culture_shifts.0011.a.hybrid: "The other [dominant_west_germanic_culture.GetCollectiveNounNoTooltip] really are different now..."
 culture_shifts.0011.a: "The other [old_culture.GetCollectiveNounNoTooltip] really are different now..."
 culture_shifts.0011.b: "Maybe they're right... are we more [new_culture.GetName] than [old_culture.GetName]?"
 culture_shifts.0011.b.tt: "We may soon have the opportunity to embrace the new [new_culture.GetName] culture."
 culture_shifts.0011.c: "We might have to keep an eye on this."
 culture_shifts.0011.c.tt: "The new [new_culture.GetName] culture may spread to some of our provinces."
 culture_shifts.0011.d: "This is interesting news..."
 culture_shifts.0021.t: "The [new_culture.GetNameNoTooltip] Culture"
 culture_shifts.0021.desc.founder: "The Anglo-Saxons have never been a united people, and that has often been our downfall with rivalries between Angles and Saxons or Mercians and Northumbrians breaking any previous attempts at Anglo-Saxon unity. But beyond that, the ties of a shared culture and heritage have always persisted - and now, that is what I am leaning on as we try to forge a united Anglo-Saxon identity, transcending regional divisions to bring all of the peoples of my growing kingdom together.\n\nThough there are some who incorrectly see this as merely a [old_culture.GetNameNoTooltip] plot to suppress their identity and subsume their culture, the idea of a united Anglo-Saxon people is fast gaining steam among our loyalists and supporters. It may only be a matter of time before people speak not of Mercians or West Saxons or Kentish, but a single united Anglecynn embracing them all."
 culture_shifts.0021.desc: "The Anglo-Saxons have never been a united people, with rivalries between Angles and Saxons or Mercians and Northumbrians often as fierce as any with the Picts or Britons. But beyond that, the ties of a shared culture and heritage have always persisted - and now, that is what [founder.GetName] is leaning on as [founder.GetSheHe] aims to forge a united Anglo-Saxon identity, transcending regional divisions to bring all of the peoples of [founder.GetHerHis] growing kingdom together.\n\nThough there are some who see this as merely a [old_culture.GetNameNoTooltip] plot to suppress their identity and subsume their culture, the idea of a united Anglo-Saxon people is fast gaining steam among those who support the unification of [GetTitleByKey('e_aengland').GetNameNoTier]. It may only be a matter of time before people speak not of Mercians or West Saxons or Kentish, but a single united Anglecynn."
 culture_shifts.0021.culture_spread_tooltip: "The new [new_culture.GetName] culture will gradually spread to other [GetCulturePillar('heritage_west_germanic').GetName] [heritage|E] provinces within [GetTitleByKey('e_aengland').GetNameNoTier]."
 culture_shifts.0021.culture_spread_to_us_tooltip: "We have embraced the new [new_culture.GetName] culture."
 culture_shifts.0021.culture_tradition_discount_tooltip: "Reforming [traditions|E] for the [new_culture.GetName] culture will cost less [prestige|E] for the next #high 25 years#!."
 culture_shifts.0021.a: "We are one people, one nation!"
 culture_shifts.0021.b: "Certainly something to think about..."
 culture_shifts.0021.b.tt: "We may soon have the opportunity to embrace the new [new_culture.GetName] culture."
 culture_shifts.0021.c: "We should keep an eye on these developents."
 culture_shifts.0021.c.tt: "The new [new_culture.GetName] culture may spread to some of our provinces."
 culture_shifts.0021.d: "This is interesting news..."
 culture_shifts.0031.t: "The [new_culture.GetNameNoTooltip] Culture"
 culture_shifts.0031.desc.britannia_exists.high_king: "Our reunification of [GetTitleByKey('e_britannia').GetNameNoTier] has had a significant impact on the Romano-Britons we have now ruled over for several decades. As [parent_briton_culture.GetCollectiveNounNoTooltip], our focus was naturally more on British unity rather than ties with the rest of the former Roman world, leading to an increasing emphasis on the more local Britannic identity, and our decades of rule have also led to a noticeable shift towards increased Brythonic influence over our Romano-British subjects. While they still hold closely to their Latinized language and Roman heritage, it has become common for them to primarily see themselves not as Roman, but rather Britannic, or as they call it in their tongue - '[new_culture.GetName]'."
 culture_shifts.0031.desc.britannia_exists.culture_char: "The reunification of [GetTitleByKey('e_britannia').GetNameNoTier] under the rule of a [parent_briton_culture.GetName] [GetTitleByKey('e_britannia').GetHolder.GetTitleAsNameNoTooltip] has had a significant impact on us, the Romano-Britons [GetTitleByKey('e_britannia').GetHolder.GetSheHe] now rules over. [GetTitleByKey('e_britannia').GetHolder.GetHerHis|U] focus on British unity over ties with the rest of the former Roman world has seen us drift further away from our fellow citizens on the continent in favour of the more local Britannic identity, and it is also impossible to deny the increasing Brythonic influence over our lands under the decades of [parent_briton_culture.GetNameNoTooltip] rule. While we still hold closely to our Latinized language and Roman heritage, we are no longer quite Roman, but rather Britannic, or as we pronounce it in our vernacular - '[new_culture.GetName]'."
 culture_shifts.0031.desc.britannia_exists: "The reunification of [GetTitleByKey('e_britannia').GetNameNoTier] under the rule of a [parent_briton_culture.GetName] [GetTitleByKey('e_britannia').GetHolder.GetTitleAsNameNoTooltip] has had a significant impact on the Romano-Britons [GetTitleByKey('e_britannia').GetHolder.GetSheHe] now rules over. [GetTitleByKey('e_britannia').GetHolder.GetHerHis|U] focus on British unity over ties with the rest of the former Roman world has led to an increasing emphasis on the local Britannic identity, while the decades of [parent_briton_culture.GetNameNoTooltip] rule have led to a noticeable shift towards increased Brythonic influence over the more Romanized Britons of the south. While they still hold closely to their Latinized language and Roman heritage, it has become common for them to primarily see themselves not as Roman, but rather '[new_culture.GetName]'."
 culture_shifts.0031.desc.parent_briton_culture_char: "The extension of [parent_briton_culture.GetName] control to the more Romanized southeast has had a significant impact on the Romano-Britons we now rule over. As [parent_briton_culture.GetCollectiveNounNoTooltip], our focus was naturally more on British unity rather than ties with the rest of the former Roman world, leading to an increasing emphasis on the more local Britannic identity, and our decades of rule have also led to a noticeable shift towards increased Brythonic influence over our Romano-British subjects. While they still hold closely to their Latinized language and Roman heritage, it has become common for them to primarily see themselves not as Roman, but rather Britannic, or as they call it in their tongue - '[new_culture.GetName]'."
 culture_shifts.0031.desc.culture_char: "The extension of [parent_briton_culture.GetName] control to the more Romanized southeast has had a significant impact on us, the Romano-Britons they now rule over. A general focus on British unity over ties with the rest of the former Roman world has seen us drift further away from our fellow citizens on the continent in favour of the more local Britannic identity, and it is also impossible to deny the increasing Brythonic influence over our lands under the decades of [parent_briton_culture.GetNameNoTooltip] rule. While we still hold closely to our Latinized language and Roman heritage, we are no longer quite Roman, but rather Britannic, or as we pronounce it in our vernacular - '[new_culture.GetName]'."
 culture_shifts.0031.desc: "The extension of [parent_briton_culture.GetName] control to the more Romanized southeast has had a significant impact on the Romano-Britons they now rule over. A general focus on British unity over ties with the rest of the former Roman world has led to an increasing emphasis on the local Britannic identity, while the decades of [parent_briton_culture.GetNameNoTooltip] rule have led to a noticeable shift towards increased Brythonic influence over the more Romanized Britons of the south. While they still hold closely to their Latinized language and Roman heritage, it has become common for them to primarily see themselves not as Roman, but rather '[new_culture.GetName]'."
 culture_shifts.0031.culture_spread_tooltip: "The new [new_culture.GetName] culture will gradually spread to other [old_culture.GetName] provinces under [GetCulturePillar('heritage_brythonic').GetName] rule."
 culture_shifts.0031.culture_spread_to_us_tooltip: "We have embraced the new [new_culture.GetName] culture."
 culture_shifts.0031.a: "[parent_briton_culture.GetNameNoTooltip] or [new_culture.GetNameNoTooltip], we are all British!"
 culture_shifts.0031.b: "Perhaps it would be easier if we followed suit..."
 culture_shifts.0031.b.tt: "We may soon have the opportunity to embrace the new [new_culture.GetName] culture."
 culture_shifts.0031.c.briton: "$culture_shifts.0031.a$"
 culture_shifts.0031.c.other: "So are they just Britons now?"
 culture_shifts.0031.c.tt: "The new [new_culture.GetName] culture may spread to some of our provinces."
 culture_shifts.0031.d: "Are they abandoning their Roman heritage?"
 culture_shifts.0031.e: "$culture_shifts.0031.a$"
 culture_shifts.0031.f: "This is interesting news..."
 culture_shifts.0033.t: "The [new_culture.GetNameNoTooltip] Culture"
 culture_shifts.0033.desc.barbarian_culture_char: "Our rise to power and establishment of a proper kingdom here in Britannia has been accompanied by a subtle but noticeable shift in the Romano-Britons we now rule over. Conscious of the political situation, the local elite has been making an effort to integrate with our ranks and even adopt aspects of our identity, while our presence as a small minority has meant that the Latinization and assimilation of the [barbarian_culture.GetNameNoTooltip] population continues apace. The differences between our people and the Romano-Britons we rule over are gradually disappearing, and it is perhaps more accurate now to describe us as one singular people - Latin in culture, [barbarian_culture.GetNameNoTooltip] in allegiance, and Britannic in spirit."
 culture_shifts.0033.desc.romanobritish_culture_char: "Our subjection and acquiescence to [barbarian_culture.GetNameNoTooltip] rule in this part of Britannia has been accompanied by a subtle but noticeable shift in our culture. Conscious of need to ingratiate ourselves with our new overlords, many of our number have been making a conscious effort to integrate with the ranks of our [barbarian_culture.GetNameNoTooltip] overlords and even adopt aspects of their identity, while the ongoing Latinization and assimilation of the [barbarian_culture.GetNameNoTooltip] population continues apace. The differences between our people and our [barbarian_culture.GetNameNoTooltip] overlords are gradually disappearing, and it is perhaps more accurate now to describe us as one singular people - Latin in culture, [barbarian_culture.GetNameNoTooltip] in allegiance, and Britannic in spirit."
 culture_shifts.0033.desc: "The rise of the [barbarian_culture.GetCollectiveNounNoTooltip] in Britannia has been accompanied by a subtle but noticeable shift in the Romano-Britons they rule over. Conscious of the political situation, the local elite has been making an effort to integrate with their [barbarian_culture.GetNameNoTooltip] overlords, while the ongoing Latinization and assimilation of the [barbarian_culture.GetNameNoTooltip] population has seen the differences between the two groups gradually disappear. It is perhaps more accurate now to describe them as one people - Latin in culture, [barbarian_culture.GetNameNoTooltip] in allegiance, and Britannic in spirit."
 culture_shifts.0033.culture_spread_tooltip: "The new [new_culture.GetName] culture will gradually spread to other [old_culture.GetName] and [barbarian_culture.GetName] provinces under [barbarian_culture.GetName] rule."
 culture_shifts.0033.culture_spread_to_us_tooltip: "We have embraced the new [new_culture.GetName] culture."
 culture_shifts.0033.a.was_barbarian: "Still [barbarian_culture.GetNameNoTooltip], but a more civilized sort."
 culture_shifts.0033.a.was_romanobritish: "No reason why one cannot be both [barbarian_culture.GetNameNoTooltip] and Britannic."
 culture_shifts.0033.b.was_barbarian: "Perhaps there is some merit to this idea..."
 culture_shifts.0033.b.was_romanobritish: "If we will no longer be Roman, perhaps this is the next best thing."
 culture_shifts.0033.b.tt: "We may soon have the opportunity to embrace the new [new_culture.GetName] culture."
 culture_shifts.0033.c: "An interesting development."
 culture_shifts.0033.c.tt: "The new [new_culture.GetName] culture may spread to some of our provinces."
 culture_shifts.0033.d: "And yet, they are still abandoning their Roman heritage."
 culture_shifts.0033.e: "This is interesting news..."
 culture_shifts.0035.t: "The [new_culture.GetNameNoTooltip] Culture"
 culture_shifts.0035.desc.culture_char: "The end of Roman Britain did not immediately spell the end of the Romano-Britons - taking charge of our own affairs, we reorganized our civitates into petty kingdoms and continued to maintain our control over much of southern Britannia. But with the collapse of Imperial rule on the continent, ties with our fellow citizens on the continent began to fray, and no strong central authority emerged to reinforce our Roman identity over more local and regional ties. Increasingly we look across the channel and to the former Roman world beyond and no longer see ourselves reflected there; while we will always treasure our Roman heritage, we are now above all [new_culture.GetName]."
 culture_shifts.0035.desc: "The end of Roman Britain did not immediately spell the end of the Romano-Britons, who reorganized their civitates into petty kingdoms and continued to control much of the south of the former province for decades afterwards. But the collapse of Imperial rule on the continent frayed ties with their fellow citizens who came under Germanic rule, and the lack of a strong central authority allowed for a growing emphasis on local and regional identities. Increasingly the Romanized Britons of the south are no longer primarily identifying themselves as Roman, but rather as [new_culture.GetName]."
 culture_shifts.0035.culture_spread_tooltip: "The new [new_culture.GetName] culture will gradually spread to other [old_culture.GetName] provinces."
 culture_shifts.0035.culture_spread_to_us_tooltip: "We have embraced the new [new_culture.GetName] culture."
 culture_shifts.0035.a: "Not an end, but an adaptation to a new era."
 culture_shifts.0035.b: "Are we soon to follow?"
 culture_shifts.0035.b.tt: "We may soon have the opportunity to embrace the new [new_culture.GetName] culture."
 culture_shifts.0035.c: "An interesting development."
 culture_shifts.0035.c.tt: "The new [new_culture.GetName] culture may spread to some of our provinces."
 culture_shifts.0035.d: "The legacy of Rome is fading away..."
 culture_shifts.0035.e: "This is interesting news..."
 culture_shifts.0036.t: "A Fading Identity"
 culture_shifts.0036.desc: "The collapse of Imperial rule in the West did not immediately the end of the idea of a single Roman people spanning all the former provinces of the empire, but the entrenchment of the barbarian kingdoms on the continent and the failure of the Emperor in Constantinople to assert his authority has seen the former citizens of the empire fall back on increasingly important local and regional identities. Even here in Britannia, where Romans still rule, fading connections with the continent and the lack of a strong central authority to reinforce our Roman identity is causing much the same to happen. Where there were once proud Romans, there may soon only be Britons remembering their Roman heritage."
 culture_shifts.0036.a: "The end of an era approaches..."
 culture_shifts.0036.a.tt: "Unless a strong [romanobritish_culture.GetName] ruler can sustain our Roman legacy by controlling at least #high 45#! [romanobritish_culture.GetName] [counties|E] or successfully claiming the [GetTitleByKey('e_britannia').GetName], a new [GetCulturePillar('heritage_romance').GetName] culture will emerge from [romanobritish_culture.GetName] in around #high 10#! to #high 20#! years."
 culture_shifts.9998.t: "A New [new_culture.GetNameNoTooltip] Identity"
 culture_shifts.9998.desc: "It was a subtle shift, one that I did not really notice until it had already happened. Where previously we were proudly [old_culture.GetNameNoTooltip], there was a slow but sure shift towards calling ourselves [new_culture.GetName], first in addition, and then in its stead, until I caught myself almost trying to correct a councillor referring to our people as primarily and foremost [old_culture.GetNameNoTooltip]! While certainly we will not soon be forgetting our heritage, it is quite clear to everyone involved that we are not really quite [old_culture.GetNameNoTooltip] anymore."
 culture_shifts.9998.culture_spread_to_us_tooltip: "We have embraced the [new_culture.GetName] culture."
 culture_shifts.9998.a: "I suppose I really am [new_culture.GetName] now."
 culture_shifts.9999.t: "[current_county.GetName|U] Converted [culture|E]"
 culture_shifts.9999.desc: "Converted from [old_culture.GetName] to [new_culture.GetName]"
