 # Culture shift events
 culture_shifts.0011.t: "The [new_culture.GetNameNoTooltip] Culture"
 culture_shifts.0011.desc.hybrid.non_west_germanic_parent_culture_char: "The [dominant_west_germanic_culture.GetCollectiveNounNoTooltip] have been settled in Britannia for many generations now, and the differences between the disparate groups spread over the island are becoming increasingly apparent. Here in [new_culture_kingdom.GetNameNoTier], this has become especially apparent as we [old_culture.GetCollectiveNounNoTooltip] have been mixing and assimilating into the larger [dominant_west_germanic_culture.GetNameNoTooltip] population. While they still consider other [dominant_west_germanic_culture.GetCollectiveNounNoTooltip] kin, it is a common sentiment that those outside our local region and kingdom are becoming somewhat unfamiliar and foreign, and both [dominant_west_germanic_culture.GetCollectiveNounNoTooltip] and us [old_culture.GetCollectiveNounNoTooltip] are abandoning the old tribal identities and divisions in favour of seeing ourselves as first and foremost [new_culture.GetName]."
 culture_shifts.0011.desc.hybrid.culture_char: "Us [dominant_west_germanic_culture.GetCollectiveNounNoTooltip] have been settled in Britannia for many generations now, and the differences between us and the more faraway groups are becoming increasingly apparent. Inevitably, here in [new_culture_kingdom.GetNameNoTier], this has become especially apparent as we mix with the ruling [old_culture.GetCollectiveNounNoTooltip] and while we still feel that the other [dominant_west_germanic_culture.GetCollectiveNounNoTooltip] are kin it is hard not to feel that those outside our local region and kingdom are becoming somewhat unfamiliar and foreign. While we still proudly call ourselves [dominant_west_germanic_culture.GetCollectiveNounNoTooltip], in truth we now see ourselves as first and foremost [new_culture.GetName]."
 culture_shifts.0011.desc.hybrid: "The [dominant_west_germanic_culture.GetCollectiveNounNoTooltip] have been settled in Britannia for many generations now, and the differences between the disparate groups spread over the island are becoming increasingly apparent. In [new_culture_kingdom.GetNameNoTier], this has become especially apparent as the local [dominant_west_germanic_culture.GetNameNoTooltip] population mixes with the ruling [old_culture.GetCollectiveNounNoTooltip] and they are beginning to identify more with their local region and kingdom rather than the old tribal identities. While they still proudly call themselves [dominant_west_germanic_culture.GetCollectiveNounNoTooltip], it is becoming increasingly clear that they are now first and foremost [new_culture.GetName]."
 culture_shifts.0011.desc.divergent.western_cultures.culture_char: "Us [old_culture.GetCollectiveNounNoTooltip] have been settled in Britannia for many generations now, and the differences between us and the more faraway groups are becoming increasingly apparent. Inevitably, here in [new_culture_kingdom.GetNameNoTier], this has become especially apparent as we mix with the assimilating Britons and while we still feel that the other [old_culture.GetCollectiveNounNoTooltip] are kin it is hard not to feel that those outside our local region and kingdom are becoming somewhat unfamiliar and foreign. While we still proudly call ourselves [old_culture.GetCollectiveNounNoTooltip], in truth we now see ourselves as first and foremost [new_culture.GetName]."
 culture_shifts.0011.desc.divergent.western_cultures: "The [old_culture.GetCollectiveNounNoTooltip] have been settled in Britannia for many generations now, and the differences between the disparate groups spread over the island are becoming increasingly apparent. In [new_culture_kingdom.GetNameNoTier], this has become especially apparent as the local [old_culture.GetNameNoTooltip] population mixes with the assimilating Britons, and they are beginning to identify more with their local region and kingdom rather than the old tribal identities. While they still proudly call themselves [old_culture.GetCollectiveNounNoTooltip], it is becoming increasingly clear that they are now first and foremost [new_culture.GetName]."
 culture_shifts.0011.desc.divergent.culture_char: "Us [old_culture.GetCollectiveNounNoTooltip] have been settled in Britannia for many generations now, and the differences between us and the more faraway groups are becoming increasingly apparent. Inevitably, here in [new_culture_kingdom.GetNameNoTier] we have taken notice of this and while we still feel that the other [old_culture.GetCollectiveNounNoTooltip] are kin it is hard not to feel that those outside our local region and kingdom are becoming somewhat unfamiliar and foreign. While we still proudly call ourselves [old_culture.GetCollectiveNounNoTooltip], in truth we now see ourselves as first and foremost [new_culture.GetName]."
 culture_shifts.0011.desc.divergent: "The [old_culture.GetCollectiveNounNoTooltip] have been settled in Britannia for many generations now, and the differences between the disparate groups spread over the island are becoming increasingly apparent. In [new_culture_kingdom.GetNameNoTier], the local [old_culture.GetNameNoTooltip] population has taken notice of this and they are beginning to identify more with their local region and kingdom rather than the old tribal identities. While they still proudly call themselves [old_culture.GetCollectiveNounNoTooltip], it is becoming increasingly clear that they are now first and foremost [new_culture.GetName]."
 culture_shifts.0011.culture_spread_tooltip: "The new [new_culture.GetName] culture will gradually spread to other #high Germanic#! provinces within the [new_culture_kingdom.GetName]."
 culture_shifts.0011.culture_spread_to_us_tooltip: "We have embraced the new [new_culture.GetName] culture."
 culture_shifts.0011.culture_tradition_discount_tooltip: "Reforming [traditions|E] for the [new_culture.GetName] culture will cost less [prestige|E] for the next #high 25 years#!."
 culture_shifts.0011.a.hybrid.non_west_germanic_parent_culture: "My heritage may be [old_culture.GetName], but we are all [new_culture.GetName] now!"
 culture_shifts.0011.a.hybrid: "The other [dominant_west_germanic_culture.GetCollectiveNounNoTooltip] really are different now..."
 culture_shifts.0011.a: "The other [old_culture.GetCollectiveNounNoTooltip] really are different now..."
 culture_shifts.0011.b: "Maybe they're right... are we more [new_culture.GetName] than [old_culture.GetName]?"
 culture_shifts.0011.b.tt: "We may soon have the opportunity to embrace the new [new_culture.GetName] culture."
 culture_shifts.0011.c: "We might have to keep an eye on this."
 culture_shifts.0011.c.tt: "The new [new_culture.GetName] culture may spread to some of our provinces."
 culture_shifts.0011.d: "This is interesting news..."
