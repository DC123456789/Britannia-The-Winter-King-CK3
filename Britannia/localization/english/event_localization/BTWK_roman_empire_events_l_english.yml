l_english:
 BTWK_wre_events.0002.t: "Death of [julius_nepos.GetUINameAndDynastyOnlyNoTooltipNoFormat]"
 BTWK_wre_events.0002.desc: "[julius_nepos.GetUINameAndDynastyOnlyNoFormat], the current de jure Emperor of [GetTitleByKey('h_western_roman_empire').GetName], is dead, murdered by members of his own military in Dalmatia. Some say the murder was ordered by Odoacer, head of the Germanic Foederati in Italy and de facto ruler of the Italian peninsula since 476, while others blame rivals in his court.\n\nRegardless of the truth of these accusations, Odoacer has decided not to appoint yet another puppet emperor, effectively abolishing the position in favour of nominal submission to the Emperor [GetTitleByKey('h_eastern_roman_empire').GetHolder.GetFirstNameRegnal] in Constantinople. For the first time in almost 500 years, no emperor now reigns over the western provinces of the Empire."
 BTWK_wre_events.0002.a_roman: "An ignominious end to a once-noble institution." 
 BTWK_wre_events.0002.a: "...so what exactly has changed, really?"
