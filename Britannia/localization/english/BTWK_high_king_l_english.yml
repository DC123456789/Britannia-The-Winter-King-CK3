 claim_britannia_high_kingship_decision_effect_tt_0: "Every other independent British king will be given a choice to #high support#! you as [high_king|E] and #high swear fealty#! as a [GetSubjectContractGroup('tributary_britannia_subject_king').GetName], #high accept#! your claim in name but remain independent, or directly #high oppose#! your claim to the [high_kingship|E]. Important factors in their decision include their [opinion|E] of you, [alliances|E] with you, your [army|E] strength, and differing [culture|E] and [religion|E]."
 claim_britannia_high_kingship_decision_effect_tt_1: "Any kings that oppose your claim will band against you and attempt to challenge your claim on the battlefield, with supporters joining you as allies. Only once you are victorious against your opponents will you be recognized as [high_king|E], with all supporters and defeated opponents becoming [britannia_subject_kings|E]."
